<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="icon" type="image/png" href="icono.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Barber Studio | Elite Booking</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <style>
        :root { --bg: #000; --gold: #d4af37; --gold-light: #f1d592; --glass: rgba(13, 13, 13, 0.9); --border: rgba(212, 175, 55, 0.3); --error: #ff4d4d; }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg); background-image: radial-gradient(circle at top right, #1a1a1a, #000); color: #fff; margin: 0; padding: 15px; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        .container { max-width: 400px; margin: 0 auto; background: var(--glass); padding: 30px; border-radius: 35px; border: 1px solid var(--border); backdrop-filter: blur(15px); box-shadow: 0 25px 50px rgba(0,0,0,0.6); margin-top: 10px; }
        
        header { text-align: center; margin-bottom: 30px; }
        .logo { width: 75px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.2)); margin-bottom: 10px; }
        h1 { font-size: 1.3rem; letter-spacing: 6px; color: var(--gold); margin: 0; font-weight: 600; text-transform: uppercase; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.65rem; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; letter-spacing: 1.5px; }
        
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid #222; padding: 14px; border-radius: 15px; color: #fff; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }
        
        .phone-container { display: flex; gap: 8px; }
        .flag-select { width: 130px; cursor: pointer; }
        
        .slots-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; max-height: 220px; overflow-y: auto; padding: 5px; }
        .slot { padding: 14px 5px; border: 1px solid #1a1a1a; border-radius: 14px; text-align: center; font-size: 0.75rem; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.02); color: #888; }
        .slot.selected { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; transform: scale(1.05); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        
        #info-servicio { display:none; margin-top: 12px; padding: 15px; background: rgba(212, 175, 55, 0.04); border-left: 3px solid var(--gold); border-radius: 12px; font-size: 0.75rem; color: #bbb; line-height: 1.5; }
        
        .btn-reserva { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; border: none; width: 100%; padding: 18px; border-radius: 20px; font-weight: 700; cursor: pointer; margin-top: 25px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-reserva:active { transform: scale(0.96); }

        .modal { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.92); align-items: center; justify-content: center; backdrop-filter: blur(10px); animation: fadeIn 0.4s ease; }
        .modal-content { background: #0d0d0d; padding: 40px 30px; border: 1px solid var(--gold); width: 85%; max-width: 320px; border-radius: 35px; text-align: center; box-shadow: 0 0 40px rgba(212,175,55,0.1); }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .flatpickr-calendar { background: #0d0d0d !important; border: 1px solid var(--border) !important; box-shadow: none !important; }
        .flatpickr-day.selected { background: var(--gold) !important; border-color: var(--gold) !important; color: #000 !important; }
        .flatpickr-day.flatpickr-disabled, .flatpickr-day.flatpickr-disabled:hover { color: rgba(255,255,255,0.1) !important; background: transparent !important; border-color: transparent !important; cursor: not-allowed !important; }
   
   /* Botón Home flotante */
.home-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 45px;
    height: 45px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--gold);
    font-size: 1.2rem;
    text-decoration: none;
    z-index: 1000;
    transition: all 0.3s ease;
}

.home-btn:hover {
    background: var(--gold);
    color: #000;
    transform: scale(1.1);
    box-shadow: 0 0 15px var(--gold);
}

/* Ajuste para móviles para que no estorbe */
@media (max-width: 480px) {
    .home-btn {
        top: 15px;
        left: 15px;
        width: 40px;
        height: 40px;
        font-size: 1rem;
    }
}
   
   </style>
</head>
<body>

    <a href="index.html" class="home-btn" title="Volver al inicio">
    <i class="fas fa-home"></i>
</a>  


    <div class="container">
        <header><img src="logo.png" class="logo"><h1>INNOVATION</h1></header>

        <div class="form-group">
            <label><i class="fas fa-user"></i> Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>

        <div class="form-group">
            <label><i class="fab fa-whatsapp"></i> WhatsApp</label>
            <div class="phone-container">
                <select id="codigo-area" class="flag-select">
                    <option value="502">🇬🇹 GT +502</option>
                    <option value="503">🇸🇻 SV +503</option>
                    <option value="504">🇭🇳 HN +504</option>
                    <option value="505">🇳🇮 NI +505</option>
                    <option value="506">🇨🇷 CR +506</option>
                    <option value="507">🇵🇦 PA +507</option>
                    <option value="501">🇧🇿 BZ +501</option>
                    <option value="52">🇲🇽 MX +52</option>
                    <option value="1">🇺🇸 US +1</option>
                </select>
                <input type="tel" id="whatsapp" placeholder="Número">
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-cut"></i> Servicio Elite</label>
            <select id="servicio" onchange="window.actualizarInfoServicio()"></select>
            <div id="info-servicio"><strong>Detalles:</strong> <br> <span id="texto-descripcion"></span></div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-calendar-alt"></i> Selección de Fecha y Hora</label>
            <div id="calendar-inline"></div>
            <div id="slots-container" class="slots-container"></div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-pen"></i> Instrucciones Especiales</label>
            <textarea id="nota" placeholder="¿Algún detalle para tu barbero?"></textarea>
        </div>

        <button class="btn-reserva" onclick="window.enviarCita()">Agendar Cita</button>
    </div>

    <div id="modalExito" class="modal">
        <div class="modal-content">
            <div style="width: 60px; height: 60px; background: rgba(212,175,55,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fas fa-check" style="font-size:2rem; color:var(--gold);"></i>
            </div>
            <h2 style="color:var(--gold); margin:0; letter-spacing:2px; font-size:1.5rem;">¡CONFIRMADO!</h2>
            <p style="color:#aaa; font-size:0.85rem; margin:15px 0 25px;">Tu reserva ha sido procesada. Recibirás un mensaje en breve.</p>
            <button class="btn-reserva" onclick="location.reload()">FINALIZAR</button>
        </div>
    </div>

    <div id="modalError" class="modal">
        <div class="modal-content" style="border-color: var(--error);">
            <i class="fas fa-info-circle" style="font-size:3.5rem; color:var(--error); margin-bottom:20px;"></i>
            <h2 style="color:var(--error); margin:0; letter-spacing:1px;">ATENCIÓN</h2>
            <p id="mensajeError" style="color:#aaa; font-size:0.85rem; margin:15px 0 25px;">Por favor, completa todos los campos requeridos para continuar.</p>
            <button class="btn-reserva" style="background: var(--error); color: #fff;" onclick="document.getElementById('modalError').style.display='none'">CORREGIR</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", 
            authDomain: "innovation-barber-studio.firebaseapp.com", 
            projectId: "innovation-barber-studio", 
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const fs = getFirestore(app);

        let ocupados = [], fechaSeleccionada = "", horaSeleccionada = "", fp;
        let horaApertura = 7, horaCierre = 21, lunchInicio = -1, lunchFin = -1;

        // Inicializar Flatpickr
        fp = flatpickr("#calendar-inline", {
            inline: true,
            minDate: "today",
            dateFormat: "Y-m-d",
            "locale": "es",
            disableMobile: true, // Forzar diseño web en móviles para respetar bloqueos
            disable: [], 
            onChange: (selectedDates, dateStr) => {
                fechaSeleccionada = dateStr;
                window.renderSlots();
            }
        });

        window.renderSlots = () => {
            const container = document.getElementById('slots-container');
            container.innerHTML = "";
            if (!fechaSeleccionada) return;

            for (let h = horaApertura; h < horaCierre; h++) {
                if (lunchInicio !== -1 && lunchFin !== -1) {
                    if (h >= lunchInicio && h < lunchFin) continue; 
                }

                const horaStr = `${h.toString().padStart(2, '0')}:00`;
                const fullDateTimeISO = `${fechaSeleccionada}T${horaStr}`;
                const isOccupied = ocupados.some(o => o.startsWith(fullDateTimeISO));

                if (!isOccupied) {
                    const div = document.createElement('div');
                    div.className = 'slot';
                    div.innerText = h > 12 ? `${h-12}:00 PM` : (h === 12 ? `12:00 PM` : `${h}:00 AM`);
                    div.onclick = () => {
                        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                        div.classList.add('selected');
                        horaSeleccionada = horaStr;
                    };
                    container.appendChild(div);
                }
            }
        };

        window.actualizarInfoServicio = () => {
            const sel = document.getElementById('servicio'), opt = sel.selectedOptions[0];
            if(opt && opt.value !== "") {
                document.getElementById('texto-descripcion').innerText = opt.getAttribute('data-desc');
                document.getElementById('info-servicio').style.display = 'block';
            }
        };

       window.enviarCita = () => {
            const nom = document.getElementById('nombre').value, 
                  num = document.getElementById('whatsapp').value, 
                  sel = document.getElementById('servicio');

            if(!nom || !num || !sel.value || !horaSeleccionada || !fechaSeleccionada) {
                document.getElementById('modalError').style.display = 'flex';
                return;
            }

            // Guardar la cita en Realtime Database
            push(ref(db, 'citas'), {
                nombre: nom,
                whatsapp: document.getElementById('codigo-area').value + num,
                servicio: sel.value,
                precio: sel.selectedOptions[0].getAttribute('data-precio'),
                nota: document.getElementById('nota').value || "Sin notas",
                fecha: `${fechaSeleccionada}T${horaSeleccionada}`, 
                estado: 'Pendiente'
            }).then(() => {
                // --- NUEVO: GUARDAR O ACTUALIZAR CLIENTE EN FIRESTORE ---
                const clienteID = nom.toLowerCase().trim().replace(/\s+/g, '_');
                const telFull = document.getElementById('codigo-area').value + num;
                
                setDoc(doc(fs, "clientes", clienteID), {
                    nombre: nom,
                    telefono: telFull,
                    ultima_visita: new Date().toISOString()
                }, { merge: true });
                // -------------------------------------------------------

                document.getElementById('modalExito').style.display = 'flex'; 
            });
        }; // <--- ASÍ DEBE QUEDAR EL CIERRE

        // ESCUCHAR DÍAS BLOQUEADOS
        onValue(ref(db, 'dias_bloqueados'), (snapshot) => {
            const bloqueos = snapshot.val() || {};
            const diasADeshabilitar = Object.keys(bloqueos);
            fp.set("disable", diasADeshabilitar);
            fp.redraw();
            
            if(diasADeshabilitar.includes(fechaSeleccionada)) {
                fechaSeleccionada = "";
                window.renderSlots();
            }
        });

        onValue(ref(db, 'configuracion_horario'), (snapshot) => {
            const config = snapshot.val();
            if (config) { 
                horaApertura = parseInt(config.apertura); 
                horaCierre = parseInt(config.cierre);
                lunchInicio = (config.lunch_inicio && config.lunch_inicio !== "") ? parseInt(config.lunch_inicio) : -1;
                lunchFin = (config.lunch_fin && config.lunch_fin !== "") ? parseInt(config.lunch_fin) : -1;
                window.renderSlots(); 
            }
        });

        onValue(ref(db, 'citas'), (snap) => {
            ocupados = [];
            snap.forEach(c => { 
                const d = c.val();
                if(d.fecha && d.estado !== 'Cancelada') ocupados.push(d.fecha.replace(" ", "T")); 
            });
            window.renderSlots(); 
        });

        onValue(ref(db, 'servicios'), (snap) => {
            const sel = document.getElementById('servicio');
            sel.innerHTML = '<option value="" disabled selected>Elige un servicio...</option>';
            snap.forEach(s => {
                const d = s.val(), option = document.createElement('option');
                option.value = d.nombre; option.text = `${d.nombre} - Q${d.precio}`;
                option.setAttribute('data-precio', d.precio);
                option.setAttribute('data-desc', d.detalle || 'Servicio de alta calidad');
                sel.appendChild(option);
            });
        });
    </script>
</body>
</html>
