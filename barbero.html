<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Barber | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; --text: #e0e0e0; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
            overflow-x: hidden;
        }

        header { text-align: center; margin: 20px 0; }
        .logo { width: 70px; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3)); }
        h2 { font-weight: 300; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; font-size: 0.9rem; margin-top: 10px; }

        /* --- CALENDARIO ESTÉTICO --- */
        #calendar-container { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            margin-bottom: 40px;
        }

        /* Quitar bordes de tabla internos */
        .fc { border: none !important; }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid var(--border) !important; }
        .fc-scrollgrid { border: none !important; }

        /* Estilo de los eventos (Citas) */
        .fc-event {
            border: none !important;
            border-radius: 8px !important;
            padding: 5px 8px !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-size: 0.75rem !important;
            font-weight: 600 !important;
        }

        /* Vista de día: Personalización de horas */
        .fc-timegrid-slot { height: 3.5em !important; border-bottom: 1px solid #111 !important; }
        .fc-timegrid-slot-label-cushion { color: #555 !important; font-size: 0.7rem; text-transform: uppercase; }

        /* Indicador de hora actual Premium */
        .fc-timegrid-now-indicator-line { border-color: var(--gold) !important; border-width: 2px !important; }
        .fc-timegrid-now-indicator-arrow { border-left-color: var(--gold) !important; }

        /* Botones y Toolbar */
        .fc-toolbar-title { color: var(--gold) !important; font-weight: 600 !important; font-size: 1.1rem !important; }
        .fc-button { 
            background: transparent !important; 
            border: 1px solid var(--border) !important; 
            color: var(--gold) !important; 
            font-size: 0.65rem !important; 
            text-transform: uppercase !important;
            transition: 0.3s !important;
            border-radius: 10px !important;
        }
        .fc-button-active { background: var(--gold) !important; color: #000 !important; }
        .fc-button:hover { background: rgba(212, 175, 55, 0.1) !important; }

        /* --- LISTA DE CITAS ABAJO --- */
        #seccion-lista { max-width: 500px; margin: auto; }
        .titulo-lista { color: #444; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 3px; text-align: center; margin-bottom: 25px; }
        
        .card { 
            background: linear-gradient(145deg, #111, #050505);
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            position: relative;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--gold); }
        .card h3 { margin: 0; font-size: 1rem; font-weight: 600; letter-spacing: 1px; }
        .card p { margin: 5px 0; font-size: 0.8rem; color: #888; }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; font-size: 0.7rem; letter-spacing: 1px; transition: 0.3s; }
        .btn-accept { background: var(--gold); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
        .btn-finish { background: transparent; color: #555; border: 1px solid #333; }
        .btn-finish:hover { color: #fff; border-color: #fff; }

        /* Eliminar resaltado del día de hoy */
        .fc-day-today { background: transparent !important; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo">
        <h2>Innovation Admin</h2>
    </header>

    <div id="calendar-container">
        <div id="calendar"></div>
    </div>

    <div id="seccion-lista">
        <h3 class="titulo-lista">Registro de hoy</h3>
        <div id="lista-citas"></div>
    </div>

    <audio id="notif-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2210/2210-preview.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let calendar;
        let inicial = true;

        // Desbloqueo de sonido
        document.body.addEventListener('click', () => {
            const sound = document.getElementById('notif-sound');
            sound.play().then(() => { sound.pause(); sound.currentTime = 0; });
        }, { once: true });

        document.addEventListener('DOMContentLoaded', () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: 'auto',
                navLinks: true,
                nowIndicator: true,
                slotDuration: '00:15:00', // Slots de 15 min para más precisión
                slotLabelInterval: '01:00',
                expandRows: true,
                navLinkDayClick: (date) => calendar.changeView('timeGridDay', date),
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridDay' },
                buttonText: { today: 'Hoy', month: 'Mes', day: 'Día' }
            });
            calendar.render();
        });

        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            if (!inicial && data) document.getElementById('notif-sound').play().catch(() => {});
            inicial = false;
            render(data);
        });

        function render(data) {
            const lista = document.getElementById('lista-citas');
            lista.innerHTML = '';
            const eventos = [];
            if (!data) return;

            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;

                eventos.push({ 
                    title: `${c.nombre} | ${c.servicio}`, 
                    start: c.fecha, 
                    backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : '#222',
                    textColor: c.estado === 'Aceptada' ? '#000' : '#fff'
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-size:0.6rem; color:var(--gold); float:right; border:1px solid; padding:2px 6px; border-radius:4px">${c.estado}</div>
                    <h3>${c.nombre}</h3>
                    <p>💈 ${c.servicio}</p>
                    <p style="font-size:0.75rem">📅 ${new Date(c.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                    ${c.estado === 'Pendiente' ? 
                    `<button class="btn btn-accept" onclick="cambiarEstado('${id}', 'Aceptada')">Confirmar Cita</button>` : 
                    `<button class="btn btn-finish" onclick="cambiarEstado('${id}', 'Finalizada')">Corte Terminado</button>`}
                `;
                lista.appendChild(card);
            });
            calendar.removeAllEvents();
            calendar.addEventSource(eventos);
        }

        window.cambiarEstado = (id, estado) => {
            get(ref(db, `citas/${id}`)).then((snap) => {
                const c = snap.val();
                if (c && estado === 'Aceptada') {
                    const msg = `¡Hola ${c.nombre}! 👋 Confirmamos tu cita para *${c.servicio}* en Innovation. ¡Te esperamos!`;
                    window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
                }
                update(ref(db, `citas/${id}`), { estado });
            });
        };
    </script>
</body>
</html>
