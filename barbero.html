<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin | Elite Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/es.global.min.js"></script>
    
    <style>
        /* ==========================================
           VARIABLES Y ESTILOS BASE
           ========================================== */
        :root { 
            --bg: #000; --card: #0a0a0a; --gold: #d4af37; --gold-dark: #aa8c2c; 
            --border: #1a1a1a; --green: #2ecc71; --red: #ff4d4d; --glass: rgba(10, 10, 10, 0.98); 
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* --- ARREGLO FINAL DE BANDERAS (MÁXIMA PRIORIDAD) --- */
        .iti { 
            display: block !important; 
            width: 100% !important; 
            margin-bottom: 12px !important; 
        }
        
        .iti input[type="tel"] {
            width: 100% !important;
            height: 48px !important; 
            background: rgba(255,255,255,0.03) !important;
            border: 1px solid var(--border) !important;
            border-radius: 18px !important;
            color: #fff !important;
            padding-left: 55px !important; /* Espacio exacto para la bandera */
            font-family: 'Poppins', sans-serif !important;
            box-sizing: border-box !important;
        }

        .iti__country-list { 
            background-color: #0a0a0a !important; 
            border: 1px solid var(--gold) !important; 
            color: white !important;
            z-index: 1000000 !important; 
            border-radius: 15px;
            width: 280px !important;
        }

        .iti__selected-flag { background: transparent !important; padding-left: 15px !important; }
        .iti__country:hover { background-color: #1a1a1a !important; }
        .iti__dial-code { color: var(--gold) !important; }

        /* BLOQUEO DE DÍAS */
        .block-item-admin { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 12px; 
            margin-bottom: 8px; font-size: 0.8rem; border-left: 3px solid var(--red); 
        }

        /* LOGIN OVERLAY */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 320px; padding: 45px; text-align: center; background: var(--card); border-radius: 35px; border: 1px solid var(--border); box-shadow: 0 0 40px rgba(212,175,55,0.05); }

        /* ESTRUCTURA DASHBOARD */
        #admin-content { display: none; max-width: 1400px; margin: 0 auto; }
        .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 25px; margin-top: 10px; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

        /* CALENDARIO */
        #calendar-container { background: var(--card); padding: 20px; border-radius: 35px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .fc { --fc-border-color: #161616; --fc-today-bg-color: rgba(212,175,55,0.02); font-size: 0.85rem; }
        .fc .fc-toolbar-title { font-size: 1.1rem !important; text-transform: uppercase; color: var(--gold); font-weight: 600; letter-spacing: 1px; }

        /* SIDEBAR Y STATS */
        .sidebar-stats { background: var(--card); border: 1px solid var(--border); border-radius: 35px; padding: 30px; border-top: 5px solid var(--gold); position: sticky; top: 15px; height: fit-content; }
        .stat-val { font-size: 2.3rem; font-weight: 600; color: var(--gold); line-height: 1; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #666; letter-spacing: 2px; font-weight: 600; }
        #desglose-servicios { margin-top: 15px; border-top: 1px solid #1a1a1a; padding-top: 10px; }
        .serv-stat-item { display: flex; justify-content: space-between; font-size: 0.65rem; color: #888; margin-top: 6px; text-transform: uppercase; }

        /* CITAS LIST */
        .citas-list { margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding-bottom: 120px; }
        .card { background: #060606; border: 1px solid var(--border); padding: 15px 20px; border-radius: 20px; border-left: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-3px); border-color: #333; }

        /* MODALES */
        .modal { display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: var(--glass); padding: 40px; border: 1px solid var(--gold); width: 90%; max-width: 400px; border-radius: 40px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.8); }

        /* FORMULARIOS GENERALES */
        input, select, textarea { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid #1a1a1a; padding: 14px; border-radius: 18px; width: 100%; margin-bottom: 12px; outline: none; font-family: 'Poppins'; box-sizing: border-box; font-size: 0.85rem; }
        input:focus, select:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* BOTONES */
        .btn { width: 100%; padding: 18px; border-radius: 20px; font-weight: 700; cursor: pointer; border: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; }
        .btn-red { background: rgba(255, 77, 77, 0.1); border: 1px solid var(--red); color: var(--red); }
        .btn-config-float { position: fixed; bottom: 35px; right: 35px; background: var(--gold); color: #000; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; z-index: 5000; border: none; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    </style>
</head>

<body>
    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" style="width:100px; margin-bottom:20px;">
            <h2 style="color:var(--gold); font-size:1.2rem; margin-bottom:30px; letter-spacing:2px;">ADMIN ACCESS</h2>
            <input type="password" id="admin-pass" placeholder="PASSWORD ELITE">
            <button class="btn btn-gold" onclick="checkAuth()">ENTRAR</button>
        </div>
    </div>

    <div id="admin-content">
        <div class="main-grid">
            <div id="calendar-container">
                <div id="calendar"></div>
            </div>

            <div class="sidebar-stats">
                <img src="logo.png" class="sidebar-logo">
                <div class="stat-group">
                    <div class="stat-label">Citas de hoy</div>
                    <div class="stat-val" id="count-today">0</div>
                </div>
                <div class="stat-group">
                    <div class="stat-label">Ingresos estimados</div>
                    <div class="stat-val" style="font-size:1.5rem;" id="revenue-today">Q0.00</div>
                </div>
                <div id="desglose-servicios"></div>
            </div>
        </div>

        <h3 style="margin-top:40px; color:var(--gold); letter-spacing:2px;">CITAS PENDIENTES</h3>
        <div id="citas-container" class="citas-list"></div>
    </div>

    <button class="btn-config-float" onclick="openConfig()"><i class="fas fa-cog"></i></button>

    <div id="modal-cita" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="color:var(--gold);">CITA ELITE</h3>
            <input type="text" id="edit-nombre" placeholder="Nombre del Cliente">
            <input type="tel" id="add-whatsapp-input">
            <select id="edit-servicio">
                <option value="Corte de Cabello">Corte de Cabello - Q75</option>
                <option value="Corte + Barba">Corte + Barba - Q125</option>
                <option value="Servicio VIP">Servicio VIP - Q200</option>
            </select>
            <input type="text" id="edit-fecha" readonly>
            <input type="text" id="edit-hora" readonly>
            <button class="btn btn-gold" id="btn-save-cita">GUARDAR CAMBIOS</button>
            <button class="btn btn-red" id="btn-delete-cita" style="margin-top:10px;">ELIMINAR CITA</button>
            <button class="btn btn-outline" onclick="closeModal()">CANCELAR</button>
        </div>
    </div>

    <div id="modal-config" class="modal">
        <div class="modal-content" style="max-width:500px;">
            <h3 style="color:var(--gold);">CONFIGURACIÓN SISTEMA</h3>
            <div style="text-align:left; margin-bottom:20px;">
                <label style="font-size:0.7rem; color:var(--gold);">HORARIO DE ATENCIÓN</label>
                <div style="display:flex; gap:10px;">
                    <input type="time" id="config-apertura" value="09:00">
                    <input type="time" id="config-cierre" value="20:00">
                </div>
            </div>
            <div style="text-align:left;">
                <label style="font-size:0.7rem; color:var(--gold);">BLOQUEAR DÍA ESPECÍFICO</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="input-block-date" placeholder="Seleccionar Fecha">
                    <button class="btn btn-mini" id="btn-add-block" style="width:80px; height:48px;">BLOQUEAR</button>
                </div>
            </div>
            <div id="lista-bloqueos-admin" style="margin-top:20px; max-height:150px; overflow-y:auto;"></div>
            <button class="btn btn-gold" onclick="saveSettings()" style="margin-top:20px;">ACTUALIZAR AJUSTES</button>
            <button class="btn btn-outline" onclick="closeConfig()">CERRAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://barberia-f3708-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let calendar;
        let iti;
        let selectedCitaId = null;

        // INICIALIZACIÓN DEL SELECTOR DE TELÉFONO
        iti = window.intlTelInput(document.querySelector("#add-whatsapp-input"), { 
            initialCountry: "gt", 
            separateDialCode: true,
            dropdownContainer: document.body,
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
        });

        window.checkAuth = () => {
            if(document.getElementById('admin-pass').value === '2025') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                initCalendar();
                loadStats();
                loadCitas();
            } else {
                alert("PASSWORD INCORRECTO");
            }
        };

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                locale: 'es',
                slotMinTime: '08:00:00',
                slotMaxTime: '21:00:00',
                allDaySlot: false,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridDay,dayGridMonth' },
                events: [],
                eventClick: (info) => openEditModal(info.event)
            });
            calendar.render();

            onValue(ref(db, 'citas'), (snapshot) => {
                const data = snapshot.val();
                const events = [];
                if(data) {
                    Object.keys(data).forEach(key => {
                        const cita = data[key];
                        events.push({
                            id: key,
                            title: `${cita.nombre} - ${cita.servicio}`,
                            start: `${cita.fecha}T${cita.hora}`,
                            end: `${cita.fecha}T${add30Min(cita.hora)}`,
                            backgroundColor: cita.servicio.includes('VIP') ? '#d4af37' : '#1a1a1a',
                            borderColor: '#d4af37'
                        });
                    });
                }
                calendar.removeAllEvents();
                calendar.addEventSource(events);
            });
        }

        function add30Min(time) {
            let [h, m] = time.split(':').map(Number);
            m += 30;
            if(m >= 60) { h++; m -= 60; }
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        }

        function openEditModal(event) {
            selectedCitaId = event.id;
            const citaData = event.title.split(' - ');
            document.getElementById('edit-nombre').value = citaData[0];
            document.getElementById('edit-servicio').value = citaData[1];
            document.getElementById('edit-fecha').value = event.startStr.split('T')[0];
            document.getElementById('edit-hora').value = event.startStr.split('T')[1].substring(0,5);
            document.getElementById('modal-cita').style.display = 'flex';
        }

        window.closeModal = () => { document.getElementById('modal-cita').style.display = 'none'; selectedCitaId = null; };

        document.getElementById('btn-save-cita').onclick = () => {
            const updates = {
                nombre: document.getElementById('edit-nombre').value,
                servicio: document.getElementById('edit-servicio').value,
                whatsapp: iti.getNumber()
            };
            update(ref(db, `citas/${selectedCitaId}`), updates).then(() => {
                closeModal();
            });
        };

        document.getElementById('btn-delete-cita').onclick = () => {
            if(confirm("¿Eliminar esta cita permanentemente?")) {
                remove(ref(db, `citas/${selectedCitaId}`)).then(() => closeModal());
            }
        };

        function loadStats() {
            onValue(ref(db, 'citas'), (snap) => {
                const today = new Date().toISOString().split('T')[0];
                let count = 0;
                let rev = 0;
                const data = snap.val();
                if(data) {
                    Object.values(data).forEach(c => {
                        if(c.fecha === today) {
                            count++;
                            rev += parseInt(c.servicio.split('Q')[1]) || 75;
                        }
                    });
                }
                document.getElementById('count-today').innerText = count;
                document.getElementById('revenue-today').innerText = `Q${rev}.00`;
            });
        }

        function loadCitas() {
            onValue(ref(db, 'citas'), (snap) => {
                const container = document.getElementById('citas-container');
                container.innerHTML = '';
                const data = snap.val();
                if(data) {
                    Object.keys(data).forEach(key => {
                        const c = data[key];
                        container.innerHTML += `
                            <div class="card">
                                <div>
                                    <div style="font-weight:600; color:var(--gold);">${c.nombre}</div>
                                    <div style="font-size:0.7rem; color:#666;">${c.servicio} | ${c.hora}</div>
                                </div>
                                <a href="https://wa.me/${c.whatsapp}" target="_blank" style="color:var(--green); font-size:1.2rem;"><i class="fab fa-whatsapp"></i></a>
                            </div>
                        `;
                    });
                }
            });
        }

        // --- CONFIGURACIÓN ---
        window.openConfig = () => document.getElementById('modal-config').style.display = 'flex';
        window.closeConfig = () => document.getElementById('modal-config').style.display = 'none';

        window.saveSettings = () => {
            const apS = document.getElementById('config-apertura');
            const ciS = document.getElementById('config-cierre');
            update(ref(db, 'config'), { 
                apertura: apS.value, 
                cierre: ciS.value 
            }).then(() => {
                alert("AJUSTES ACTUALIZADOS");
            });
        };

        // --- LÓGICA DE BLOQUEO DE DÍAS ---
        const fpBlock = flatpickr("#input-block-date", { locale: "es", minDate: "today", dateFormat: "Y-m-d" });

        onValue(ref(db, 'dias_bloqueados'), snap => {
            const list = document.getElementById('lista-bloqueos-admin');
            list.innerHTML = ''; 
            const bloqueos = snap.val() || {};
            Object.keys(bloqueos).forEach(f => {
                list.innerHTML += `<div class="block-item-admin"><span>${f}</span><i class="fas fa-trash" style="color:var(--red); cursor:pointer;" onclick="eliminarBloqueo('${f}')"></i></div>`;
            });
        });

        window.eliminarBloqueo = (f) => {
            if(confirm("¿Desbloquear este día?")) {
                remove(ref(db, `dias_bloqueados/${f}`));
            }
        };

        document.getElementById('btn-add-block').onclick = () => {
            const f = document.getElementById('input-block-date').value;
            if(f) {
                set(ref(db, `dias_bloqueados/${f}`), true).then(() => {
                    document.getElementById('input-block-date').value = '';
                });
            }
        };
    </script>
</body>
</html>
