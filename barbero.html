<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin | Elite Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/es.global.min.js"></script>
    
    <style>
        /* ==========================================
           VARIABLES Y DISEÑO ÉLITE
           ========================================== */
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --gold: #d4af37; 
            --gold-dark: #aa8c2c; 
            --border: #1a1a1a; 
            --green: #2ecc71; 
            --red: #ff4d4d; 
            --glass: rgba(10, 10, 10, 0.98); 
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; overflow-x: hidden; }

        /* FIX WHATSAPP MOVIL Y BANDERAS */
        .iti { width: 100% !important; margin-bottom: 12px; }
        .iti__country-list { 
            background-color: #0a0a0a !important; 
            border: 1px solid #333 !important; 
            color: white !important; 
            max-width: 300px !important; 
            z-index: 11000 !important;
        }

        /* ESTRUCTURA DASHBOARD */
        #admin-content { display: none; max-width: 1400px; margin: 0 auto; }
        .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 25px; margin-top: 10px; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

        #calendar-container { 
            background: var(--card); padding: 20px; border-radius: 35px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .fc { --fc-border-color: #161616; --fc-today-bg-color: rgba(212,175,55,0.02); font-size: 0.85rem; }
        .fc .fc-toolbar-title { font-size: 1.1rem !important; text-transform: uppercase; color: var(--gold); font-weight: 600; letter-spacing: 1px;}
        
        /* SIDEBAR STATS */
        .sidebar-stats { 
            background: var(--card); border: 1px solid var(--border); border-radius: 35px; 
            padding: 30px; border-top: 5px solid var(--gold); position: sticky; top: 15px; height: fit-content; 
        }
        .stat-val { font-size: 2.3rem; font-weight: 600; color: var(--gold); line-height: 1; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #666; letter-spacing: 2px; font-weight: 600; }

        /* MODALES */
        .modal { 
            display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; z-index: 10000; 
        }
        .modal-content { 
            background: var(--glass); padding: 35px; border: 1px solid var(--gold); width: 90%; 
            max-width: 450px; border-radius: 40px; text-align: center; max-height: 90vh; overflow-y: auto;
        }

        input, select, textarea { 
            background: rgba(255,255,255,0.03); color: #fff; border: 1px solid #1a1a1a; 
            padding: 14px; border-radius: 18px; width: 100%; margin-bottom: 12px; outline: none; font-family: 'Poppins'; box-sizing: border-box;
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 20px; font-weight: 700; cursor: pointer; 
            border: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; 
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; }
        .btn-red { background: rgba(255, 77, 77, 0.1); border: 1px solid var(--red); color: var(--red); }
        .btn-outline { background: transparent; border: 1px solid #333; color: #777; margin-top: 10px; }
        
        .btn-config-float { position: fixed; bottom: 35px; right: 35px; background: var(--gold); color: #000; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; z-index: 5000; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        /* LISTA BLOQUEOS */
        .item-bloqueo { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 12px; border-radius: 15px; margin-bottom: 8px; font-size: 0.8rem; border-left: 3px solid var(--red); }
        .btn-x { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1.1rem; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 16px 45px; border-radius: 50px; font-weight: 700; z-index: 11000; transition: 0.6s; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div id="toast">MENSAJE</div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" style="width: 80px; margin-bottom: 20px;">
            <h2 style="color: var(--gold); letter-spacing: 2px; font-size: 1rem;">ELITE MANAGEMENT</h2>
            <button class="btn btn-gold" onclick="loginGoogle()">ENTRAR AL SISTEMA</button>
        </div>
    </div>

    <div id="admin-content">
        
        <button class="btn-config-float" onclick="toggleConfig()">
            <i class="fas fa-sliders-h"></i>
        </button>

        <div class="main-grid">
            <div id="calendar-container">
                <div id="calendar"></div>
            </div>

            <aside class="sidebar-stats">
                <div class="stat-group">
                    <span class="stat-label">Finalizados Mes</span><br>
                    <span class="stat-val" id="citas-count">0</span>
                    <div id="desglose-servicios" style="margin-top:10px;"></div>
                </div>
                <div class="stat-group" style="background: rgba(212, 175, 55, 0.05); padding: 20px; border-radius: 25px; margin: 20px 0;">
                    <span class="stat-label" id="label-pendientes">Pendientes Hoy</span><br>
                    <span class="stat-val" id="count-pendientes">0</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">Ingresos Mes</span><br>
                    <span class="stat-val" id="ingreso-total" style="color:var(--green);">Q0.00</span>
                </div>
            </aside>
        </div>

        <div class="citas-list" id="lista-citas" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 30px; padding-bottom: 120px;"></div>

        <div id="modalAddCita" class="modal">
            <div class="modal-content">
                <h3 style="color:var(--gold);">NUEVA CITA</h3>
                <p id="add-fecha-display" style="font-size: 0.8rem; color: #666;"></p>
                <input type="text" id="add-nombre" placeholder="Nombre del Cliente">
                <input type="tel" id="add-whatsapp-input">
                <select id="add-servicio-select"></select>
                <textarea id="add-nota" placeholder="Notas especiales..." rows="2"></textarea>
                <button class="btn btn-gold" id="btn-save-cita-main">AGENDAR CITA</button>
                <button class="btn btn-outline" onclick="cerrarModalAdd()">CANCELAR</button>
            </div>
        </div>

        <div id="modalEvento" class="modal">
            <div class="modal-content">
                <div id="view-mode">
                    <h3 id="pop-nombre" style="color:var(--gold);"></h3>
                    <p id="pop-fecha" style="font-size:0.85rem; color:#888;"></p>
                    <div id="pop-detalle-corte" style="margin: 20px 0; font-size: 1.1rem; font-weight: 600;"></div>
                    <div id="pop-whatsapp" style="background:rgba(46, 204, 113, 0.1); padding:15px; border-radius:20px; cursor:pointer; color:var(--green); font-weight: 600;">
                        <i class="fab fa-whatsapp"></i> ENVIAR RECORDATORIO
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:20px;">
                        <button class="btn btn-gold" onclick="entrarModoEdicion()">EDITAR</button>
                        <button class="btn btn-red" id="btn-eliminar-pop">BORRAR</button>
                    </div>
                    <button class="btn btn-outline" onclick="cerrarPop()">CERRAR</button>
                </div>

                <div id="edit-mode" style="display:none;">
                    <h3 style="color:var(--gold);">MODIFICAR CITA</h3>
                    <input type="text" id="edit-nombre">
                    <input type="tel" id="edit-whatsapp-input">
                    <select id="edit-servicio-select"></select>
                    <input type="number" id="edit-precio">
                    <textarea id="edit-nota" rows="2"></textarea>
                    <button class="btn btn-gold" id="btn-update-cita">GUARDAR CAMBIOS</button>
                    <button class="btn btn-outline" onclick="salirModoEdicion()">VOLVER</button>
                </div>
            </div>
        </div>

        <div id="modalConfig" class="modal">
            <div class="modal-content" style="max-width: 500px;">
                <h3 style="color:var(--gold);">ADMINISTRACIÓN</h3>
                
                <h4 style="font-size:0.7rem; color:var(--gold); border-bottom:1px solid #222; text-align:left; margin-bottom:10px;">HORARIO LABORAL</h4>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <select id="cfg-abrir"></select>
                    <select id="cfg-cerrar"></select>
                </div>

                <h4 style="font-size:0.7rem; color:var(--gold); border-bottom:1px solid #222; text-align:left; margin-bottom:10px;">HORARIO DE LUNCH (BLOQUEO)</h4>
                <div style="display:flex; gap:10px;">
                    <select id="cfg-lunch-ini"></select>
                    <select id="cfg-lunch-fin"></select>
                </div>
                <button class="btn btn-gold" id="btn-save-cfg" style="margin-top:10px; padding:12px;">ACTUALIZAR HORARIOS</button>

                <h4 style="font-size:0.7rem; color:var(--gold); border-bottom:1px solid #222; text-align:left; margin-top:25px; margin-bottom:10px;">BLOQUEAR DÍA ESPECÍFICO</h4>
                <div style="display:flex; gap:10px;">
                    <input type="date" id="cfg-bloquear-fecha" style="margin-bottom:0;">
                    <button class="btn btn-red" id="btn-bloquear-dia" style="padding:12px; width:auto;">BLOQUEAR</button>
                </div>
                <div id="lista-bloqueos" style="margin-top:15px; text-align:left; max-height: 120px; overflow-y:auto;"></div>

                <hr style="border:1px solid #111; margin:25px 0;">
                
                <h4 style="font-size:0.7rem; color:var(--gold); border-bottom:1px solid #222; text-align:left; margin-bottom:10px;">AÑADIR SERVICIO AL CATÁLOGO</h4>
                <input type="text" id="serv-n" placeholder="Nombre (Ej: Barba Estilizada)">
                <input type="number" id="serv-p" placeholder="Precio (Q)">
                <button class="btn btn-gold" id="btn-add-serv" style="padding:12px;">AÑADIR SERVICIO</button>

                <button class="btn btn-outline" onclick="toggleConfig()" style="margin-top:30px;">CERRAR PANEL</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", 
            authDomain: "innovation-barber-studio.firebaseapp.com", 
            projectId: "innovation-barber-studio", 
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        
        let calendar, selectedDateTime, currentEditingId;
        let catalogoGlobal = {}, itiAdd, itiEdit;
        let fechaVisualizada = new Date().toISOString().split('T')[0];

        // CONFIGURACIÓN TELÉFONO CON FIX MÓVIL
        const itc = { 
            initialCountry: "gt", 
            onlyCountries: ["gt", "sv", "hn", "ni", "cr", "pa", "us", "mx"], 
            separateDialCode: true, 
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js" 
        };
        itiAdd = window.intlTelInput(document.querySelector("#add-whatsapp-input"), itc);
        itiEdit = window.intlTelInput(document.querySelector("#edit-whatsapp-input"), itc);

        window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); };
        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.toggleConfig = () => { const m = document.getElementById('modalConfig'); m.style.display = (m.style.display==='flex')?'none':'flex'; };

        // Llenar horas en selectores
        const idsS = ['cfg-abrir', 'cfg-cerrar', 'cfg-lunch-ini', 'cfg-lunch-fin'];
        idsS.forEach(id => {
            const s = document.getElementById(id);
            for(let h=0; h<=23; h++){
                const opt = document.createElement('option'); opt.value = h; opt.innerText = h.toString().padStart(2,'0')+":00";
                s.appendChild(opt);
            }
        });

        onAuthStateChanged(auth, (user) => { 
            if(user){ 
                document.getElementById('login-overlay').style.display='none'; 
                document.getElementById('admin-content').style.display='block'; 
                initDashboard(); 
            } 
        });

        function initDashboard() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridDay', locale: 'es', allDaySlot: false, slotDuration: '00:30:00', nowIndicator: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                events: (info, success) => {
                    // ESCUCHA MAESTRA DE FIREBASE
                    onValue(ref(db, '/'), (snapshot) => {
                        const root = snapshot.val() || {};
                        const citas = root.citas || {};
                        const config = root.configuracion || {};
                        const bloqueos = root.bloqueos || {};
                        let evs = [];

                        // 1. BLOQUEOS DINÁMICOS (LUNCH Y DÍAS)
                        let d = new Date(info.start);
                        while(d < info.end){
                            const fISO = d.toISOString().split('T')[0];
                            // Bloqueo Lunch
                            if(config.lunch_ini && config.lunch_fin){
                                evs.push({
                                    title: 'LUNCH 🍱', 
                                    start: fISO + 'T' + config.lunch_ini.padStart(2,'0') + ':00:00',
                                    end: fISO + 'T' + config.lunch_fin.padStart(2,'0') + ':00:00',
                                    display: 'background', color: '#111', overlap: false
                                });
                            }
                            // Bloqueo Día Completo
                            if(bloqueos[fISO]){
                                evs.push({ start: fISO, end: fISO, display: 'background', color: 'rgba(255,0,0,0.12)' });
                            }
                            d.setDate(d.getDate() + 1);
                        }

                        // 2. CITAS
                        Object.keys(citas).forEach(id => {
                            const c = citas[id];
                            evs.push({ 
                                id: id, 
                                title: c.nombre, 
                                start: c.fecha, 
                                backgroundColor: c.estado === 'Finalizada' ? '#1a1a1a' : '#d4af37',
                                borderColor: c.estado === 'Finalizada' ? '#222' : '#aa8c2c',
                                extendedProps: c 
                            });
                        });
                        success(evs);
                        renderListAndStats(citas);
                        renderBloqueosLista(bloqueos);
                    });
                },
                dateClick: (info) => { if(calendar.view.type === 'dayGridMonth'){ fechaVisualizada = info.dateStr; calendar.refetchEvents(); } },
                selectable: true,
                select: (info) => {
                    if(info.view.type !== 'dayGridMonth'){
                        selectedDateTime = info.startStr.substring(0,16);
                        document.getElementById('add-fecha-display').innerText = info.start.toLocaleString();
                        document.getElementById('modalAddCita').style.display='flex';
                    }
                },
                eventClick: (info) => {
                    if(info.event.display === 'background') return;
                    currentEditingId = info.event.id;
                    const m = info.event.extendedProps;
                    
                    document.getElementById('pop-nombre').innerText = m.nombre;
                    document.getElementById('pop-fecha').innerText = new Date(m.fecha).toLocaleString();
                    document.getElementById('pop-detalle-corte').innerText = m.servicio + " - Q" + m.precio;
                    
                    // PREPARAR EDICIÓN
                    document.getElementById('edit-nombre').value = m.nombre;
                    document.getElementById('edit-precio').value = m.precio;
                    document.getElementById('edit-nota').value = m.nota || "";
                    itiEdit.setNumber(m.whatsapp || "");

                    // Auto-seleccionar servicio actual por default
                    const sel = document.getElementById('edit-servicio-select');
                    for(let i=0; i<sel.options.length; i++) if(sel.options[i].text.includes(m.servicio)) sel.selectedIndex = i;

                    document.getElementById('modalEvento').style.display='flex';
                    document.getElementById('pop-whatsapp').onclick = () => {
                        const n = m.whatsapp.replace(/\D/g,'');
                        window.open(`https://wa.me/${n}?text=Hola ${m.nombre}, recordatorio de tu cita en Innovation Barber Studio.`);
                    };
                }
            });
            calendar.render();

            // Sincronizar Configuración
            onValue(ref(db, 'configuracion'), s => {
                const c = s.val(); if(c){
                    calendar.setOption('slotMinTime', c.abrir.padStart(2,'0')+':00:00');
                    calendar.setOption('slotMaxTime', c.cerrar.padStart(2,'0')+':00:00');
                    document.getElementById('cfg-abrir').value = c.abrir;
                    document.getElementById('cfg-cerrar').value = c.cerrar;
                    document.getElementById('cfg-lunch-ini').value = c.lunch_ini;
                    document.getElementById('cfg-lunch-fin').value = c.lunch_fin;
                }
            });

            // Sincronizar Catálogo
            onValue(ref(db, 'servicios'), s => {
                catalogoGlobal = s.val() || {};
                const sA = document.getElementById('add-servicio-select');
                const sE = document.getElementById('edit-servicio-select');
                sA.innerHTML = '<option value="">Selecciona Servicio...</option>';
                sE.innerHTML = '<option value="">(Sin cambios)</option>';
                Object.keys(catalogoGlobal).forEach(id => {
                    const opt = `<option value="${id}">${catalogoGlobal[id].nombre} - Q${catalogoGlobal[id].precio}</option>`;
                    sA.innerHTML += opt; sE.innerHTML += opt;
                });
            });
        }

        function renderListAndStats(data) {
            const lista = document.getElementById('lista-citas');
            const desglose = document.getElementById('desglose-servicios');
            lista.innerHTML = ''; desglose.innerHTML = '';
            
            let finMes = 0, ingMes = 0, pendDia = 0;
            const mesActual = new Date().getMonth();
            const añoActual = new Date().getFullYear();

            Object.keys(data).forEach(id => {
                const c = data[id];
                const f = new Date(c.fecha);
                
                if(c.estado==='Finalizada' && f.getMonth()===mesActual && f.getFullYear()===añoActual){
                    finMes++; ingMes += parseFloat(c.precio);
                }

                if(c.estado!=='Finalizada' && c.fecha.startsWith(fechaVisualizada)){
                    pendDia++;
                    const card = document.createElement('div');
                    card.style.background="#0a0a0a"; card.style.padding="15px"; card.style.borderRadius="20px"; card.style.borderLeft="4px solid var(--gold)"; card.style.display="flex"; card.style.justifyContent="space-between"; card.style.alignItems="center";
                    card.innerHTML = `<div><b style="color:var(--gold);">${c.fecha.split('T')[1]}</b><br>${c.nombre}</div><button onclick="cambiarEstado('${id}','Finalizada')" style="background:var(--green); border:none; padding:8px 15px; border-radius:10px; font-weight:bold; cursor:pointer;">FIN</button>`;
                    lista.appendChild(card);
                }
            });

            document.getElementById('citas-count').innerText = finMes;
            document.getElementById('ingreso-total').innerText = 'Q' + ingMes.toFixed(2);
            document.getElementById('count-pendientes').innerText = pendDia;
            document.getElementById('label-pendientes').innerText = "Pendientes " + fechaVisualizada.split('-').reverse().slice(0,2).join('/');
        }

        function renderBloqueosLista(bloqueos){
            const cont = document.getElementById('lista-bloqueos');
            cont.innerHTML = '';
            Object.keys(bloqueos).forEach(fecha => {
                const div = document.createElement('div');
                div.className = 'item-bloqueo';
                div.innerHTML = `<span><i class="fas fa-calendar-times"></i> ${fecha}</span><button class="btn-x" onclick="eliminarBloqueo('${fecha}')"><i class="fas fa-times-circle"></i></button>`;
                cont.appendChild(div);
            });
        }

        // FUNCIONES DE ACCIÓN
        window.eliminarBloqueo = (f) => remove(ref(db, 'bloqueos/'+f));
        window.cambiarEstado = (id, e) => update(ref(db, 'citas/'+id), {estado: e});
        window.cerrarModalAdd = () => document.getElementById('modalAddCita').style.display='none';
        window.cerrarPop = () => { document.getElementById('modalEvento').style.display='none'; salirModoEdicion(); };
        window.entrarModoEdicion = () => { document.getElementById('view-mode').style.display='none'; document.getElementById('edit-mode').style.display='block'; };
        window.salirModoEdicion = () => { document.getElementById('view-mode').style.display='block'; document.getElementById('edit-mode').style.display='none'; };

        document.getElementById('btn-save-cfg').onclick = () => {
            set(ref(db, 'configuracion'), {
                abrir: document.getElementById('cfg-abrir').value,
                cerrar: document.getElementById('cfg-cerrar').value,
                lunch_ini: document.getElementById('cfg-lunch-ini').value,
                lunch_fin: document.getElementById('cfg-lunch-fin').value
            }).then(() => showToast("HORARIOS ACTUALIZADOS"));
        };

        document.getElementById('btn-bloquear-dia').onclick = () => {
            const f = document.getElementById('cfg-bloquear-fecha').value;
            if(f) set(ref(db, 'bloqueos/'+f), true).then(() => showToast("DÍA BLOQUEADO"));
        };

        document.getElementById('btn-save-cita-main').onclick = () => {
            const sk = document.getElementById('add-servicio-select').value;
            const nom = document.getElementById('add-nombre').value;
            if(!sk || !nom) return showToast("FALTAN DATOS");
            
            const cita = {
                nombre: nom,
                whatsapp: itiAdd.getNumber(),
                servicio: catalogoGlobal[sk].nombre,
                precio: catalogoGlobal[sk].precio,
                fecha: selectedDateTime,
                estado: "Pendiente",
                nota: document.getElementById('add-nota').value
            };
            push(ref(db, 'citas'), cita).then(() => { cerrarModalAdd(); showToast("CITA AGENDADA"); });
        };

        document.getElementById('btn-update-cita').onclick = () => {
            const sk = document.getElementById('edit-servicio-select').value;
            const up = { 
                nombre: document.getElementById('edit-nombre').value, 
                whatsapp: itiEdit.getNumber(), 
                precio: document.getElementById('edit-precio').value,
                nota: document.getElementById('edit-nota').value
            };
            if(sk){ 
                up.servicio = catalogoGlobal[sk].nombre; 
                up.precio = catalogoGlobal[sk].precio; 
            }
            update(ref(db, 'citas/'+currentEditingId), up).then(() => { cerrarPop(); showToast("CITA ACTUALIZADA"); });
        };

        document.getElementById('btn-eliminar-pop').onclick = () => {
            if(confirm("¿Seguro que deseas eliminar esta cita?")){
                remove(ref(db, 'citas/'+currentEditingId)).then(cerrarPop);
            }
        };

        document.getElementById('btn-add-serv').onclick = () => {
            const n = document.getElementById('serv-n').value;
            const p = document.getElementById('serv-p').value;
            if(n && p) push(ref(db, 'servicios'), { nombre: n, precio: p }).then(()=>showToast("SERVICIO AÑADIDO"));
        };
    </script>
</body>
</html>
