<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin | Elite Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/es.global.min.js"></script>
    
    <style>
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --gold: #d4af37; 
            --gold-dark: #aa8c2c; 
            --border: #1a1a1a; 
            --green: #2ecc71; 
            --red: #ff4d4d; 
            --glass: rgba(10, 10, 10, 0.98); 
        }

        /* ESTILOS BASE */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        /* LOGIN OVERLAY */
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .login-box { 
            width: 320px; 
            padding: 45px; 
            text-align: center; 
            background: var(--card); 
            border-radius: 35px; 
            border: 1px solid var(--border); 
            box-shadow: 0 0 40px rgba(212,175,55,0.05); 
        }

        /* CONTENIDO PRINCIPAL */
        #admin-content { 
            display: none; 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        .main-grid { 
            display: grid; 
            grid-template-columns: 1fr 340px; 
            gap: 25px; 
            margin-top: 10px; 
        }

        @media (max-width: 1000px) { 
            .main-grid { 
                grid-template-columns: 1fr; 
            } 
        }

        /* CALENDARIO */
        #calendar-container { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 35px; 
            border: 1px solid var(--border); 
        }

        .fc { 
            --fc-border-color: #161616; 
            --fc-today-bg-color: rgba(212,175,55,0.02); 
            font-size: 0.8rem; 
        }

        .fc .fc-toolbar-title { 
            font-size: 1rem !important; 
            text-transform: uppercase; 
            color: var(--gold); 
            font-weight: 600; 
        }

        .fc-event-main { 
            font-weight: 600; 
            font-size: 0.75rem !important; 
            line-height: 1.1; 
            display: flex; 
            align-items: center; 
            padding: 2px 5px; 
            cursor: pointer; 
        }

        /* SIDEBAR Y ESTADÍSTICAS */
        .sidebar-stats { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 35px; 
            padding: 30px; 
            border-top: 5px solid var(--gold); 
            position: sticky; 
            top: 15px; 
            height: fit-content; 
        }

        .sidebar-logo { 
            width: 90px; 
            margin-bottom: 15px; 
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.15)); 
        }

        .stat-val { 
            font-size: 2.2rem; 
            font-weight: 600; 
            color: var(--gold); 
        }

        .stat-label { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: #555; 
            letter-spacing: 2px; 
        }

        #desglose-servicios { 
            margin-top: 10px; 
            border-top: 1px solid #1a1a1a; 
            padding-top: 10px; 
        }

        .serv-stat-item { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.65rem; 
            color: #888; 
            margin-top: 4px; 
            text-transform: uppercase; 
        }

        /* LISTADO DE CITAS (CARDS) */
        .citas-list { 
            margin-top: 40px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 320px)); 
            gap: 15px; 
            padding-bottom: 100px; 
            justify-content: start; 
        }

        .card { 
            background: #060606; 
            border: 1px solid var(--border); 
            padding: 12px 15px; 
            border-radius: 18px; 
            border-left: 3px solid var(--gold); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        /* MODALES */
        .modal { 
            display: none; 
            position: fixed; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.94); 
            backdrop-filter: blur(12px); 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
        }

        .modal-content { 
            background: var(--glass); 
            padding: 35px; 
            border: 1px solid var(--gold); 
            width: 90%; 
            max-width: 380px; 
            border-radius: 40px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }

        /* FORMULARIOS */
        input, select, textarea { 
            background: rgba(255,255,255,0.03); 
            color: #fff; 
            border: 1px solid #1a1a1a; 
            padding: 12px; 
            border-radius: 15px; 
            width: 100%; 
            margin-bottom: 10px; 
            outline: none; 
            font-family: 'Poppins'; 
            box-sizing: border-box; 
            font-size: 0.8rem; 
        }

        /* BOTONES */
        .btn { 
            width: 100%; 
            padding: 16px; 
            border-radius: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s; 
        }

        .btn-gold { 
            background: linear-gradient(135deg, var(--gold), var(--gold-dark)); 
            color: #000; 
        }

        .btn-outline { 
            background: transparent; 
            border: 1px solid #333; 
            color: #777; 
            margin-top: 10px; 
        }

        .btn-red { 
            background: rgba(255, 77, 77, 0.1); 
            border: 1px solid var(--red); 
            color: var(--red); 
        }

        .btn-mini { 
            width: auto; 
            padding: 5px 10px; 
            border-radius: 8px; 
            font-size: 0.55rem; 
            font-weight: 700; 
            background: var(--green); 
            color: #000; 
            border: none; 
            cursor: pointer; 
        }

        .btn-config-float { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: var(--gold); 
            color: #000; 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem; 
            z-index: 5000; 
            border: none; 
            cursor: pointer; 
        }

        /* NOTIFICACIONES TOAST */
        #toast { 
            position: fixed; 
            bottom: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: var(--gold); 
            color: #000; 
            padding: 14px 40px; 
            border-radius: 50px; 
            font-weight: 700; 
            z-index: 11000; 
            transition: 0.6s; 
            font-size: 0.8rem; 
        }

        #toast.show { 
            bottom: 40px; 
        }
    </style>
</head>
<body>

    <div id="toast">MENSAJE</div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" style="width: 80px; margin-bottom: 20px;">
            <button class="btn btn-gold" onclick="loginGoogle()">Entrar al Sistema</button>
        </div>
    </div>

    <div id="admin-content">
        <button class="btn-config-float" onclick="toggleConfig()">
            <i class="fas fa-cog"></i>
        </button>

        <div class="main-grid">
            <div id="calendar-container">
                <div id="calendar"></div>
            </div>

            <aside class="sidebar-stats">
                <header style="text-align: center; margin-bottom:30px;">
                    <img src="logo.png" class="sidebar-logo">
                </header>

                <div style="margin-bottom:20px;">
                    <span class="stat-label">Finalizados Mes</span><br>
                    <span class="stat-val" id="citas-count">0</span>
                    <div id="desglose-servicios"></div>
                </div>

                <div style="margin-bottom:20px; background: rgba(212, 175, 55, 0.05); padding: 15px; border-radius: 20px;">
                    <span class="stat-label">Pendientes Hoy</span><br>
                    <span class="stat-val" id="count-pendientes" style="font-size: 1.5rem;">0</span>
                </div>

                <div style="background: rgba(46, 204, 113, 0.05); padding: 20px; border-radius: 20px;">
                    <span class="stat-label" style="color:var(--green);">Ingresos Mes</span><br>
                    <span class="stat-val" id="ingreso-total" style="color:var(--green);">Q0.00</span>
                </div>
            </aside>
        </div>

        <div class="citas-list" id="lista-citas"></div>

        <div id="modalAddCita" class="modal">
            <div class="modal-content">
                <h3 style="color:var(--gold);">NUEVA CITA</h3>
                <p id="add-fecha-display" style="font-size: 0.8rem; color: #666;"></p>
                <input type="text" id="add-nombre" placeholder="Nombre Cliente">
                <input type="tel" id="add-whatsapp-input">
                <select id="add-servicio-select"></select>
                <textarea id="add-nota" placeholder="Nota especial" rows="2"></textarea>
                <button class="btn btn-gold" id="btn-save-cita-calendar">AGENDAR</button>
                <button class="btn btn-outline" onclick="cerrarModalAdd()">CANCELAR</button>
            </div>
        </div>
        
        <div id="modalEvento" class="modal">
            <div class="modal-content">
                <div id="view-mode">
                    <h3 id="pop-nombre" style="color:var(--gold);">Cita</h3>
                    <p id="pop-fecha" style="font-size:0.8rem; color:#555;"></p>
                    <div id="pop-detalle-corte" style="margin: 15px 0;"></div>
                    <div id="pop-whatsapp" style="font-size:0.9rem; color:var(--green); font-weight:600; cursor:pointer; background:rgba(46, 204, 113, 0.05); padding:18px; border-radius:20px; margin-bottom:20px;">
                        <i class="fab fa-whatsapp"></i> RECORDATORIO
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <button class="btn btn-gold" onclick="entrarModoEdicion()" style="padding:12px;">EDITAR</button>
                        <button class="btn btn-red" id="btn-eliminar-pop" style="padding:12px;">BORRAR</button>
                    </div>
                    <button class="btn btn-outline" onclick="cerrarPop()">CERRAR</button>
                </div>

                <div id="edit-mode" style="display:none;">
                    <h3 style="color:var(--gold);">EDITAR DATOS</h3>
                    <input type="text" id="edit-nombre" placeholder="Nombre">
                    <input type="text" id="edit-whatsapp" placeholder="WhatsApp">
                    <select id="edit-servicio-select"></select>
                    <input type="number" id="edit-precio" placeholder="Precio (Q)">
                    <textarea id="edit-nota" placeholder="Nota" rows="2"></textarea>
                    <button class="btn btn-gold" id="btn-update-cita">GUARDAR CAMBIOS</button>
                    <button class="btn btn-outline" onclick="salirModoEdicion()">CANCELAR</button>
                </div>
            </div>
        </div>

        <div id="modalConfig" class="modal">
            <div class="modal-content" style="max-width: 420px; max-height: 90vh; overflow-y: auto;">
                <h3 style="color:var(--gold);">CONFIGURACIÓN</h3>
                
                <p style="font-size: 0.7rem; color: #555;">HORARIO LABORAL</p>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <select id="config-apertura"></select>
                    <select id="config-cierre"></select>
                </div>
                <button class="btn btn-gold" id="btn-save-hours">GUARDAR HORARIO</button>

                <hr style="border:0; border-top:1px solid #1a1a1a; margin:20px 0;">

                <p style="font-size: 0.7rem; color: #555;">GESTIÓN DE SERVICIOS</p>
                <input type="text" id="serv-n" placeholder="Nombre Servicio">
                <input type="number" id="serv-p" placeholder="Precio (Q)">
                <button class="btn btn-gold" id="btn-add-serv">AÑADIR SERVICIO</button>
                <div id="lista-servicios-admin" style="margin-top:20px;"></div>

                <button class="btn btn-outline" onclick="toggleConfig()">SALIR</button>
            </div>
        </div>

        <div id="modalConfirm" class="modal">
            <div class="modal-content" style="max-width: 320px;">
                <p id="confirm-text" style="font-size: 0.9rem; margin-bottom: 25px;"></p>
                <div style="display:flex; gap:12px;">
                    <button class="btn btn-red" id="confirm-yes" style="padding: 12px;">SÍ, ELIMINAR</button>
                    <button class="btn btn-outline" onclick="document.getElementById('modalConfirm').style.display='none'" style="padding: 12px; margin: 0;">NO</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", 
            authDomain: "innovation-barber-studio.firebaseapp.com", 
            projectId: "innovation-barber-studio", 
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        
        // VARIABLES GLOBALES
        let calendar;
        let selectedDateTime = null;
        let catalogoGlobal = {};
        let iti;
        let currentEditingId = null;

        // INICIALIZACIÓN DE COMPONENTES
        iti = window.intlTelInput(document.querySelector("#add-whatsapp-input"), { 
            initialCountry: "gt", 
            separateDialCode: true 
        });

        // FUNCIONES DE UI
        window.showToast = function(mensaje) { 
            const t = document.getElementById('toast'); 
            t.innerText = mensaje; 
            t.classList.add('show'); 
            setTimeout(() => {
                t.classList.remove('show');
            }, 3000); 
        };

        window.confirmarAccion = function(texto, callback) { 
            document.getElementById('confirm-text').innerText = texto; 
            document.getElementById('modalConfirm').style.display = 'flex'; 
            document.getElementById('confirm-yes').onclick = function() { 
                callback(); 
                document.getElementById('modalConfirm').style.display = 'none'; 
            }; 
        };

        // LLENAR SELECTS DE HORAS
        const apS = document.getElementById('config-apertura');
        const ciS = document.getElementById('config-cierre');
        for(let h=0; h<=23; h++){ 
            const opt = document.createElement('option');
            opt.value = h;
            opt.innerText = h + ":00";
            apS.appendChild(opt.cloneNode(true));
            ciS.appendChild(opt);
        }

        // LÓGICA DE AUTENTICACIÓN
        window.loginGoogle = function() {
            signInWithPopup(auth, provider);
        };

        window.toggleConfig = function() { 
            const m = document.getElementById('modalConfig'); 
            if (m.style.display === 'flex') {
                m.style.display = 'none';
            } else {
                m.style.display = 'flex';
            }
        };

        onAuthStateChanged(auth, (user) => { 
            if(user){ 
                document.getElementById('login-overlay').style.display = 'none'; 
                document.getElementById('admin-content').style.display = 'block'; 
                initDashboard(); 
            } 
        });

        // INICIALIZACIÓN DEL DASHBOARD
        function initDashboard() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay', 
                locale: 'es', 
                allDaySlot: false, 
                slotDuration: '00:30:00',
                headerToolbar: { 
                    left: 'prev,next today', 
                    center: 'title', 
                    right: 'dayGridMonth,timeGridWeek,timeGridDay' 
                },
                selectable: true,
                select: function(info) {
                    if(info.view.type !== 'dayGridMonth'){
                        const fecha = info.startStr.split('T')[0];
                        const hora = info.start.getHours().toString().padStart(2,'0');
                        const min = info.start.getMinutes().toString().padStart(2,'0');
                        selectedDateTime = fecha + 'T' + hora + ':' + min;
                        
                        document.getElementById('add-fecha-display').innerText = info.start.toLocaleString('es-GT');
                        document.getElementById('modalAddCita').style.display = 'flex';
                    }
                },
                eventClick: function(info) {
                    currentEditingId = info.event.id;
                    const meta = info.event.extendedProps;
                    const fTxt = info.event.start.toLocaleString('es-GT', { 
                        weekday: 'long', 
                        day: 'numeric', 
                        month: 'long', 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                    
                    document.getElementById('pop-nombre').innerText = meta.nombre;
                    document.getElementById('pop-fecha').innerText = fTxt;
                    document.getElementById('pop-detalle-corte').innerHTML = `
                        <div style="color:var(--gold); font-weight:600; margin:10px 0;">
                            ${meta.servicio} - Q${meta.precio}
                        </div>
                    ` + (meta.nota ? `<p style="font-size:0.8rem; color:#aaa; font-style:italic;">Nota: ${meta.nota}</p>` : "");
                    
                    document.getElementById('pop-whatsapp').onclick = function() {
                        const num = meta.whatsapp.replace(/\D/g,'');
                        const msg = encodeURIComponent('Hola ' + meta.nombre + ', te recordamos tu cita en Innovation Barber Studio...');
                        window.open('https://wa.me/' + num + '?text=' + msg);
                    };
                    
                    // Llenar campos de edición
                    document.getElementById('edit-nombre').value = meta.nombre;
                    document.getElementById('edit-whatsapp').value = meta.whatsapp;
                    document.getElementById('edit-precio').value = meta.precio;
                    document.getElementById('edit-nota').value = meta.nota || "";

                    document.getElementById('modalEvento').style.display = 'flex';
                    
                    document.getElementById('btn-eliminar-pop').onclick = function() {
                        confirmarAccion("¿Seguro que quieres eliminar esta cita?", function() {
                            remove(ref(db, 'citas/' + currentEditingId)).then(cerrarPop);
                        });
                    };
                }
            });
            calendar.render();

            // Escuchar configuración de horario
            onValue(ref(db, 'configuracion_horario'), (snapshot) => { 
                const config = snapshot.val();
                if(config){ 
                    calendar.setOption('slotMinTime', config.apertura.padStart(2,'0') + ':00:00'); 
                    calendar.setOption('slotMaxTime', config.cierre.padStart(2,'0') + ':00:00'); 
                    apS.value = config.apertura;
                    ciS.value = config.cierre;
                } 
            });

            // Escuchar citas
            onValue(ref(db, 'citas'), (snapshot) => {
                renderAdmin(snapshot.val());
            });

            // Escuchar servicios
            onValue(ref(db, 'servicios'), (snapshot) => {
                renderServicios(snapshot.val() || {});
            });
        }

        // RENDERIZADO DE DATOS
        function renderAdmin(data) {
            const lista = document.getElementById('lista-citas');
            const cCount = document.getElementById('citas-count');
            const iTotal = document.getElementById('ingreso-total');
            const pCount = document.getElementById('count-pendientes');
            const desglose = document.getElementById('desglose-servicios');
            
            lista.innerHTML = ''; 
            desglose.innerHTML = '';
            
            let finalizadosMes = 0;
            let ingresosMes = 0;
            let pendientesHoy = 0;
            let eventosCalendar = [];
            let contadorServicios = {};

            const ahora = new Date();
            const mesActual = ahora.getMonth();
            const añoActual = ahora.getFullYear();
            const hoyIso = ahora.toISOString().split('T')[0];

            if(data){
                Object.keys(data).forEach(id => {
                    const cita = data[id];
                    const fCita = new Date(cita.fecha);
                    const esFinalizada = cita.estado === 'Finalizada';

                    // Cálculos del mes
                    if(esFinalizada && fCita.getMonth() === mesActual && fCita.getFullYear() === añoActual) { 
                        finalizadosMes++; 
                        ingresosMes += parseFloat(cita.precio || 0); 
                        contadorServicios[cita.servicio] = (contadorServicios[cita.servicio] || 0) + 1; 
                    }

                    // Cálculo de pendientes hoy
                    if(!esFinalizada && cita.fecha.startsWith(hoyIso)) {
                        pendientesHoy++;
                    }

                    // Preparar evento para calendario
                    eventosCalendar.push({ 
                        id: id, 
                        title: cita.nota ? cita.nombre + ' (' + cita.nota + ')' : cita.nombre, 
                        start: cita.fecha, 
                        backgroundColor: esFinalizada ? '#1a1a1a' : '#d4af37', 
                        textColor: esFinalizada ? '#555' : '#000', 
                        extendedProps: { ...cita } 
                    });
                    
                    // Renderizar en lista de pendientes (inferior)
                    if(!esFinalizada){
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div>
                                <h4 style="margin:0; font-size:0.75rem;">${cita.nombre}</h4>
                                ${cita.nota ? `<p style="margin:2px 0 0; font-size:0.6rem; color:#555;">${cita.nota}</p>` : ""}
                            </div>
                            <button class="btn-mini" onclick="cambiarEstado('${id}','Finalizada')">FIN</button>
                        `;
                        lista.appendChild(card);
                    }
                });
            }

            // Actualizar UI lateral
            Object.keys(contadorServicios).forEach(serv => {
                desglose.innerHTML += `
                    <div class="serv-stat-item">
                        <span>${serv}</span>
                        <span>x${contadorServicios[serv]}</span>
                    </div>
                `;
            });

            cCount.innerText = finalizadosMes;
            iTotal.innerText = 'Q' + ingresosMes.toFixed(2);
            pCount.innerText = pendientesHoy;

            calendar.removeAllEvents();
            calendar.addEventSource(eventosCalendar);
        }

        // FUNCIONES DE EDICIÓN Y ESTADO
        window.entrarModoEdicion = function() { 
            document.getElementById('view-mode').style.display = 'none'; 
            document.getElementById('edit-mode').style.display = 'block'; 
        };

        window.salirModoEdicion = function() { 
            document.getElementById('view-mode').style.display = 'block'; 
            document.getElementById('edit-mode').style.display = 'none'; 
        };

        document.getElementById('btn-update-cita').onclick = function() {
            const servSelect = document.getElementById('edit-servicio-select');
            const updateData = {
                nombre: document.getElementById('edit-nombre').value,
                whatsapp: document.getElementById('edit-whatsapp').value,
                precio: document.getElementById('edit-precio').value,
                nota: document.getElementById('edit-nota').value
            };

            if(servSelect.value) {
                updateData.servicio = catalogoGlobal[servSelect.value].nombre;
            }

            update(ref(db, 'citas/' + currentEditingId), updateData).then(() => { 
                showToast("CAMBIOS GUARDADOS"); 
                cerrarPop(); 
            });
        };

        window.cambiarEstado = function(id, nuevoEstado) { 
            update(ref(db, 'citas/' + id), { estado: nuevoEstado }).then(() => {
                showToast("CLIENTE FINALIZADO");
            });
        };

        window.cerrarPop = function() { 
            document.getElementById('modalEvento').style.display = 'none'; 
            salirModoEdicion(); 
        };

        window.cerrarModalAdd = function() { 
            document.getElementById('modalAddCita').style.display = 'none'; 
        };

        // GESTIÓN DE SERVICIOS
        function renderServicios(servs){
            catalogoGlobal = servs;
            const selAdd = document.getElementById('add-servicio-select');
            const selEdit = document.getElementById('edit-servicio-select');
            const listaAdmin = document.getElementById('lista-servicios-admin');
            
            selAdd.innerHTML = '<option value="">Elegir servicio...</option>';
            selEdit.innerHTML = '<option value="">Cambiar servicio (Opcional)</option>';
            listaAdmin.innerHTML = '';

            Object.keys(servs).forEach(id => {
                const s = servs[id];
                const optHtml = `<option value="${id}">${s.nombre} (Q${s.precio})</option>`;
                selAdd.innerHTML += optHtml;
                selEdit.innerHTML += optHtml;

                // Lista para borrar servicios en configuración
                const item = document.createElement('div');
                item.style.cssText = "display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #111; font-size:0.8rem;";
                item.innerHTML = `
                    <span>${s.nombre} (Q${s.precio})</span>
                    <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="eliminarServicio('${id}')"></i>
                `;
                listaAdmin.appendChild(item);
            });
        }

        window.eliminarServicio = function(id) {
            confirmarAccion("¿Eliminar este servicio del catálogo?", function() {
                remove(ref(db, 'servicios/' + id));
            });
        };

        document.getElementById('btn-add-serv').onclick = function() {
            const n = document.getElementById('serv-n').value;
            const p = document.getElementById('serv-p').value;
            if(n && p) {
                push(ref(db, 'servicios'), { nombre: n, precio: p }).then(() => {
                    document.getElementById('serv-n').value = '';
                    document.getElementById('serv-p').value = '';
                    showToast("SERVICIO AÑADIDO");
                });
            }
        };

        // ACCIONES FINALES
        document.getElementById('btn-save-cita-calendar').onclick = function() {
            const nombre = document.getElementById('add-nombre').value;
            const sKey = document.getElementById('add-servicio-select').value;
            
            if(!nombre || !sKey) {
                return showToast("FALTA NOMBRE O SERVICIO");
            }

            const servicio = catalogoGlobal[sKey];
            const nuevaCita = {
                nombre: nombre,
                whatsapp: iti.getNumber(),
                servicio: servicio.nombre,
                precio: servicio.precio,
                fecha: selectedDateTime,
                estado: "Pendiente",
                nota: document.getElementById('add-nota').value
            };

            push(ref(db, 'citas'), nuevaCita).then(() => {
                cerrarModalAdd();
                showToast("CITA AGENDADA");
            });
        };

        document.getElementById('btn-save-hours').onclick = function() { 
            set(ref(db, 'configuracion_horario'), { 
                apertura: apS.value, 
                cierre: ciS.value 
            }).then(() => {
                showToast("HORARIO ACTUALIZADO");
            });
        };
    </script>
</body>
</html>
