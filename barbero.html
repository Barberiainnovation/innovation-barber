<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Innovation Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        header { text-align: center; margin-bottom: 25px; }
        .logo { width: 80px; }

        /* VISIBILIDAD DE DÍAS */
        .fc-col-header { background-color: #000 !important; }
        .fc-col-header-cell { background-color: #000 !important; border: 1px solid var(--border) !important; }
        .fc-col-header-cell-cushion { color: #fff !important; text-transform: capitalize !important; font-weight: 600; display: block; padding: 10px 0 !important; text-decoration: none !important; }
        .fc-daygrid-day-number { color: #fff !important; text-decoration: none !important; }

        /* CALENDARIO Y LISTAS */
        #calendar-container { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 40px; }
        .card { background: #111; border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--gold); }
        
        /* SECCIÓN GESTIÓN SERVICIOS */
        .admin-section { max-width: 500px; margin: 40px auto; padding: 20px; background: var(--card); border-radius: 15px; border: 1px solid var(--gold); }
        .admin-section h3 { color: var(--gold); text-transform: uppercase; font-size: 0.9rem; margin-top: 0; }
        .service-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .btn-del { color: #ff4444; cursor: pointer; font-weight: bold; }
        input[type="text"] { width: 70%; padding: 8px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }
        
        .btn { padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 0.7rem; }
        .btn-accept { background: var(--gold); color: #000; }
        .btn-finish { background: transparent; color: #555; border: 1px solid #333; margin-top: 5px; }
        .btn-add { background: var(--gold); color: #000; padding: 8px 15px; }
    </style>
</head>
<body>
    <header><img src="logo.png" alt="Logo" class="logo"><h2>Admin Panel</h2></header>
    
    <div id="calendar-container"><div id="calendar"></div></div>

    <div style="max-width:500px; margin:auto;"><div id="lista-citas"></div></div>

    <div class="admin-section">
        <h3>Gestión de Servicios</h3>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="nuevo-servicio" placeholder="Nombre del servicio">
            <button class="btn btn-add" onclick="agregarServicio()">Añadir</button>
        </div>
        <div id="lista-servicios-admin"></div>
    </div>

    <audio id="notif-sound" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2210/2210-preview.mp3" type="audio/mpeg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let calendar;

        // Iniciar Calendario
        document.addEventListener('DOMContentLoaded', () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'es', height: 'auto', navLinks: true,
                slotMinTime: '06:00:00', slotMaxTime: '22:00:00', nowIndicator: true,
                navLinkDayClick: (date) => calendar.changeView('timeGridDay', date),
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridDay' },
                buttonText: { today: 'Hoy', month: 'Mes', day: 'Día' }
            });
            calendar.render();
        });

        // Escuchar Citas
        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            renderCitas(data);
        });

        // Escuchar Servicios
        onValue(ref(db, 'servicios'), (snapshot) => {
            const servicios = snapshot.val();
            const div = document.getElementById('lista-servicios-admin');
            div.innerHTML = '';
            if(servicios) {
                Object.keys(servicios).forEach(id => {
                    div.innerHTML += `<div class="service-item">${servicios[id]} <span class="btn-del" onclick="eliminarServicio('${id}')">✕</span></div>`;
                });
            }
        });

        function renderCitas(data) {
            const lista = document.getElementById('lista-citas');
            lista.innerHTML = '';
            const eventos = [];
            if (!data) return;
            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;
                eventos.push({ title: `${c.nombre} | ${c.servicio}`, start: c.fecha, backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : '#222', textColor: c.estado === 'Aceptada' ? '#000' : '#fff' });
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div style="font-size:0.6rem; color:var(--gold); float:right">${c.estado}</div><h3>${c.nombre}</h3><p>💈 ${c.servicio}</p><p>📅 ${new Date(c.fecha).toLocaleString()}</p>
                ${c.estado === 'Pendiente' ? `<button class="btn btn-accept" onclick="cambiarEstado('${id}', 'Aceptada')">Aceptar</button>` : `<button class="btn btn-finish" onclick="cambiarEstado('${id}', 'Finalizada')">Terminar</button>`}`;
                lista.appendChild(card);
            });
            calendar.removeAllEvents(); calendar.addEventSource(eventos);
        }

        window.agregarServicio = () => {
            const input = document.getElementById('nuevo-servicio');
            if(input.value) { push(ref(db, 'servicios'), input.value); input.value = ''; }
        };

        window.eliminarServicio = (id) => { if(confirm('¿Eliminar servicio?')) remove(ref(db, `servicios/${id}`)); };

        window.cambiarEstado = (id, estado) => {
            get(ref(db, `citas/${id}`)).then((snap) => {
                const c = snap.val();
                if (c && estado === 'Aceptada') window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent('Cita confirmada: ' + c.servicio)}`, '_blank');
                update(ref(db, `citas/${id}`), { estado });
            });
        };
    </script>
</body>
</html>
