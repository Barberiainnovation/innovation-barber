<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Admin | Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; --text-dim: #888; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        header { text-align: center; margin: 20px 0 30px; }
        .logo { width: 70px; }
        h2 { font-weight: 300; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; font-size: 0.8rem; margin-top: 10px; }

        /* --- CALENDARIO PREMIUM --- */
        #calendar-container { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.8); margin-bottom: 40px; 
        }

        /* Corrección visibilidad Días y Horas */
        .fc-col-header { background-color: #000 !important; }
        .fc-col-header-cell-cushion { color: #fff !important; text-transform: capitalize !important; font-weight: 600; font-size: 0.8rem; padding: 10px 0 !important; text-decoration: none !important; display: block !important; }
        .fc-timegrid-slot-label-cushion { color: var(--text-dim) !important; font-size: 0.7rem !important; }
        .fc-daygrid-day-number { color: #fff !important; text-decoration: none !important; font-size: 0.8rem; padding: 8px !important; }
        
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid #111 !important; }
        .fc-day-today { background: transparent !important; }
        .fc-timegrid-now-indicator-line { border-color: var(--gold) !important; border-width: 2px !important; }

        /* Estilo Eventos */
        .fc-event { border: none !important; border-radius: 8px !important; padding: 4px 8px !important; font-weight: 600 !important; font-size: 0.7rem !important; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Botones FullCalendar */
        .fc-button { background: transparent !important; border: 1px solid var(--border) !important; color: var(--gold) !important; border-radius: 12px !important; text-transform: uppercase !important; font-size: 0.6rem !important; font-weight: 600 !important; letter-spacing: 1px !important; }
        .fc-button-active { background: var(--gold) !important; color: #000 !important; }
        .fc-toolbar-title { color: var(--gold) !important; font-size: 1rem !important; font-weight: 600 !important; text-transform: uppercase; }

        /* --- LISTA DE CITAS Y SERVICIOS --- */
        .admin-box { max-width: 500px; margin: 0 auto 20px; }
        .card { 
            background: linear-gradient(145deg, #111, #080808); border: 1px solid var(--border); 
            padding: 20px; border-radius: 18px; margin-bottom: 15px; border-left: 4px solid var(--gold); 
        }
        .card h3 { margin: 0; font-size: 0.9rem; letter-spacing: 1px; }
        .card p { margin: 5px 0; font-size: 0.75rem; color: var(--text-dim); }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; font-size: 0.65rem; letter-spacing: 1px; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; color: #444; border: 1px solid #222; }

        .service-editor { background: var(--card); border: 1px solid var(--gold); padding: 20px; border-radius: 18px; margin-top: 40px; }
        .service-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #111; font-size: 0.8rem; color: #ccc; }
        .btn-del { color: #ff4444; cursor: pointer; font-weight: bold; }

        /* Indicador de Sonido */
        #status-audio { position: fixed; bottom: 15px; right: 15px; font-size: 0.55rem; padding: 6px 15px; border-radius: 20px; background: #111; color: #ff4444; border: 1px solid #222; cursor: pointer; letter-spacing: 1px; z-index: 1000; }
        #status-audio.activo { color: #44ff44; border-color: var(--gold); }
    </style>
</head>
<body>
    <header><img src="logo.png" alt="Logo" class="logo"><h2>Innovation Admin</h2></header>
    
    <div id="calendar-container"><div id="calendar"></div></div>

    <div class="admin-box"><div id="lista-citas"></div></div>

    <div class="admin-box service-editor">
        <h3 style="color:var(--gold); font-size:0.75rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:15px;">Gestionar Catálogo</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="nuevo-servicio" placeholder="Nombre servicio" style="flex:1; background:#000; color:#fff; border:1px solid #222; padding:12px; border-radius:10px;">
            <button class="btn-gold" style="width:80px; margin:0; border-radius:10px;" onclick="agregarServicio()">+</button>
        </div>
        <div id="lista-servicios-admin" style="margin-top:15px;"></div>
    </div>

    <div id="status-audio">🔈 SONIDO OFF (CLIC PARA ACTIVAR)</div>
    <audio id="notif-sound" preload="auto" crossorigin="anonymous"><source src="https://assets.mixkit.co/active_storage/sfx/2210/2210-preview.mp3" type="audio/mpeg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let calendar;
        let inicial = true;
        const sound = document.getElementById('notif-sound');

        document.addEventListener('click', () => {
            sound.play().then(() => { sound.pause(); sound.currentTime = 0; document.getElementById('status-audio').innerText = "🔔 SONIDO LISTO"; document.getElementById('status-audio').className = "activo"; });
        }, { once: false });

        document.addEventListener('DOMContentLoaded', () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'es', height: 'auto', navLinks: true,
                slotMinTime: '06:00:00', slotMaxTime: '22:00:00', nowIndicator: true,
                navLinkDayClick: (date) => calendar.changeView('timeGridDay', date),
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridDay' },
                buttonText: { today: 'Hoy', month: 'Mes', day: 'Día' }
            });
            calendar.render();
        });

        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            if(!inicial && data) sound.play().catch(() => {});
            inicial = false;
            renderCitas(data);
        });

        onValue(ref(db, 'servicios'), (snap) => {
            const div = document.getElementById('lista-servicios-admin');
            div.innerHTML = '';
            const servs = snap.val();
            if(servs) Object.keys(servs).forEach(id => {
                div.innerHTML += `<div class="service-item">${servs[id]} <span class="btn-del" onclick="eliminarServicio('${id}')">✕</span></div>`;
            });
        });

        function renderCitas(data) {
            const lista = document.getElementById('lista-citas');
            lista.innerHTML = '';
            const eventos = [];
            if (!data) return;
            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;
                eventos.push({ title: `${c.nombre}`, start: c.fecha, backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : '#222', textColor: c.estado === 'Aceptada' ? '#000' : '#fff' });
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div style="font-size:0.6rem; color:var(--gold); float:right; text-transform:uppercase;">${c.estado}</div><h3>${c.nombre}</h3><p>💈 ${c.servicio}</p><p>📅 ${new Date(c.fecha).toLocaleString([], {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</p>
                ${c.estado === 'Pendiente' ? `<button class="btn btn-gold" onclick="cambiarEstado('${id}', 'Aceptada')">Confirmar</button>` : `<button class="btn btn-outline" onclick="cambiarEstado('${id}', 'Finalizada')">Finalizar</button>`}`;
                lista.appendChild(card);
            });
            calendar.removeAllEvents(); calendar.addEventSource(eventos);
        }

        window.agregarServicio = () => {
            const v = document.getElementById('nuevo-servicio').value;
            if(v) { push(ref(db, 'servicios'), v); document.getElementById('nuevo-servicio').value = ''; }
        };
        window.eliminarServicio = (id) => { if(confirm('¿Borrar?')) remove(ref(db, `servicios/${id}`)); };
        window.cambiarEstado = (id, estado) => {
            get(ref(db, `citas/${id}`)).then(snap => {
                const c = snap.val();
                if(c && estado === 'Aceptada') window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent('¡Hola '+c.nombre+'! Tu cita de '+c.servicio+' ha sido confirmada.')}`);
                update(ref(db, `citas/${id}`), { estado });
            });
        };
    </script>
</body>
</html>
