<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Innovation Barber Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #111; --gold: #d4af37; --white: #fff; --border: #333; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; }
        .logo { width: 100px; margin-bottom: 10px; }
        h2 { letter-spacing: 4px; color: var(--gold); text-transform: uppercase; }
        #calendar-container { width: 100%; max-width: 900px; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 30px; }
        .fc { color: #fff; }
        .fc-toolbar-title { color: var(--gold) !important; }
        .fc-button-primary { background: var(--gold) !important; color: #000 !important; border: none !important; font-weight: bold !important; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--gold); }
        .badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 10px; float: right; font-weight: bold; }
        .actions { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; text-decoration: none; text-align: center; }
        .btn-accept { background: var(--gold); color: #000; }
        .btn-finish { background: #333; color: #fff; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo">
        <h2>Admin Panel</h2>
    </header>

    <div id="calendar-container"><div id="calendar"></div></div>

    <div id="lista-citas" class="container"></div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2210/2210-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let calendar;
        let inicial = true;

        document.addEventListener('DOMContentLoaded', () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridDay', locale: 'es', slotMinTime: '07:00:00', slotMaxTime: '21:00:00',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridDay,dayGridMonth' }
            });
            calendar.render();
        });

        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            if (!inicial && data) document.getElementById('notif-sound').play().catch(()=>{});
            inicial = false;
            render(data);
        });

        function render(data) {
            const lista = document.getElementById('lista-citas');
            lista.innerHTML = '';
            const eventos = [];
            if (!data) return;

            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;

                eventos.push({ title: c.nombre, start: c.fecha, backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : '#444' });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="badge" style="background:${c.estado==='Aceptada'?'#28a745':'#f39c12'}">${c.estado}</span>
                    <h3>${c.nombre}</h3>
                    <p>💈 ${c.servicio} | 📅 ${new Date(c.fecha).toLocaleString()}</p>
                    <div class="actions">
                        ${c.estado === 'Pendiente' ? 
                        `<button class="btn btn-accept" onclick="cambiarEstado('${id}', 'Aceptada')">Aceptar y WhatsApp</button>` : 
                        `<button class="btn btn-finish" onclick="cambiarEstado('${id}', 'Finalizada')">Finalizar</button>`}
                    </div>
                `;
                lista.appendChild(card);
            });
            calendar.removeAllEvents();
            calendar.addEventSource(eventos);
        }

        window.cambiarEstado = (id, estado) => {
            const citaRef = ref(db, `citas/${id}`);
            onValue(citaRef, (snap) => {
                const c = snap.val();
                if (c && estado === 'Aceptada') {
                    const msg = `¡Hola ${c.nombre}! 💈 Te confirmo tu cita para *${c.servicio}* el día *${new Date(c.fecha).toLocaleString()}*. ¡Te esperamos!`;
                    window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
                }
                update(ref(db, `citas/${id}`), { estado });
            }, { onlyOnce: true });
        };
    </script>
</body>
</html>
