<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DIAGNÓSTICO INNOVATION</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .debug-card { border: 1px solid #0f0; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .btn-wa { background: #25d366; color: white; padding: 10px; display: block; text-align: center; text-decoration: none; margin-top: 10px; border-radius: 5px; font-weight: bold; }
        .btn-status { background: #d4af37; color: black; border: none; padding: 10px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>PANEL DE CONTROL (MODO DIAGNÓSTICO)</h1>
    <div id="status">Conectando con Firebase...</div>
    <hr>
    <div id="lista-citas"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            storageBucket: "innovation-barber-studio.firebasestorage.app",
            messagingSenderId: "589786876751",
            appId: "1:589786876751:web:31b40f11b3810470e9933a",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const lista = document.getElementById('lista-citas');
        const status = document.getElementById('status');

        // Escuchar la base de datos
        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            console.log("Datos recibidos:", data);
            
            if (!data) {
                status.innerText = "CONECTADO: No hay datos en la carpeta 'citas'.";
                lista.innerHTML = "";
                return;
            }

            status.innerText = "CONECTADO: Mostrando citas encontradas.";
            lista.innerHTML = "";

            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;

                // Crear el contenedor de la cita
                const div = document.createElement('div');
                div.className = 'debug-card';

                // Forzar el link de WhatsApp si el dato existe
                // Usamos c['whatsapp'] para asegurar que lea la propiedad
                const num = c.whatsapp || "No encontrado";
                const linkWA = `https://wa.me/${num}`;

                div.innerHTML = `
                    <strong>ID:</strong> ${id}<br>
                    <strong>CLIENTE:</strong> ${c.nombre}<br>
                    <strong>WHATSAPP EN DB:</strong> ${num}<br>
                    <strong>ESTADO:</strong> ${c.estado}<br>
                    
                    <a href="${linkWA}" target="_blank" class="btn-wa">ABRIR WHATSAPP DIRECTO</a>
                    
                    <button class="btn-status" onclick="cambiarEstado('${id}', 'Finalizada')">ARCHIVAR CITA</button>
                `;
                lista.appendChild(div);
            });
        }, (error) => {
            status.innerText = "ERROR DE PERMISOS: " + error.message;
        });

        window.cambiarEstado = (id, nuevo) => {
            update(ref(db, `citas/${id}`), { estado: nuevo });
        };
    </script>
</body>
</html>
