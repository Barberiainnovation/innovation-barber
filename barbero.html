<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Admin | Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #111111;
            --accent-gold: #d4af37;
            --success: #28a745;
            --danger: #dc3545;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO TAMAÑO PEQUEÑO Y CONTROLADO */
        .logo-small {
            width: 120px; 
            height: 120px;
            object-fit: contain;
            margin-bottom: 10px;
            display: block;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--accent-gold);
            text-transform: uppercase;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card-cita {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #444;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Colores por estado */
        .card-cita.pendiente { border-left-color: #f39c12; }
        .card-cita.aceptada { border-left-color: var(--success); }

        .info h3 { margin: 0; font-size: 1rem; color: #fff; }
        .info p { margin: 3px 0; font-size: 0.85rem; color: #888; }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 120px;
        }

        .btn {
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-accept { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; }
        .btn-finish { background: var(--accent-gold); color: black; }

        .btn:hover { opacity: 0.8; transform: scale(1.02); }

        .no-data {
            text-align: center;
            color: #444;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Innovation Logo" class="logo-small">
        <h1>Admin Panel</h1>
    </header>

    <div class="container" id="lista-citas">
        <p class="no-data">Conectando con la agenda...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configuración de Firebase proporcionada
        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            storageBucket: "innovation-barber-studio.firebasestorage.app",
            messagingSenderId: "589786876751",
            appId: "1:589786876751:web:31b40f11b3810470e9933a",
            measurementId: "G-KEQM3D5L1P",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" // URL deducida del ID
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const container = document.getElementById('lista-citas');

        // Escuchar la base de datos en tiempo real
        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            renderCitas(data);
        });

        function renderCitas(data) {
            container.innerHTML = '';
            
            if (!data) {
                container.innerHTML = '<p class="no-data">No hay solicitudes hoy.</p>';
                return;
            }

            // Convertimos los datos en una lista y quitamos las finalizadas
            const citasArray = Object.keys(data)
                .map(id => ({ id, ...data[id] }))
                .filter(cita => cita.estado !== 'Finalizada')
                .reverse();

            if (citasArray.length === 0) {
                container.innerHTML = '<p class="no-data">¡Agenda limpia! No hay citas pendientes.</p>';
                return;
            }

            citasArray.forEach(cita => {
                const id = cita.id;
                const c = cita; // Usamos 'c' como abreviatura para tu código

                // 1. PREPARAMOS EL MENSAJE DE WHATSAPP
                const mensaje = `Hola ${c.nombre}, tu cita en *Innovation Barber Studio* para el servicio de ${c.servicio} el día ${new Date(c.fecha).toLocaleString()} ha sido *CONFIRMADA*. ¡Te esperamos!`;
                const urlWhatsapp = `https://wa.me/${c.whatsapp}?text=${encodeURIComponent(mensaje)}`;

                const card = document.createElement('div');
                card.className = `card-cita ${c.estado.toLowerCase()}`;
                
                // 2. GENERAMOS EL HTML DE LA TARJETA
                card.innerHTML = `
                    <div class="info">
                        <h3>${c.nombre}</h3>
                        <p>📱 ${c.whatsapp || 'Sin número'}</p> 
                        <p>💈 ${c.servicio}</p>
                        <p>📅 ${new Date(c.fecha).toLocaleString()}</p>
                    </div>
                    <div class="actions">
                        ${c.estado === 'Pendiente' ? `
                            <button class="btn btn-accept" onclick="cambiarEstado('${id}', 'Aceptada')">Aceptar</button>
                            <button class="btn btn-reject" onclick="cambiarEstado('${id}', 'Rechazada')">Rechazar</button>
                        ` : c.estado === 'Aceptada' ? `
                            <a href="${urlWhatsapp}" target="_blank" class="btn" style="background:#25d366; color:white; text-decoration:none; text-align:center; display:flex; align-items:center; justify-content:center;">
                                Enviar WhatsApp
                            </a>
                            <button class="btn btn-finish" style="margin-top:5px" onclick="cambiarEstado('${id}', 'Finalizada')">Finalizar</button>
                        ` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Función global para actualizar estado
        window.cambiarEstado = (id, nuevoEstado) => {
            update(ref(db, `citas/${id}`), { estado: nuevoEstado })
            .catch(err => alert("Error: " + err));
        };
    </script>
</body>
</html>
