<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Admin | Pro Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; --green: #2ecc71; --red: #ff4d4d; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; scroll-behavior: smooth; }
        
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; }
        .login-box { width:320px; padding:40px; text-align:center; background:var(--card); border-radius:25px; border:1px solid var(--border); }

        #admin-content { display:none; width: 100%; max-width: 1200px; margin: 0 auto; }
        header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; }
        .logo { width: 50px; }

        .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        @media (max-width: 950px) { .main-grid { grid-template-columns: 1fr; } }

        .sidebar-stats { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; height: fit-content; border-top: 4px solid var(--gold); position: sticky; top: 10px; }
        .stat-val { font-size: 2rem; font-weight: 600; color: var(--green); display: block; text-align: center; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #666; text-align: center; display: block; }

        #calendar-container { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .fc-button { background: transparent !important; border: 1px solid var(--border) !important; color: var(--gold) !important; font-size: 0.6rem !important; }
        .fc-button-active { background: var(--gold) !important; color: #000 !important; }

        .citas-list { margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding-bottom: 50px; }
        .card { background: #080808; border: 1px solid var(--border); padding: 20px; border-radius: 18px; position: relative; border-left: 4px solid var(--gold); transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 0.65rem; margin-top: 10px; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline-red { background: transparent; border: 1px solid var(--red); color: var(--red); }

        /* MODALES */
        .modal { display:none; position:fixed; z-index:3000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background:var(--card); margin:15% auto; padding:30px; border: 1px solid var(--border); width:90%; max-width:350px; border-radius:20px; text-align: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" style="width: 70px; margin-bottom:15px;">
            <h2 style="color:var(--gold); font-size:0.75rem; letter-spacing:2px;">INNOVATION ADMIN</h2>
            <button class="btn btn-gold" onclick="loginGoogle()" style="background:#fff;">Entrar con Google</button>
            <button class="btn" onclick="registrarNuevoAdmin()" style="color:var(--gold); border:1px solid var(--gold); background:transparent;">Registrarse</button>
        </div>
    </div>

    <div id="admin-content">
        <header>
            <img src="logo.png" class="logo">
            <button class="btn-config" style="background:none; border:none; color:var(--gold); font-size:1.5rem;" onclick="toggleConfig()"><i class="fas fa-cog"></i></button>
        </header>

        <div class="main-grid">
            <div id="calendar-container"><div id="calendar"></div></div>
            <aside class="sidebar-stats">
                <span class="stat-label">Ingresos del Mes</span>
                <span class="stat-val" id="ingreso-total">Q0.00</span>
                <div id="servicios-stats" style="margin-top:20px; font-size:0.75rem; color:#888;"></div>
            </aside>
        </div>

        <h2 id="seccion-citas" style="font-size: 0.8rem; color: var(--gold); margin-top: 40px;">GESTIÓN DE CITAS</h2>
        <div class="citas-list" id="lista-citas"></div>

        <div id="modalEvento" class="modal">
            <div class="modal-content">
                <h3 id="pop-nombre" style="margin-top:0; color:var(--gold);">Cliente</h3>
                <p id="pop-servicio" style="font-size:0.8rem; color:#888;"></p>
                <button class="btn btn-outline-red" id="btn-eliminar-pop">ELIMINAR CITA</button>
                <button class="btn" style="background:#222; color:#fff;" onclick="cerrarPop()">CERRAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        let calendar;

        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.cerrarPop = () => document.getElementById('modalEvento').style.display = 'none';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                get(ref(db, 'admins_autorizados/' + user.uid)).then(snap => {
                    if (snap.exists()) {
                        document.getElementById('login-overlay').style.display = 'none';
                        document.getElementById('admin-content').style.display = 'block';
                        initCalendar();
                    } else { signOut(auth); }
                });
            }
        });

        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'es', firstDay: 1,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                buttonText: { today: 'Hoy', month: 'Mes', week: 'Semana', day: 'Día' },
                navLinks: true,
                // AUTO-SCROLL al darle click a un día o cambiar vista
                navLinkDayClick: (date) => {
                    calendar.changeView('timeGridDay', date);
                    document.getElementById('seccion-citas').scrollIntoView({ behavior: 'smooth' });
                },
                // Abrir ventana de borrar al clicar un cliente en el calendario
                eventClick: (info) => {
                    const id = info.event.id;
                    document.getElementById('pop-nombre').innerText = info.event.title;
                    document.getElementById('pop-servicio').innerText = "Gestión de cita programada";
                    document.getElementById('modalEvento').style.display = 'block';
                    document.getElementById('btn-eliminar-pop').onclick = () => {
                        if(confirm("¿Eliminar cita de " + info.event.title + "?")) {
                            remove(ref(db, `citas/${id}`));
                            cerrarPop();
                        }
                    };
                },
                selectable: true,
                select: (info) => {
                    const n = prompt("Nombre Cita Manual:");
                    if(n) push(ref(db, 'citas'), { nombre: n + " (M)", servicio: "Manual", fecha: info.startStr.slice(0,16), estado: 'Aceptada', precio: 0 });
                }
            });
            calendar.render();
            onValue(ref(db, 'citas'), snap => renderAdmin(snap.val()));
        }

        function renderAdmin(data) {
            const lista = document.getElementById('lista-citas'); lista.innerHTML = '';
            const eventos = []; let totalIngresos = 0; const mesActual = new Date().getMonth();

            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const c = data[id]; const f = new Date(c.fecha);
                    if(c.estado === 'Finalizada' && f.getMonth() === mesActual) totalIngresos += parseFloat(c.precio) || 0;

                    eventos.push({ 
                        id: id,
                        title: c.nombre, 
                        start: c.fecha, 
                        backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : (c.estado === 'Finalizada' ? '#111' : '#333'),
                        borderColor: 'transparent'
                    });
                    
                    if(c.estado !== 'Finalizada') {
                        const card = document.createElement('div'); card.className = 'card';
                        card.innerHTML = `
                            <div style="font-size:0.9rem; font-weight:bold;">${c.nombre}</div>
                            <div style="font-size:0.7rem; color:#888;">${c.servicio} | Q${c.precio || 0}</div>
                            <button class="btn btn-gold" onclick="cambiarEstado('${id}', '${c.estado==='Pendiente'?'Aceptada':'Finalizada'}')">
                                ${c.estado==='Pendiente'?'ACEPTAR':'FINALIZAR Y COBRAR'}
                            </button>`;
                        lista.appendChild(card);
                    }
                });
            }
            document.getElementById('ingreso-total').innerText = `Q${totalIngresos.toFixed(2)}`;
            if(calendar) { calendar.removeAllEvents(); calendar.addEventSource(eventos); }
        }

        window.cambiarEstado = (id, est) => update(ref(db, `citas/${id}`), { estado: est });
    </script>
</body>
</html>
