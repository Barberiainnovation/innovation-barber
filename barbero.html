<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin | Elite Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/es.global.min.js"></script>
    
    <style>
        /* ==========================================
           VARIABLES DE DISEÑO (PALETA ÉLITE)
           ========================================== */
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --gold: #d4af37; 
            --gold-dark: #aa8c2c; 
            --border: #1a1a1a; 
            --green: #2ecc71; 
            --red: #ff4d4d; 
            --glass: rgba(10, 10, 10, 0.98); 
        }

        .block-item-admin { 
    display: flex; justify-content: space-between; align-items: center; 
    background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 12px; 
    margin-bottom: 8px; font-size: 0.8rem; border-left: 3px solid var(--red); 
}
        
        /* ==========================================
           ESTILOS BASE Y SCROLLBAR
           ========================================== */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* ==========================================
           LOGIN OVERLAY
           ========================================== */
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .login-box { 
            width: 320px; 
            padding: 45px; 
            text-align: center; 
            background: var(--card); 
            border-radius: 35px; 
            border: 1px solid var(--border); 
            box-shadow: 0 0 40px rgba(212,175,55,0.05); 
        }

        /* ==========================================
           ESTRUCTURA DASHBOARD
           ========================================== */
        #admin-content { 
            display: none; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .main-grid { 
            display: grid; 
            grid-template-columns: 1fr 340px; 
            gap: 25px; 
            margin-top: 10px; 
        }

        @media (max-width: 1100px) { 
            .main-grid { 
                grid-template-columns: 1fr; 
            } 
        }

        /* ==========================================
           CALENDARIO (MODERN DARK)
           ========================================== */
        #calendar-container { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 35px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .fc { 
            --fc-border-color: #161616; 
            --fc-today-bg-color: rgba(212,175,55,0.02); 
            font-size: 0.85rem; 
        }

        .fc .fc-toolbar-title { 
            font-size: 1.1rem !important; 
            text-transform: uppercase; 
            color: var(--gold); 
            font-weight: 600; 
            letter-spacing: 1px;
        }

        .fc-event-main { 
            font-weight: 600; 
            font-size: 0.75rem !important; 
            line-height: 1.2; 
            display: flex; 
            align-items: center; 
            padding: 3px 6px; 
            cursor: pointer; 
        }

        .fc .fc-button-primary {
            background-color: #111 !important;
            border-color: #222 !important;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .fc .fc-button-primary:hover {
            background-color: var(--gold) !important;
            color: #000 !important;
        }

        /* ==========================================
           SIDEBAR STATS
           ========================================== */
        .sidebar-stats { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 35px; 
            padding: 30px; 
            border-top: 5px solid var(--gold); 
            position: sticky; 
            top: 15px; 
            height: fit-content; 
        }

        .sidebar-logo { 
            width: 100px; 
            margin-bottom: 20px; 
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.2)); 
        }

        .stat-group {
            margin-bottom: 25px;
        }

        .stat-val { 
            font-size: 2.3rem; 
            font-weight: 600; 
            color: var(--gold); 
            line-height: 1;
        }

        .stat-label { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: #666; 
            letter-spacing: 2px; 
            font-weight: 600;
        }

        #desglose-servicios { 
            margin-top: 15px; 
            border-top: 1px solid #1a1a1a; 
            padding-top: 10px; 
        }

        .serv-stat-item { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.65rem; 
            color: #888; 
            margin-top: 6px; 
            text-transform: uppercase; 
        }

        /* ==========================================
           TARJETAS DE CITAS PENDIENTES
           ========================================== */
        .citas-list { 
            margin-top: 40px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; 
            padding-bottom: 120px; 
        }

        .card { 
            background: #060606; 
            border: 1px solid var(--border); 
            padding: 15px 20px; 
            border-radius: 20px; 
            border-left: 4px solid var(--gold); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #333;
        }

        /* ==========================================
           SISTEMA DE MODALES (VENTANAS ELEGANTES)
           ========================================== */
        .modal { 
            display: none; 
            position: fixed; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(15px); 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
        }

        .modal-content { 
            background: var(--glass); 
            padding: 40px; 
            border: 1px solid var(--gold); 
            width: 90%; 
            max-width: 400px; 
            border-radius: 40px; 
            text-align: center; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); 
        }

        .modal-content h3 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ==========================================
           ELEMENTOS DE FORMULARIO
           ========================================== */
        input, select, textarea { 
            background: rgba(255,255,255,0.03); 
            color: #fff; 
            border: 1px solid #1a1a1a; 
            padding: 14px; 
            border-radius: 18px; 
            width: 100%; 
            margin-bottom: 12px; 
            outline: none; 
            font-family: 'Poppins'; 
            box-sizing: border-box; 
            font-size: 0.85rem; 
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        /* ==========================================
           BOTONES PERSONALIZADOS
           ========================================== */
        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 20px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn-gold { 
            background: linear-gradient(135deg, var(--gold), var(--gold-dark)); 
            color: #000; 
        }

        .btn-gold:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(212,175,55,0.2);
        }

        .btn-outline { 
            background: transparent; 
            border: 1px solid #333; 
            color: #777; 
            margin-top: 12px; 
        }

        .btn-red { 
            background: rgba(255, 77, 77, 0.1); 
            border: 1px solid var(--red); 
            color: var(--red); 
        }

        .btn-mini { 
            width: auto; 
            padding: 6px 14px; 
            border-radius: 10px; 
            font-size: 0.6rem; 
            font-weight: 700; 
            background: var(--green); 
            color: #000; 
            border: none; 
            cursor: pointer; 
        }

        .btn-config-float { 
            position: fixed; 
            bottom: 35px; 
            right: 35px; 
            background: var(--gold); 
            color: #000; 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.8rem; 
            z-index: 5000; 
            border: none; 
            cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* ==========================================
           NOTIFICACIONES (TOAST)
           ========================================== */
        #toast { 
            position: fixed; 
            bottom: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: var(--gold); 
            color: #000; 
            padding: 16px 45px; 
            border-radius: 50px; 
            font-weight: 700; 
            z-index: 11000; 
            transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            font-size: 0.85rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #toast.show { 
            bottom: 40px; 
        }
    </style>
</head>
<body>

        <div id="modalConfig" class="modal">
    <div class="modal-content" style="max-width: 450px; max-height: 85vh; overflow-y: auto;">
        <h3 style="color:var(--gold);">PANEL DE CONTROL</h3>
        
       <p style="font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px;">HORARIO DE ATENCIÓN</p>
                <div style="display:flex; gap:12px; margin-bottom:15px;">

        <button class="btn btn-gold" id="btn-save-hours">ACTUALIZAR HORARIOS</button>
<h4 style="font-size:0.7rem; color:var(--gold); border-bottom:1px solid #222; text-align:left; margin-top:25px; margin-bottom:10px;">BLOQUEAR DÍA ENTERO</h4>

                <hr style="border:0; border-top:1px solid #1a1a1a; margin:30px 0;">

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURACIÓN DE FIREBASE (TU BASE DE DATOS)
        const firebaseConfig = { 
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", 
            authDomain: "innovation-barber-studio.firebaseapp.com", 
            projectId: "innovation-barber-studio", 
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        
        // VARIABLES DE CONTROL GLOBAL
        let calendar;
        let selectedDateTime = null;
        let catalogoGlobal = {};
        let iti;
        let currentEditingId = null;
        let fechaVisualizada = new Date().toISOString().split('T')[0];

        // INICIALIZACIÓN DEL SELECTOR DE TELÉFONO
        iti = window.intlTelInput(document.querySelector("#add-whatsapp-input"), { 
            initialCountry: "gt", 
            separateDialCode: true,
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
        });

        // --- SISTEMA DE NOTIFICACIONES ---
        window.showToast = function(mensaje) { 
            const t = document.getElementById('toast'); 
            t.innerText = mensaje; 
            t.classList.add('show'); 
            setTimeout(() => { t.classList.remove('show'); }, 3000); 
        };

        // --- SISTEMA DE CONFIRMACIÓN MODAL ---
        window.confirmarAccion = function(texto, callback) { 
            document.getElementById('confirm-text').innerText = texto; 
            document.getElementById('modalConfirm').style.display = 'flex'; 
            document.getElementById('confirm-yes').onclick = function() { 
                callback(); 
                document.getElementById('modalConfirm').style.display = 'none'; 
            }; 
        };

        // --- LLENAR SELECTS DE HORAS EN CONFIG ---
        const apS = document.getElementById('config-apertura');
        const ciS = document.getElementById('config-cierre');
        const lIn = document.getElementById('config-lunch-inicio');
        const lFi = document.getElementById('config-lunch-fin');

        // Limpiamos los selectores primero para que no se dupliquen
        apS.innerHTML = ""; ciS.innerHTML = "";
        lIn.innerHTML = '<option value="">Sin lunch</option>';
        lFi.innerHTML = '<option value="">Sin lunch</option>';
        
        for(let h=0; h<=23; h++){ 
            const opt = document.createElement('option');
            opt.value = h;
            opt.innerText = h.toString().padStart(2, '0') + ":00";
            
            // Apertura y Cierre siempre muestran todo el rango
            apS.appendChild(opt.cloneNode(true));
            ciS.appendChild(opt.cloneNode(true));
        }

        // Esta parte es la "magia" para que el diseño se vea como la Imagen 1
        // Solo agrega las horas de lunch si están dentro del horario de trabajo
        onValue(ref(db, 'configuracion_horario'), (snapshot) => {
            const config = snapshot.val();
            if(config) {
                apS.value = config.apertura;
                ciS.value = config.cierre;
                
                // Filtramos las horas de lunch para que el diseño sea igual a la Imagen 1
                for(let h = parseInt(config.apertura); h <= parseInt(config.cierre); h++) {
                    const optL = document.createElement('option');
                    optL.value = h;
                    optL.innerText = h.toString().padStart(2, '0') + ":00";
                    lIn.appendChild(optL.cloneNode(true));
                    lFi.appendChild(optL);
                }
                
                lIn.value = config.lunch_inicio || "";
                lFi.value = config.lunch_fin || "";
            }
        });
        // --- GESTIÓN DE AUTENTICACIÓN ---
        window.loginGoogle = function() {
            signInWithPopup(auth, provider).catch(() => {
                showToast("ERROR EN LOGIN");
            });
        };

        window.toggleConfig = function() { 
            const m = document.getElementById('modalConfig'); 
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        };

        onAuthStateChanged(auth, (user) => { 
            if(user){ 
                document.getElementById('login-overlay').style.display = 'none'; 
                document.getElementById('admin-content').style.display = 'block'; 
                initDashboard(); 
            } 
        });

        // --- INICIALIZACIÓN DEL DASHBOARD ---
        function initDashboard() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay', 
                locale: 'es', 
                allDaySlot: false, 
                slotDuration: '00:30:00',
                nowIndicator: true,
                headerToolbar: { 
                    left: 'prev,next today', 
                    center: 'title', 
                    right: 'dayGridMonth,timeGridWeek,timeGridDay' 
                },
                // DETECCIÓN DINÁMICA DE CAMBIO DE FECHA
                datesSet: function(info) {
                    fechaVisualizada = info.view.currentStart.toISOString().split('T')[0];
                    // Forzamos actualización de etiquetas y conteos
                    onValue(ref(db, 'citas'), (snapshot) => {
                        renderAdmin(snapshot.val());
                    }, { onlyOnce: true });
                },
                selectable: true,
                select: function(info) {
                    if(info.view.type !== 'dayGridMonth'){
                        const fecha = info.startStr.split('T')[0];
                        const hora = info.start.getHours().toString().padStart(2,'0');
                        const min = info.start.getMinutes().toString().padStart(2,'0');
                        selectedDateTime = fecha + 'T' + hora + ':' + min;
                        
                        document.getElementById('add-fecha-display').innerText = info.start.toLocaleString('es-GT', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
                        document.getElementById('modalAddCita').style.display = 'flex';
                    }
                },
                eventClick: function(info) {
                    currentEditingId = info.event.id;
                    const meta = info.event.extendedProps;
                    const fTxt = info.event.start.toLocaleString('es-GT', { 
                        weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' 
                    });
                    
                    // Llenar vista consulta
                    document.getElementById('pop-nombre').innerText = meta.nombre;
                    document.getElementById('pop-fecha').innerText = fTxt;
                    document.getElementById('pop-detalle-corte').innerHTML = `
                        <div style="color:var(--gold); font-size:1.1rem; font-weight:600; margin-bottom:5px;">
                            ${meta.servicio}
                        </div>
                        <div style="color:var(--green); font-weight:600; font-size:1.2rem;">Q${meta.precio}</div>
                    ` + (meta.nota ? `<p style="font-size:0.8rem; color:#888; margin-top:15px; background:#111; padding:10px; border-radius:10px;">Nota: ${meta.nota}</p>` : "");
                    
                    // Acción WhatsApp
                    document.getElementById('pop-whatsapp').onclick = function() {
                        const num = meta.whatsapp.replace(/\D/g,'');
                        const msg = encodeURIComponent('Hola ' + meta.nombre + ', te recordamos tu cita en Innovation Barber Studio para el ' + fTxt + '. ¡Te esperamos!');
                        window.open('https://wa.me/' + num + '?text=' + msg);
                    };
                    
                    // Llenar vista edición
                    document.getElementById('edit-nombre').value = meta.nombre;
                    document.getElementById('edit-whatsapp').value = meta.whatsapp;
                    document.getElementById('edit-precio').value = meta.precio;
                    document.getElementById('edit-nota').value = meta.nota || "";
                    document.getElementById('edit-servicio-select').value = ""; // Reset select para que elija si desea cambiar

                    document.getElementById('modalEvento').style.display = 'flex';
                    
                    document.getElementById('btn-eliminar-pop').onclick = function() {
                        confirmarAccion("¿Seguro que quieres eliminar permanentemente esta cita?", function() {
                            remove(ref(db, 'citas/' + currentEditingId)).then(() => {
                                showToast("CITA ELIMINADA");
                                cerrarPop();
                            });
                        });
                    };
                }
            });
            calendar.render();

            // SINCRONIZACIÓN DE CONFIGURACIÓN
            onValue(ref(db, 'configuracion_horario'), (snapshot) => {
            const config = snapshot.val();
            if(config) {
                apS.value = config.apertura;
                ciS.value = config.cierre;
                
                // PEGA ESTAS DOS AQUÍ:
                lIn.value = config.lunch_inicio || ""; 
                lFi.value = config.lunch_fin || "";    
            }
        });

            // SINCRONIZACIÓN DE CITAS (TIEMPO REAL)
            onValue(ref(db, 'citas'), (snapshot) => {
                renderAdmin(snapshot.val());
            });

            // SINCRONIZACIÓN DE CATÁLOGO
            onValue(ref(db, 'servicios'), (snapshot) => {
                renderServicios(snapshot.val() || {});
            });
        }

        // --- RENDERIZADO MAESTRO DE DATOS ---
        function renderAdmin(data) {
            const lista = document.getElementById('lista-citas');
            const cCount = document.getElementById('citas-count');
            const iTotal = document.getElementById('ingreso-total');
            const pCount = document.getElementById('count-pendientes');
            const pLabel = document.getElementById('label-pendientes');
            const desglose = document.getElementById('desglose-servicios');
            
            lista.innerHTML = ''; 
            desglose.innerHTML = '';
            
            let finalizadosMes = 0;
            let ingresosMes = 0;
            let pendientesDiaEnPantalla = 0;
            let eventosCalendar = [];
            let contadorServicios = {};

            const ahora = new Date();
            const mesActual = ahora.getMonth();
            const añoActual = ahora.getFullYear();
            const hoyRealIso = ahora.toISOString().split('T')[0];

            // ACTUALIZAR ETIQUETA DINÁMICA DE PENDIENTES
            if (fechaVisualizada === hoyRealIso) {
                pLabel.innerText = "Pendientes Hoy";
            } else {
                const opciones = { day: 'numeric', month: 'short' };
                const fechaFormateada = new Date(fechaVisualizada + "T00:00:00").toLocaleDateString('es-GT', opciones);
                pLabel.innerText = "Pendientes " + fechaFormateada;
            }

            if(data){
                Object.keys(data).forEach(id => {
                    const cita = data[id];
                    const fCita = new Date(cita.fecha);
                    const esFinalizada = cita.estado === 'Finalizada';

                    // Lógica de métricas del mes actual
                    if(esFinalizada && fCita.getMonth() === mesActual && fCita.getFullYear() === añoActual) { 
                        finalizadosMes++; 
                        ingresosMes += parseFloat(cita.precio || 0); 
                        contadorServicios[cita.servicio] = (contadorServicios[cita.servicio] || 0) + 1; 
                    }

                    // CONTEO DINÁMICO SEGÚN DÍA EN PANTALLA
                    if(!esFinalizada && cita.fecha.startsWith(fechaVisualizada)) {
                        pendientesDiaEnPantalla++;
                    }

                    // Preparar objeto para FullCalendar
                    eventosCalendar.push({ 
                        id: id, 
                        title: cita.nombre, 
                        start: cita.fecha, 
                        backgroundColor: esFinalizada ? '#1a1a1a' : '#d4af37', 
                        borderColor: esFinalizada ? '#222' : '#aa8c2c',
                        textColor: esFinalizada ? '#555' : '#000', 
                        extendedProps: { ...cita } 
                    });
                    
                    // Renderizar tarjetas de la lista inferior (solo del día visualizado)
                    if(!esFinalizada && cita.fecha.startsWith(fechaVisualizada)){
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div style="flex:1">
                                <div style="font-size:0.6rem; color:var(--gold); font-weight:600; text-transform:uppercase; margin-bottom:2px;">
                                    ${cita.fecha.split('T')[1]} - ${cita.servicio}
                                </div>
                                <h4 style="margin:0; font-size:0.85rem; letter-spacing:0.5px;">${cita.nombre}</h4>
                                ${cita.nota ? `<p style="margin:4px 0 0; font-size:0.65rem; color:#555; font-style:italic;">"${cita.nota}"</p>` : ""}
                            </div>
                            <button class="btn-mini" onclick="cambiarEstado('${id}','Finalizada')">
                                <i class="fas fa-check"></i> FIN
                            </button>
                        `;
                        lista.appendChild(card);
                    }
                });
            }

            // Actualizar Desglose de servicios
            Object.keys(contadorServicios).forEach(serv => {
                desglose.innerHTML += `<div class="serv-stat-item"><span>${serv}</span><span>x${contadorServicios[serv]}</span></div>`;
            });

            // Actualizar Valores en Sidebar
            cCount.innerText = finalizadosMes;
            iTotal.innerText = 'Q' + ingresosMes.toLocaleString('es-GT', { minimumFractionDigits: 2 });
            pCount.innerText = pendientesDiaEnPantalla;

            // Actualizar Calendario
            calendar.removeAllEvents();
            calendar.addEventSource(eventosCalendar);
        }

        // --- FUNCIONES DE EDICIÓN ---
        window.entrarModoEdicion = function() { 
            document.getElementById('view-mode').style.display = 'none'; 
            document.getElementById('edit-mode').style.display = 'block'; 
        };

        window.salirModoEdicion = function() { 
            document.getElementById('view-mode').style.display = 'block'; 
            document.getElementById('edit-mode').style.display = 'none'; 
        };

        document.getElementById('btn-update-cita').onclick = function() {
            const servSelect = document.getElementById('edit-servicio-select');
            const updateData = {
                nombre: document.getElementById('edit-nombre').value,
                whatsapp: document.getElementById('edit-whatsapp').value,
                precio: document.getElementById('edit-precio').value,
                nota: document.getElementById('edit-nota').value
            };

            // Si se seleccionó un nuevo servicio del catálogo, actualizar nombre y precio
            if(servSelect.value) {
                updateData.servicio = catalogoGlobal[servSelect.value].nombre;
                updateData.precio = catalogoGlobal[servSelect.value].precio;
            }

            update(ref(db, 'citas/' + currentEditingId), updateData).then(() => { 
                showToast("CITA ACTUALIZADA"); 
                cerrarPop(); 
            });
        };

        window.cambiarEstado = function(id, nuevoEstado) { 
            update(ref(db, 'citas/' + id), { estado: nuevoEstado }).then(() => {
                showToast("SERVICIO COMPLETADO");
            });
        };

        window.cerrarPop = function() { 
            document.getElementById('modalEvento').style.display = 'none'; 
            salirModoEdicion(); 
        };

        window.cerrarModalAdd = function() { 
            document.getElementById('modalAddCita').style.display = 'none'; 
            // Limpiar campos
            document.getElementById('add-nombre').value = '';
            document.getElementById('add-nota').value = '';
        };

        // --- GESTIÓN DE SERVICIOS (CATÁLOGO) ---
        function renderServicios(servs){
            catalogoGlobal = servs;
            const selAdd = document.getElementById('add-servicio-select');
            const selEdit = document.getElementById('edit-servicio-select');
            const listaAdmin = document.getElementById('lista-servicios-admin');
            
            selAdd.innerHTML = '<option value="">Selecciona un servicio...</option>';
            selEdit.innerHTML = '<option value="">(Sin cambios de servicio)</option>';
            listaAdmin.innerHTML = '';

            Object.keys(servs).forEach(id => {
                const s = servs[id];
                const optHtml = `<option value="${id}">${s.nombre} - Q${s.precio}</option>`;
                selAdd.innerHTML += optHtml;
                selEdit.innerHTML += optHtml;

                // Elemento visual para configuración
                const item = document.createElement('div');
                item.style.cssText = "display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #111; font-size:0.8rem; background:rgba(255,255,255,0.01); margin-bottom:5px; border-radius:10px;";
                item.innerHTML = `
                    <div style="font-weight:600;">${s.nombre} <span style="color:var(--gold); margin-left:10px;">Q${s.precio}</span></div>
                    <button style="background:none; border:none; color:var(--red); cursor:pointer;" onclick="eliminarServicio('${id}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                listaAdmin.appendChild(item);
            });
        }

        window.eliminarServicio = function(id) {
            confirmarAccion("¿Eliminar este servicio del catálogo? Esto no afectará citas ya agendadas.", function() {
                remove(ref(db, 'servicios/' + id)).then(() => showToast("CATÁLOGO ACTUALIZADO"));
            });
        };

        document.getElementById('btn-add-serv').onclick = function() {
            const n = document.getElementById('serv-n').value;
            const p = document.getElementById('serv-p').value;
            if(n && p) {
                push(ref(db, 'servicios'), { nombre: n, precio: p }).then(() => {
                    document.getElementById('serv-n').value = '';
                    document.getElementById('serv-p').value = '';
                    showToast("NUEVO SERVICIO AÑADIDO");
                });
            } else {
                showToast("LLENA AMBOS CAMPOS");
            }
        };

        // --- ACCIÓN FINAL: GUARDAR CITA DESDE CALENDARIO ---
        document.getElementById('btn-save-cita-calendar').onclick = function() {
            const nombre = document.getElementById('add-nombre').value;
            const sKey = document.getElementById('add-servicio-select').value;
            
            if(!nombre || !sKey) {
                return showToast("FALTA NOMBRE O SERVICIO");
            }

            const servicio = catalogoGlobal[sKey];
            const nuevaCita = {
                nombre: nombre,
                whatsapp: iti.getNumber(),
                servicio: servicio.nombre,
                precio: servicio.precio,
                fecha: selectedDateTime,
                estado: "Pendiente",
                nota: document.getElementById('add-nota').value
            };

            push(ref(db, 'citas'), nuevaCita).then(() => {
                cerrarModalAdd();
                showToast("CITA AGENDADA CON ÉXITO");
            });
        };

        // --- GUARDAR AJUSTES DE HORARIO ---
        document.getElementById('btn-save-hours').onclick = () => {
            set(ref(db, 'configuracion_horario'), { 
                apertura: apS.value, 
                cierre: ciS.value,
                lunch_inicio: lIn.value,
                lunch_fin: lFi.value 
            }).then(() => showToast("GUARDADO"));
        };
        // --- LÓGICA DE BLOQUEO DE DÍAS ---
        const fpBlock = flatpickr("#input-block-date", { locale: "es", minDate: "today", dateFormat: "Y-m-d" });

        onValue(ref(db, 'dias_bloqueados'), snap => {
            const list = document.getElementById('lista-bloqueos-admin');
            list.innerHTML = ''; 
            const bloqueos = snap.val() || {};
            Object.keys(bloqueos).forEach(f => {
                list.innerHTML += `<div class="block-item-admin"><span>${f}</span><i class="fas fa-trash" style="color:var(--red); cursor:pointer;" onclick="eliminarBloqueo('${f}')"></i></div>`;
            });
        });

        window.eliminarBloqueo = (f) => {
            if(confirm("¿Desbloquear este día?")) {
                remove(ref(db, `dias_bloqueados/${f}`));
            }
        };

        document.getElementById('btn-add-block').onclick = () => {
            const f = document.getElementById('input-block-date').value;
            if(f) {
                set(ref(db, `dias_bloqueados/${f}`), true).then(() => {
                    showToast("DÍA BLOQUEADO CORRECTAMENTE");
                    document.getElementById('input-block-date').value = '';
                });
            } else {
                showToast("SELECCIONA UNA FECHA");
            }
        };
    </script>
</body>
