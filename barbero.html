<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; --green: #2ecc71; --red: #ff4d4d; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; }
        .login-box { width:320px; padding:40px; text-align:center; background:var(--card); border-radius:25px; border:1px solid var(--border); }
        .logo-main { width: 100px; display: block; margin: 0 auto 15px auto; }

        #admin-content { display:none; width: 100%; max-width: 1200px; margin: 0 auto; padding-top: 20px; }
        .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        @media (max-width: 950px) { .main-grid { grid-template-columns: 1fr; } }

        .sidebar-stats { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; height: fit-content; border-top: 4px solid var(--gold); position: sticky; top: 10px; }
        .stat-val { font-size: 2rem; font-weight: 600; color: var(--green); display: block; text-align: center; }
        
        #calendar-container { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .fc { font-size: 0.85rem; }

        .citas-list { margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #080808; border: 1px solid var(--border); padding: 20px; border-radius: 18px; position: relative; border-left: 4px solid var(--gold); }
        .note-box { font-size: 0.75rem; color: #bbb; background: #151515; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px solid #222; }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 0.65rem; text-transform: uppercase; margin-top: 10px;}
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #aaa; }

        .modal { display:none; position:fixed; z-index:3000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background:var(--card); padding:30px; border: 1px solid var(--gold); width:90%; max-width:400px; border-radius:20px; text-align: center; }
        input, select, textarea { background:#000; color:#fff; border:1px solid #222; padding:12px; border-radius:10px; width:100%; margin-bottom:10px; }

        /* Notificación Elegante (Toast) */
        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: #000; padding: 15px 30px;
            border-radius: 50px; font-weight: 600; font-size: 0.8rem;
            z-index: 10000; transition: top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toast.show { top: 30px; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" alt="Logo" class="logo-main">
            <h2 style="color:var(--gold); font-size:0.75rem; letter-spacing:2px;">INNOVATION ADMIN</h2>
            <button class="btn btn-gold" onclick="loginGoogle()" style="background:#fff;">Entrar con Google</button>
        </div>
    </div>

    <div id="admin-content">
        <div class="main-grid">
            <div id="calendar-container"><div id="calendar"></div></div>
            <aside class="sidebar-stats">
                <img src="logo.png" alt="Logo" class="logo-main" style="width:60px;">
                <div style="text-align:center; margin-bottom:20px;">
                    <span style="font-size:0.6rem; color:#666; text-transform:uppercase;">Ingresos Mes</span>
                    <span class="stat-val" id="ingreso-total">Q0.00</span>
                </div>
                <button class="btn btn-gold" onclick="toggleConfig()">Configuración</button>
            </aside>
        </div>

        <div class="citas-list" id="lista-citas"></div>

        <div id="modalConfig" class="modal">
            <div class="modal-content">
                <h3 style="color:var(--gold);">CONFIGURACIÓN</h3>
                <div style="text-align:left; background:#000; padding:15px; border-radius:15px; border:1px solid #222;">
                    <label style="font-size:0.6rem; color:var(--gold);">RANGO LABORAL</label>
                    <div style="display:flex; gap:10px;">
                        <select id="config-apertura"></select>
                        <select id="config-cierre"></select>
                    </div>
                    <button class="btn btn-gold" id="btn-save-hours">GUARDAR HORARIO</button>
                </div>
                <button class="btn btn-outline" onclick="toggleConfig()">CERRAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        function showToast(msj) {
            const t = document.getElementById('toast');
            t.innerText = msj; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        const apS = document.getElementById('config-apertura'), ciS = document.getElementById('config-cierre');
        for(let h=0; h<=23; h++){
            let lbl = h === 0 ? "12 AM" : h === 12 ? "12 PM" : h > 12 ? `${h-12} PM` : `${h} AM`;
            apS.innerHTML += `<option value="${h}">${lbl}</option>`;
            ciS.innerHTML += `<option value="${h}">${lbl}</option>`;
        }

        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.toggleConfig = () => {
            const m = document.getElementById('modalConfig');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                initAdmin();
            }
        });

        function initAdmin() {
            const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'es', firstDay: 1
            });
            calendar.render();

            onValue(ref(db, 'configuracion_horario'), snap => {
                if(snap.val()){ apS.value = snap.val().apertura; ciS.value = snap.val().cierre; }
            });

            onValue(ref(db, 'citas'), snap => renderList(snap.val()));
        }

        document.getElementById('btn-save-hours').addEventListener('click', () => {
            set(ref(db, 'configuracion_horario'), { apertura: apS.value, cierre: ciS.value })
            .then(() => showToast("✅ HORARIO ACTUALIZADO"));
        });

        function renderList(data) {
            const lista = document.getElementById('lista-citas'); lista.innerHTML = '';
            if(!data) return;
            Object.keys(data).forEach(id => {
                const c = data[id];
                if(c.estado !== 'Finalizada') {
                    const card = document.createElement('div'); card.className = 'card';
                    card.innerHTML = `
                        <h3>${c.nombre}</h3>
                        <p style="color:var(--green); font-size:0.8rem; cursor:pointer;" onclick="window.open('https://wa.me/${c.whatsapp}')">
                            <i class="fab fa-whatsapp"></i> ${c.whatsapp || 'Sin número'}
                        </p>
                        ${c.nota ? `<div class="note-box">${c.nota}</div>` : ''}
                        <button class="btn btn-gold" onclick="finalizar('${id}')">Finalizar</button>
                    `;
                    lista.appendChild(card);
                }
            });
        }
        window.finalizar = (id) => update(ref(db, `citas/${id}`), { estado: 'Finalizada' });
    </script>
</body>
</html>
