<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin | Elite Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/locales/es.global.min.js"></script>
    
    <style>
        :root { --bg: #000; --card: #0a0a0a; --gold: #d4af37; --gold-dark: #aa8c2c; --border: #1a1a1a; --green: #2ecc71; --red: #ff4d4d; --glass: rgba(10, 10, 10, 0.98); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; overflow-x: hidden; }
        
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; }
        .login-box { width:320px; padding:45px; text-align:center; background:var(--card); border-radius:35px; border: 1px solid var(--border); box-shadow: 0 0 40px rgba(212,175,55,0.05); }
        
        #admin-content { display:none; max-width: 1300px; margin: 0 auto; }
        .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 25px; margin-top: 10px; }
        @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } }
        
        #calendar-container { background: var(--card); padding: 20px; border-radius: 35px; border: 1px solid var(--border); }
        .fc { --fc-border-color: #161616; --fc-today-bg-color: rgba(212,175,55,0.02); font-size: 0.8rem; }
        .fc .fc-toolbar-title { font-size: 1rem !important; text-transform: uppercase; color: var(--gold); font-weight: 600; }
        .fc-timegrid-slot { height: 1.5em !important; border-bottom: 1px solid #111 !important; }
        
        /* EVENTOS CALENDARIO */
        .fc-v-event { border: none !important; border-radius: 6px !important; }
        .fc-event-main { font-weight: 600; font-size: 0.85rem !important; line-height: 1.1; display: flex; align-items: center; padding-left: 5px; }

        .sidebar-stats { background: var(--card); border: 1px solid var(--border); border-radius: 35px; padding: 30px; border-top: 5px solid var(--gold); position: sticky; top: 15px; height: fit-content; }
        .sidebar-logo { width: 90px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.15)); }
        .stat-val { font-size: 2.2rem; font-weight: 600; color: var(--gold); }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #555; letter-spacing: 2px; }
        
        .citas-list { margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 320px)); gap: 15px; padding-bottom: 100px; justify-content: start; }
        .card { background: #060606; border: 1px solid var(--border); padding: 12px 18px; border-radius: 18px; border-left: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        
        /* ESTADO FINALIZADO (LISTA) */
        .card.finalizada { border-left-color: #333; opacity: 0.4; background: #050505; }
        .card.finalizada h4 { color: #555; text-decoration: line-through; }
        .card.finalizada .btn-mini { display: none; }

        .card h4 { margin: 0; font-size: 0.82rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
        .btn-mini { width: auto; padding: 8px 12px; border-radius: 10px; font-size: 0.55rem; margin: 0; white-space: nowrap; font-weight: 700; }

        /* MODALES */
        .modal { display:none; position:fixed; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.94); backdrop-filter: blur(12px); align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: var(--glass); padding:35px; border: 1px solid var(--gold); width:90%; max-width:380px; border-radius:40px; text-align: center; }
        input, select, textarea { background: rgba(255,255,255,0.03); color:#fff; border:1px solid #1a1a1a; padding:15px; border-radius:18px; width:100%; margin-bottom:12px; outline: none; font-family: 'Poppins'; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 16px; border-radius: 18px; font-weight: 700; cursor: pointer; border: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #777; margin-top: 10px; }
        .btn-red { background: rgba(255, 77, 77, 0.1); border: 1px solid var(--red); color: var(--red); }
        .btn-config-float { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: #000; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; z-index: 5000; border:none; cursor:pointer; }
        
        .serv-item-admin { display:flex; justify-content:space-between; padding:10px; font-size:0.7rem; border-bottom:1px solid #1a1a1a; align-items:center; }
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 14px 40px; border-radius: 50px; font-weight: 700; z-index: 11000; transition: 0.6s; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div id="toast">ACCIÓN EXITOSA</div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" style="width: 80px; margin-bottom: 20px;">
            <button class="btn btn-gold" onclick="loginGoogle()">Entrar al Sistema</button>
        </div>
    </div>

    <div id="admin-content">
        <button class="btn-config-float" onclick="toggleConfig()"><i class="fas fa-cog"></i></button>
        <div class="main-grid">
            <div id="calendar-container"><div id="calendar"></div></div>
            <aside class="sidebar-stats">
                <header style="text-align: center; margin-bottom:30px;"><img src="logo.png" class="sidebar-logo"></header>
                <div style="margin-bottom:30px;"><span class="stat-label">Servicios Mes</span><br><span class="stat-val" id="citas-count">0</span></div>
                <div style="background: rgba(46, 204, 113, 0.05); padding: 20px; border-radius: 20px;"><span class="stat-label" style="color:var(--green);">Ingresos Mes</span><br><span class="stat-val" id="ingreso-total" style="color:var(--green);">Q0.00</span></div>
            </aside>
        </div>
        <div class="citas-list" id="lista-citas"></div>

        <div id="modalAddCita" class="modal"><div class="modal-content"><h3 style="color:var(--gold);">NUEVA CITA</h3><p id="add-fecha-display" style="font-size: 0.8rem; color: #666;"></p><input type="text" id="add-nombre" placeholder="Nombre Cliente"><input type="tel" id="add-whatsapp-input"><select id="add-servicio-select"></select><button class="btn btn-gold" id="btn-save-cita-calendar">AGENDAR</button><button class="btn btn-outline" onclick="cerrarModalAdd()">CANCELAR</button></div></div>
        
        <div id="modalEvento" class="modal"><div class="modal-content"><h3 id="pop-nombre" style="color:var(--gold);">Cita</h3><p id="pop-fecha" style="font-size:0.8rem; color:#555;"></p><div id="pop-whatsapp" style="font-size:0.9rem; color:var(--green); font-weight:600; cursor:pointer; background:rgba(46, 204, 113, 0.05); padding:18px; border-radius:20px; margin-bottom:20px;"><i class="fab fa-whatsapp"></i> RECORDATORIO</div><div style="display:flex; gap:12px;"><button class="btn btn-red" id="btn-eliminar-pop" style="flex:1;">BORRAR</button><button class="btn btn-outline" onclick="cerrarPop()" style="flex:1; margin:0;">CERRAR</button></div></div></div>

        <div id="modalConfig" class="modal"><div class="modal-content" style="max-width: 420px; max-height: 90vh; overflow-y: auto;">
            <h3 style="color:var(--gold);">CONFIGURACIÓN</h3>
            <p style="font-size: 0.7rem; color: #555;">HORARIO LABORAL</p>
            <div style="display:flex; gap:10px; margin-bottom:10px;"><select id="config-apertura"></select><select id="config-cierre"></select></div>
            <button class="btn btn-gold" id="btn-save-hours">GUARDAR HORARIO</button>
            <hr style="border:0; border-top:1px solid #1a1a1a; margin:20px 0;">
            <p style="font-size: 0.7rem; color: #555;">GESTIÓN DE SERVICIOS</p>
            <input type="text" id="serv-n" placeholder="Nombre Servicio">
            <input type="number" id="serv-p" placeholder="Precio (Q)">
            <textarea id="serv-d" placeholder="¿Qué incluye el servicio?" rows="2"></textarea>
            <button class="btn btn-gold" id="btn-add-serv">AÑADIR SERVICIO</button>
            <div id="lista-servicios-admin" style="margin-top:20px; background: #050505; border-radius: 15px;"></div>
            <button class="btn btn-outline" onclick="toggleConfig()">SALIR</button>
        </div></div>

        <div id="modalConfirm" class="modal"><div class="modal-content"><p id="confirm-text"></p><button class="btn btn-red" id="confirm-yes">SÍ</button><button class="btn btn-outline" onclick="document.getElementById('modalConfirm').style.display='none'">NO</button></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        
        let calendar, selectedDateTime = null, catalogoGlobal = {}, iti;

        iti = window.intlTelInput(document.querySelector("#add-whatsapp-input"), { initialCountry: "gt", separateDialCode: true });

        window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };
        window.confirmarAccion = (t, cb) => { document.getElementById('confirm-text').innerText = t; document.getElementById('modalConfirm').style.display = 'flex'; document.getElementById('confirm-yes').onclick = () => { cb(); document.getElementById('modalConfirm').style.display = 'none'; }; };

        const apS = document.getElementById('config-apertura'), ciS = document.getElementById('config-cierre');
        for(let h=0; h<=23; h++){ apS.innerHTML += `<option value="${h}">${h}:00</option>`; ciS.innerHTML += `<option value="${h}">${h}:00</option>`; }

        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.toggleConfig = () => { const m = document.getElementById('modalConfig'); m.style.display = (m.style.display==='flex') ? 'none' : 'flex'; };
        window.eliminarServicio = (id) => confirmarAccion("¿Eliminar servicio?", () => remove(ref(db, `servicios/${id}`)).then(() => showToast("ELIMINADO")));

        onAuthStateChanged(auth, (u) => { if(u){ document.getElementById('login-overlay').style.display='none'; document.getElementById('admin-content').style.display='block'; initDashboard(); } });

        function initDashboard() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridDay',
                locale: 'es', // IDIOMA EN ESPAÑOL
                allDaySlot: false,
                slotDuration: '00:30:00',
                contentHeight: 'auto',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                selectable: true,
                select: (info) => {
                    if(info.view.type !== 'dayGridMonth'){
                        selectedDateTime = info.startStr.split('T')[0]+'T'+info.start.getHours().toString().padStart(2,'0')+':00';
                        document.getElementById('add-fecha-display').innerText = info.start.toLocaleString('es-GT');
                        document.getElementById('modalAddCita').style.display = 'flex';
                    }
                },
                eventClick: (info) => {
                    const id = info.event.id, meta = info.event.extendedProps;
                    const nombre = info.event.title;
                    const fTxt = info.event.start.toLocaleString('es-GT', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
                    
                    document.getElementById('pop-nombre').innerText = nombre;
                    document.getElementById('pop-fecha').innerText = info.event.start.toLocaleString('es-GT');
                    
                    document.getElementById('pop-whatsapp').onclick = () => {
                        const msg = encodeURIComponent(`Hola ${nombre}, te saludamos de Innovation Barber Studio. Te recordamos tu cita para el día ${fTxt}. ¡Te esperamos!`);
                        window.open(`https://wa.me/${meta.whatsapp.replace(/\D/g,'')}?text=${msg}`);
                    };

                    document.getElementById('modalEvento').style.display = 'flex';
                    document.getElementById('btn-eliminar-pop').onclick = () => confirmarAccion("¿Eliminar cita?", () => remove(ref(db, `citas/${id}`)).then(cerrarPop));
                }
            });
            calendar.render();
            onValue(ref(db, 'configuracion_horario'), snap => { 
                if(snap.val()){ 
                    calendar.setOption('slotMinTime', snap.val().apertura.padStart(2,'0')+':00:00'); 
                    calendar.setOption('slotMaxTime', snap.val().cierre.padStart(2,'0')+':00:00');
                    apS.value = snap.val().apertura; ciS.value = snap.val().cierre;
                } 
            });
            onValue(ref(db, 'citas'), snap => renderAdmin(snap.val()));
            onValue(ref(db, 'servicios'), snap => renderServicios(snap.val() || {}));
        }

        function renderAdmin(data) {
            const lista = document.getElementById('lista-citas'); 
            const citasCountEl = document.getElementById('citas-count');
            const ingresoTotalEl = document.getElementById('ingreso-total');
            lista.innerHTML = '';
            
            let totalServiciosMes = 0, totalIngresosMes = 0;
            const eventos = [], ahora = new Date();
            const mesActual = ahora.getMonth(), añoActual = ahora.getFullYear();

            if(data){
                Object.keys(data).sort((a,b) => new Date(data[a].fecha) - new Date(data[b].fecha)).forEach(id => {
                    const c = data[id], fCita = new Date(c.fecha);
                    const isFinalizada = c.estado === 'Finalizada';
                    
                    if(isFinalizada && fCita.getMonth() === mesActual && fCita.getFullYear() === añoActual) {
                        totalServiciosMes++;
                        totalIngresosMes += parseFloat(c.precio || 0);
                    }

                    // COLOR GRIS SI ESTÁ FINALIZADA EN EL CALENDARIO
                    eventos.push({ 
                        id, 
                        title: c.nombre, 
                        start: c.fecha, 
                        backgroundColor: isFinalizada ? '#333333' : '#d4af37', 
                        textColor: isFinalizada ? '#777777' : '#000000',
                        extendedProps: { whatsapp: c.whatsapp } 
                    });

                    const div = document.createElement('div');
                    div.className = `card ${isFinalizada ? 'finalizada' : ''}`;
                    div.innerHTML = `<h4>${c.nombre}</h4><button class="btn btn-gold btn-mini" onclick="cambiarEstado('${id}','Finalizada')">FINALIZAR</button>`;
                    lista.appendChild(div);
                });
            }
            citasCountEl.innerText = totalServiciosMes;
            ingresoTotalEl.innerText = `Q${totalIngresosMes.toFixed(2)}`;
            calendar.removeAllEvents(); calendar.addEventSource(eventos);
        }

        window.cambiarEstado = (id, est) => update(ref(db, `citas/${id}`), { estado: est }).then(() => showToast("FINALIZADO"));
        window.cerrarModalAdd = () => document.getElementById('modalAddCita').style.display = 'none';
        window.cerrarPop = () => document.getElementById('modalEvento').style.display = 'none';
        
        document.getElementById('btn-save-cita-calendar').onclick = () => {
            const nom = document.getElementById('add-nombre').value, wa = iti.getNumber(), sKey = document.getElementById('add-servicio-select').value;
            if(!nom || !sKey) return showToast("FALTAN DATOS");
            const s = catalogoGlobal[sKey];
            push(ref(db, 'citas'), { nombre: nom, whatsapp: wa, servicio: s.nombre, precio: s.precio, fecha: selectedDateTime, estado: "Pendiente" }).then(cerrarModalAdd);
        };

        document.getElementById('btn-add-serv').onclick = () => {
            const n = document.getElementById('serv-n').value, p = document.getElementById('serv-p').value, d = document.getElementById('serv-d').value;
            if(n && p) push(ref(db, 'servicios'), { nombre: n, precio: p, detalle: d }).then(() => { 
                document.getElementById('serv-n').value = ''; document.getElementById('serv-p').value = ''; document.getElementById('serv-d').value = '';
                showToast("SERVICIO CREADO"); 
            });
        };

        document.getElementById('btn-save-hours').onclick = () => set(ref(db, 'configuracion_horario'), { apertura: apS.value, cierre: ciS.value }).then(() => showToast("HORARIO GUARDADO"));

        function renderServicios(servs){
            catalogoGlobal = servs;
            const d = document.getElementById('lista-servicios-admin'), sel = document.getElementById('add-servicio-select');
            d.innerHTML = ''; sel.innerHTML = '<option value="">Elegir servicio...</option>';
            Object.keys(servs).forEach(id => {
                sel.innerHTML += `<option value="${id}">${servs[id].nombre}</option>`;
                d.innerHTML += `<div class="serv-item-admin"><span>${servs[id].nombre} (Q${servs[id].precio})</span><i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="eliminarServicio('${id}')"></i></div>`;
            });
        }
    </script>
</body>
</html>
