<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: left; border-left: 5px solid #f39c12; }
        .card.aceptada { border-left-color: #28a745; }
        .btn { padding: 10px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; width: 100%; margin-top: 5px; text-decoration: none; display: inline-block; text-align: center; }
        .btn-accept { background: #28a745; color: white; }
        .btn-wa { background: #25d366; color: white; }
        .btn-finish { background: #d4af37; color: black; }
    </style>
</head>
<body>
    <h1>Panel de Control</h1>
    <div id="lista-citas" class="container">Cargando citas...</div>
    
    <audio id="sonido" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            storageBucket: "innovation-barber-studio.firebasestorage.app",
            messagingSenderId: "589786876751",
            appId: "1:589786876751:web:31b40f11b3810470e9933a",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const lista = document.getElementById('lista-citas');
        const sonido = document.getElementById('sonido');
        let primeraVez = true;

        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            if (!primeraVez && data) { 
                sonido.play().catch(() => console.log("Clickea la página para activar sonidos")); 
            }
            primeraVez = false;
            render(data);
        });

        function render(data) {
            lista.innerHTML = '';
            if (!data) { lista.innerHTML = 'No hay citas.'; return; }
            
            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;

                const div = document.createElement('div');
                div.className = `card ${c.estado.toLowerCase()}`;
                
                const msjWA = `Hola ${c.nombre}, tu cita en Innovation Barber Studio está confirmada.`;
                const linkWA = `https://wa.me/${c.whatsapp}?text=${encodeURIComponent(msjWA)}`;

                div.innerHTML = `
                    <h3>${c.nombre}</h3>
                    <p>📱 ${c.whatsapp}</p>
                    <p>💈 ${c.servicio}</p>
                    <p>📅 ${c.fecha}</p>
                    ${c.estado === 'Pendiente' ? 
                        `<button class="btn btn-accept" onclick="cambiarEstado('${id}', 'Aceptada')">ACEPTAR</button>` : 
                        `<a href="${linkWA}" target="_blank" class="btn btn-wa">WHATSAPP</a>
                         <button class="btn btn-finish" onclick="cambiarEstado('${id}', 'Finalizada')">FINALIZAR</button>`
                    }
                `;
                lista.appendChild(div);
            });
        }

        window.cambiarEstado = (id, nuevo) => {
            update(ref(db, `citas/${id}`), { estado: nuevo });
        };
    </script>
</body>
</html>
