<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin | Elite Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/es.global.min.js"></script>
    
    <style>
        /* ==========================================
           VARIABLES DE DISEÑO (PALETA ÉLITE)
           ========================================== */
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --gold: #d4af37; 
            --gold-dark: #aa8c2c; 
            --border: #1a1a1a; 
            --green: #2ecc71; 
            --red: #ff4d4d; 
            --glass: rgba(10, 10, 10, 0.98); 
        }

        .block-item-admin { 
    display: flex; justify-content: space-between; align-items: center; 
    background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 12px; 
    margin-bottom: 8px; font-size: 0.8rem; border-left: 3px solid var(--red); 
}
        
        /* ==========================================
           ESTILOS BASE Y SCROLLBAR
           ========================================== */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* ==========================================
           LOGIN OVERLAY
           ========================================== */
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .login-box { 
            width: 320px; 
            padding: 45px; 
            text-align: center; 
            background: var(--card); 
            border-radius: 35px; 
            border: 1px solid var(--border); 
            box-shadow: 0 0 40px rgba(212,175,55,0.05); 
        }

        /* ==========================================
           ESTRUCTURA DASHBOARD
           ========================================== */
        #admin-content { 
            display: none; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .main-grid { 
            display: grid; 
            grid-template-columns: 1fr 340px; 
            gap: 25px; 
            margin-top: 10px; 
        }

        @media (max-width: 1100px) { 
            .main-grid { 
                grid-template-columns: 1fr; 
            } 
        }

        /* ==========================================
           CALENDARIO (MODERN DARK)
           ========================================== */
        #calendar-container { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 35px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .fc { 
            --fc-border-color: #161616; 
            --fc-today-bg-color: rgba(212,175,55,0.02); 
            font-size: 0.85rem; 
        }

        .fc .fc-toolbar-title { 
            font-size: 1.1rem !important; 
            text-transform: uppercase; 
            color: var(--gold); 
            font-weight: 600; 
            letter-spacing: 1px;
        }

        .fc-event-main { 
            font-weight: 600; 
            font-size: 0.75rem !important; 
            line-height: 1.2; 
            display: flex; 
            align-items: center; 
            padding: 3px 6px; 
            cursor: pointer; 
        }

        .fc .fc-button-primary {
            background-color: #111 !important;
            border-color: #222 !important;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .fc .fc-button-primary:hover {
            background-color: var(--gold) !important;
            color: #000 !important;
        }

        /* ==========================================
           SIDEBAR STATS
           ========================================== */
        .sidebar-stats { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 35px; 
            padding: 30px; 
            border-top: 5px solid var(--gold); 
            position: sticky; 
            top: 15px; 
            height: fit-content; 
        }

        .sidebar-logo { 
            width: 100px; 
            margin-bottom: 20px; 
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.2)); 
        }

        .stat-group {
            margin-bottom: 25px;
        }

        .stat-val { 
            font-size: 2.3rem; 
            font-weight: 600; 
            color: var(--gold); 
            line-height: 1;
        }

        .stat-label { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: #666; 
            letter-spacing: 2px; 
            font-weight: 600;
        }

        #desglose-servicios { 
            margin-top: 15px; 
            border-top: 1px solid #1a1a1a; 
            padding-top: 10px; 
        }

        .serv-stat-item { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.65rem; 
            color: #888; 
            margin-top: 6px; 
            text-transform: uppercase; 
        }

        /* ==========================================
           TARJETAS DE CITAS PENDIENTES
           ========================================== */
        .citas-list { 
            margin-top: 40px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; 
            padding-bottom: 120px; 
        }

        .card { 
            background: #060606; 
            border: 1px solid var(--border); 
            padding: 15px 20px; 
            border-radius: 20px; 
            border-left: 4px solid var(--gold); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #333;
        }

        /* ==========================================
           SISTEMA DE MODALES (VENTANAS ELEGANTES)
           ========================================== */
        .modal { 
            display: none; 
            position: fixed; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(15px); 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
        }

        .modal-content { 
            background: var(--glass); 
            padding: 40px; 
            border: 1px solid var(--gold); 
            width: 90%; 
            max-width: 400px; 
            border-radius: 40px; 
            text-align: center; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); 
        }

        .modal-content h3 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ==========================================
           ELEMENTOS DE FORMULARIO
           ========================================== */
        input, select, textarea { 
            background: rgba(255,255,255,0.03); 
            color: #fff; 
            border: 1px solid #1a1a1a; 
            padding: 14px; 
            border-radius: 18px; 
            width: 100%; 
            margin-bottom: 12px; 
            outline: none; 
            font-family: 'Poppins'; 
            box-sizing: border-box; 
            font-size: 0.85rem; 
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        /* ==========================================
           BOTONES PERSONALIZADOS
           ========================================== */
        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 20px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn-gold { 
            background: linear-gradient(135deg, var(--gold), var(--gold-dark)); 
            color: #000; 
        }

        .btn-gold:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(212,175,55,0.2);
        }

        .btn-outline { 
            background: transparent; 
            border: 1px solid #333; 
            color: #777; 
            margin-top: 12px; 
        }

        .btn-red { 
            background: rgba(255, 77, 77, 0.1); 
            border: 1px solid var(--red); 
            color: var(--red); 
        }

        .btn-mini { 
            width: auto; 
            padding: 6px 14px; 
            border-radius: 10px; 
            font-size: 0.6rem; 
            font-weight: 700; 
            background: var(--green); 
            color: #000; 
            border: none; 
            cursor: pointer; 
        }

        .btn-config-float { 
            position: fixed; 
            bottom: 35px; 
            right: 35px; 
            background: var(--gold); 
            color: #000; 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.8rem; 
            z-index: 5000; 
            border: none; 
            cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* ==========================================
           NOTIFICACIONES (TOAST)
           ========================================== */
        #toast { 
            position: fixed; 
            bottom: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: var(--gold); 
            color: #000; 
            padding: 16px 45px; 
            border-radius: 50px; 
            font-weight: 700; 
            z-index: 11000; 
            transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            font-size: 0.85rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #toast.show { 
            bottom: 40px; 
        }
    </style>
</head>
<body>

    <div id="toast">ACCIÓN EXITOSA</div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" style="width: 90px; margin-bottom: 25px;">
            <h2 style="font-size: 1rem; color: var(--gold); margin-bottom: 30px; letter-spacing: 2px;">ADMIN PANEL</h2>
            <button class="btn btn-gold" onclick="loginGoogle()">
                <i class="fab fa-google" style="margin-right: 10px;"></i> ENTRAR AL SISTEMA
            </button>
        </div>
    </div>

    <div id="admin-content">
        
        <button class="btn-config-float" onclick="toggleConfig()">
            <i class="fas fa-sliders-h"></i>
        </button>

        <div class="main-grid">
            
            <div id="calendar-container">
                <div id="calendar"></div>
            </div>

            <aside class="sidebar-stats">
                <header style="text-align: center; margin-bottom:40px;">
                    <img src="logo.png" class="sidebar-logo">
                </header>

                <div class="stat-group">
                    <span class="stat-label">Finalizados Mes</span><br>
                    <span class="stat-val" id="citas-count">0</span>
                    <div id="desglose-servicios"></div>
                </div>

                <div class="stat-group" style="background: rgba(212, 175, 55, 0.05); padding: 20px; border-radius: 25px; border: 1px solid rgba(212,175,55,0.1);">
                    <span class="stat-label" id="label-pendientes">Pendientes Hoy</span><br>
                    <span class="stat-val" id="count-pendientes" style="font-size: 1.8rem;">0</span>
                </div>

                <div class="stat-group" style="background: rgba(46, 204, 113, 0.05); padding: 20px; border-radius: 25px;">
                    <span class="stat-label" style="color:var(--green);">Ingresos Mes</span><br>
                    <span class="stat-val" id="ingreso-total" style="color:var(--green);">Q0.00</span>
                </div>
            </aside>
        </div>

        <div class="citas-list" id="lista-citas"></div>

        <div id="modalAddCita" class="modal">
            <div class="modal-content">
                <h3 style="color:var(--gold);">AGENDAR CITA</h3>
                <p id="add-fecha-display" style="font-size: 0.8rem; color: #666; margin-bottom: 20px;"></p>
                
                <input type="text" id="add-nombre" placeholder="Nombre completo del cliente">
                <input type="tel" id="add-whatsapp-input">
                <select id="add-servicio-select"></select>
                <textarea id="add-nota" placeholder="¿Alguna nota o instrucción especial?" rows="3"></textarea>
                
                <button class="btn btn-gold" id="btn-save-cita-calendar">CONFIRMAR CITA</button>
                <button class="btn btn-outline" onclick="cerrarModalAdd()">CANCELAR</button>
            </div>
        </div>
        
        <div id="modalEvento" class="modal">
            <div class="modal-content">
                
                <div id="view-mode">
                    <h3 id="pop-nombre" style="color:var(--gold);">Detalle Cliente</h3>
                    <p id="pop-fecha" style="font-size:0.85rem; color:#666;"></p>
                    
                    <div id="pop-detalle-corte" style="margin: 20px 0;"></div>
                    
                    <div id="pop-whatsapp" style="font-size:0.9rem; color:var(--green); font-weight:600; cursor:pointer; background:rgba(46, 204, 113, 0.08); padding:20px; border-radius:25px; margin-bottom:25px; border: 1px solid rgba(46, 204, 113, 0.2);">
                        <i class="fab fa-whatsapp" style="font-size: 1.2rem; vertical-align: middle; margin-right: 8px;"></i> ENVIAR RECORDATORIO
                    </div>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <button class="btn btn-gold" onclick="entrarModoEdicion()" style="padding:14px; font-size: 0.65rem;">EDITAR</button>
                        <button class="btn btn-red" id="btn-eliminar-pop" style="padding:14px; font-size: 0.65rem;">ELIMINAR</button>
                    </div>
                    <button class="btn btn-outline" onclick="cerrarPop()">CERRAR VENTANA</button>
                </div>

                <div id="edit-mode" style="display:none;">
                    <h3 style="color:var(--gold);">EDITAR SERVICIO</h3>
                    
                    <label style="display:block; text-align:left; font-size:0.6rem; color:#555; margin-left:10px;">NOMBRE</label>
                    <input type="text" id="edit-nombre">
                    
                    <label style="display:block; text-align:left; font-size:0.6rem; color:#555; margin-left:10px;">WHATSAPP</label>
                    <input type="text" id="edit-whatsapp">
                    
                    <label style="display:block; text-align:left; font-size:0.6rem; color:#555; margin-left:10px;">CAMBIAR SERVICIO</label>
                    <select id="edit-servicio-select"></select>
                    
                    <label style="display:block; text-align:left; font-size:0.6rem; color:#555; margin-left:10px;">PRECIO FINAL (Q)</label>
                    <input type="number" id="edit-precio">
                    
                    <label style="display:block; text-align:left; font-size:0.6rem; color:#555; margin-left:10px;">NOTA INTERNA</label>
                    <textarea id="edit-nota" rows="2"></textarea>
                    
                    <button class="btn btn-gold" id="btn-update-cita">GUARDAR CAMBIOS</button>
                    <button class="btn btn-outline" onclick="salirModoEdicion()">CANCELAR</button>
                </div>
            </div>
        </div>

        <div id="modalConfig" class="modal">
    <div class="modal-content" style="max-width: 420px; max-height: 90vh; overflow-y: auto;">
        <h3 style="color:var(--gold);">CONFIGURACIÓN</h3>
        
        <p style="font-size: 0.7rem; color: #555; text-align: left;">HORARIO LABORAL</p>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="config-apertura"></select>
            <select id="config-cierre"></select>
        </div>

        <p style="font-size: 0.7rem; color: #555; margin-top: 15px; text-align: left;">HORARIO DE ALMUERZO (LUNCH)</p>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="config-lunch-inicio"><option value="">Sin lunch</option></select>
            <select id="config-lunch-fin"><option value="">Sin lunch</option></select>
        </div>
        <button class="btn btn-gold" id="btn-save-hours">GUARDAR CONFIGURACIÓN</button>

        <hr style="border:0; border-top:1px solid #1a1a1a; margin:20px 0;">

        <p style="font-size: 0.7rem; color: #555; text-align: left;">BLOQUEAR DÍA ESPECÍFICO</p>
        <div style="display:flex; gap:10px;">
            <input type="text" id="input-block-date" placeholder="Elegir fecha" readonly style="cursor:pointer; text-align: center; margin-bottom:0; border:1px solid var(--gold);">
            <button class="btn btn-red" id="btn-add-block" style="padding:12px; width:auto; margin-bottom:0;">BLOQUEAR</button>
        </div>
        <div id="lista-bloqueos-admin" style="margin-top:15px; text-align: left;"></div>

        <hr style="border:0; border-top:1px solid #1a1a1a; margin:20px 0;">

        <p style="font-size: 0.7rem; color: #555; text-align: left;">GESTIÓN DE SERVICIOS</p>
        <input type="text" id="serv-n" placeholder="Nombre (Ej: Corte + Barba)">
        <input type="number" id="serv-p" placeholder="Precio (Q)">
        <button class="btn btn-gold" id="btn-add-serv">AÑADIR SERVICIO</button>
        <div id="lista-servicios-admin" style="margin-top:20px; background: #050505; border-radius: 15px;"></div>

        <button class="btn btn-outline" onclick="toggleConfig()" style="margin-top: 30px;">SALIR</button>
    </div>
</div>

<div id="modalConfirm" class="modal">
    <div class="modal-content" style="max-width: 340px;">
        <div style="color: var(--red); font-size: 3rem; margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <p id="confirm-text" style="font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; color: #ccc;"></p>
        <div style="display:flex; gap:15px;">
            <button class="btn btn-red" id="confirm-yes" style="padding: 14px; font-size: 0.65rem;">SÍ, PROCEDER</button>
            <button class="btn btn-outline" onclick="document.getElementById('modalConfirm').style.display='none'" style="padding: 14px; font-size: 0.65rem; margin: 0;">CANCELAR</button>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", 
        authDomain: "innovation-barber-studio.firebaseapp.com", 
        projectId: "innovation-barber-studio", 
        databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();
    
    let calendar;
    let selectedDateTime = null;
    let catalogoGlobal = {};
    let iti;
    let currentEditingId = null;
    let fechaVisualizada = new Date().toISOString().split('T')[0];

    iti = window.intlTelInput(document.querySelector("#add-whatsapp-input"), { 
        initialCountry: "gt", 
        separateDialCode: true,
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
    });

    window.showToast = function(mensaje) { 
        const t = document.getElementById('toast'); 
        t.innerText = mensaje; 
        t.classList.add('show'); 
        setTimeout(() => { t.classList.remove('show'); }, 3000); 
    };

    window.confirmarAccion = function(texto, callback) { 
        document.getElementById('confirm-text').innerText = texto; 
        document.getElementById('modalConfirm').style.display = 'flex'; 
        document.getElementById('confirm-yes').onclick = function() { 
            callback(); 
            document.getElementById('modalConfirm').style.display = 'none'; 
        }; 
    };

  // --- LLENAR SELECTS DE HORAS (APERTURA, CIERRE Y LUNCH) ---
        const apS = document.getElementById('config-apertura');
        const ciS = document.getElementById('config-cierre');
        const lIn = document.getElementById('config-lunch-inicio');
        const lFi = document.getElementById('config-lunch-fin');

        if(apS) {
            apS.innerHTML = ''; ciS.innerHTML = ''; 
            lIn.innerHTML = '<option value="">Sin lunch</option>'; 
            lFi.innerHTML = '<option value="">Sin lunch</option>';
            for(let h=0; h<=23; h++){ 
                const opt = `<option value="${h}">${h.toString().padStart(2, '0')}:00</option>`; 
                apS.innerHTML += opt; ciS.innerHTML += opt; 
                lIn.innerHTML += opt; lFi.innerHTML += opt; 
            }
        }

        // --- GESTIÓN DE AUTENTICACIÓN ---
        window.loginGoogle = () => signInWithPopup(auth, provider).catch(() => showToast("ERROR EN LOGIN"));
        window.toggleConfig = () => { 
            const m = document.getElementById('modalConfig'); 
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        };

        onAuthStateChanged(auth, (user) => { 
            if(user){ 
                document.getElementById('login-overlay').style.display = 'none'; 
                document.getElementById('admin-content').style.display = 'block'; 
                initDashboard(); 
            } 
        });

        function initDashboard() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay', locale: 'es', allDaySlot: false, slotDuration: '00:30:00', nowIndicator: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                datesSet: (info) => {
                    fechaVisualizada = info.view.currentStart.toISOString().split('T')[0];
                    onValue(ref(db, 'citas'), (snap) => renderAdmin(snap.val()), { onlyOnce: true });
                },
                selectable: true,
                select: (info) => {
                    if(info.view.type !== 'dayGridMonth'){
                        selectedDateTime = info.startStr.split('T')[0] + 'T' + info.start.getHours().toString().padStart(2,'0') + ':' + info.start.getMinutes().toString().padStart(2,'0');
                        document.getElementById('add-fecha-display').innerText = info.start.toLocaleString('es-GT', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
                        document.getElementById('modalAddCita').style.display = 'flex';
                    }
                },
                eventClick: (info) => {
                    currentEditingId = info.event.id;
                    const meta = info.event.extendedProps;
                    const fTxt = info.event.start.toLocaleString('es-GT', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
                    document.getElementById('pop-nombre').innerText = meta.nombre;
                    document.getElementById('pop-fecha').innerText = fTxt;
                    document.getElementById('pop-whatsapp').onclick = () => {
                        const num = meta.whatsapp.replace(/\D/g,'');
                        const msg = encodeURIComponent('Hola ' + meta.nombre + ', te recordamos tu cita en Innovation para el ' + fTxt);
                        window.open('https://wa.me/' + num + '?text=' + msg);
                    };
                    document.getElementById('modalEvento').style.display = 'flex';
                    document.getElementById('btn-eliminar-pop').onclick = () => confirmarAccion("¿Eliminar cita?", () => remove(ref(db, 'citas/' + currentEditingId)).then(cerrarPop));
                }
            });
            calendar.render();

            onValue(ref(db, 'configuracion_horario'), (snap) => { 
                const config = snap.val();
                if(config){ 
                    calendar.setOption('slotMinTime', config.apertura.padStart(2,'0') + ':00:00'); 
                    calendar.setOption('slotMaxTime', config.cierre.padStart(2,'0') + ':00:00'); 
                    apS.value = config.apertura; ciS.value = config.cierre;
                    lIn.value = config.lunch_inicio || ""; lFi.value = config.lunch_fin || "";
                } 
            });

            onValue(ref(db, 'citas'), (snap) => renderAdmin(snap.val()));
            onValue(ref(db, 'servicios'), (snap) => renderServicios(snap.val() || {}));
            
            onValue(ref(db, 'dias_bloqueados'), snap => {
                const list = document.getElementById('lista-bloqueos-admin');
                list.innerHTML = ''; const bloqueos = snap.val() || {};
                Object.keys(bloqueos).forEach(f => {
                    list.innerHTML += `<div class="block-item-admin" style="display:flex; justify-content:space-between; background:rgba(255,77,77,0.1); padding:8px; border-radius:10px; margin-bottom:5px;"><span>${f}</span><i class="fas fa-trash" style="color:var(--red); cursor:pointer;" onclick="window.eliminarBloqueo('${f}')"></i></div>`;
                });
            });
        }

        function renderAdmin(data) {
            const lista = document.getElementById('lista-citas');
            lista.innerHTML = ''; let eventos = [];
            if(data){
                Object.keys(data).forEach(id => {
                    const c = data[id];
                    eventos.push({ id: id, title: c.nombre, start: c.fecha, backgroundColor: c.estado==='Finalizada'?'#1a1a1a':'#d4af37', extendedProps: {...c} });
                    if(c.estado !== 'Finalizada' && c.fecha.startsWith(fechaVisualizada)){
                        lista.innerHTML += `<div class="card"><h4>${c.nombre}</h4><button class="btn-mini" onclick="cambiarEstado('${id}','Finalizada')">FIN</button></div>`;
                    }
                });
            }
            calendar.removeAllEvents(); calendar.addEventSource(eventos);
        }

        function renderServicios(servs){
            catalogoGlobal = servs;
            const selAdd = document.getElementById('add-servicio-select');
            const listaAdmin = document.getElementById('lista-servicios-admin');
            if(selAdd) selAdd.innerHTML = '<option value="">Seleccionar...</option>';
            if(listaAdmin) {
                listaAdmin.innerHTML = '';
                Object.keys(servs).forEach(id => {
                    const s = servs[id];
                    if(selAdd) selAdd.innerHTML += `<option value="${id}">${s.nombre}</option>`;
                    listaAdmin.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #111;"><span>${s.nombre} (Q${s.precio})</span><i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="window.eliminarServicio('${id}')"></i></div>`;
                });
            }
        }

        window.cambiarEstado = (id, est) => update(ref(db, 'citas/'+id), {estado:est}).then(() => showToast("OK"));
        window.eliminarServicio = (id) => confirmarAccion("¿Eliminar?", () => remove(ref(db, 'servicios/'+id)));
        window.eliminarBloqueo = (f) => remove(ref(db, `dias_bloqueados/${f}`));
        window.cerrarPop = () => document.getElementById('modalEvento').style.display = 'none';
        window.cerrarModalAdd = () => document.getElementById('modalAddCita').style.display = 'none';

        document.getElementById('btn-save-hours').onclick = () => {
            set(ref(db, 'configuracion_horario'), { apertura: apS.value, cierre: ciS.value, lunch_inicio: lIn.value, lunch_fin: lFi.value }).then(() => showToast("GUARDADO"));
        };
        document.getElementById('btn-add-serv').onclick = () => {
            const n = document.getElementById('serv-n').value, p = document.getElementById('serv-p').value;
            if(n && p) push(ref(db, 'servicios'), {nombre:n, precio:p}).then(() => {
                document.getElementById('serv-n').value=''; document.getElementById('serv-p').value='';
                showToast("AÑADIDO");
            });
        };
        document.getElementById('btn-add-block').onclick = () => {
            const f = document.getElementById('input-block-date').value;
            if(f) set(ref(db, `dias_bloqueados/${f}`), true).then(() => {
                document.getElementById('input-block-date').value = '';
                showToast("BLOQUEADO");
            });
        };
        document.getElementById('btn-save-cita-calendar').onclick = () => {
            const nom = document.getElementById('add-nombre').value, sk = document.getElementById('add-servicio-select').value;
            if(nom && sk) {
                const s = catalogoGlobal[sk];
                push(ref(db, 'citas'), { nombre: nom, whatsapp: iti.getNumber(), servicio: s.nombre, precio: s.precio, fecha: selectedDateTime, estado: "Pendiente" }).then(cerrarModalAdd);
            }
        };

        flatpickr("#input-block-date", { locale: "es", minDate: "today", dateFormat: "Y-m-d" });
    </script>
</body>
</html>
