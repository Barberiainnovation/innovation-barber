<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Innovation Barber Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .logo { width: 120px; margin-bottom: 20px; }
        .no-citas { text-align: center; color: #555; margin-top: 50px; }
        /* Estilos de la tarjeta */
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 6px solid #d4af37; }
        .btn-wa { background: #25d366; color: white; padding: 12px; display: block; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .btn-finish { width: 100%; margin-top: 8px; padding: 10px; background: #444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <img src="logo.png" alt="Logo" class="logo">
    <h2>CITAS RECIBIDAS</h2>
    
    <div id="lista-citas" class="container">Cargando agenda...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            storageBucket: "innovation-barber-studio.firebasestorage.app",
            messagingSenderId: "589786876751",
            appId: "1:589786876751:web:31b40f11b3810470e9933a",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'citas'), (snapshot) => {
            render(snapshot.val());
        });

        // ESTA ES LA FUNCIÓN QUE DEBES PEGAR/REEMPLAZAR
        function render(data) {
            const lista = document.getElementById('lista-citas');
            lista.innerHTML = '';
            
            if (!data) {
                lista.innerHTML = '<p class="no-citas">No hay citas nuevas.</p>';
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;

                // Si no hay whatsapp en Firebase, mostrará "SINDATO" para que sepamos qué falla
                const telefono = c.whatsapp ? c.whatsapp.toString().replace(/\D/g, '') : 'SINDATO';
                const msjWA = `Hola ${c.nombre}, confirmamos tu cita en Innovation Barber Studio.`;
                
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <h3 style="color:#d4af37; margin:0;">${c.nombre}</h3>
                    <p><strong>WhatsApp:</strong> ${telefono}</p>
                    <p><strong>Servicio:</strong> ${c.servicio}</p>
                    <p><strong>Fecha:</strong> ${c.fecha}</p>
                    
                    <a href="https://wa.me/${telefono}?text=${encodeURIComponent(msjWA)}" target="_blank" class="btn-wa">
                       ABRIR WHATSAPP
                    </a>
                    <button class="btn-finish" onclick="cambiarEstado('${id}', 'Finalizada')">
                       ARCHIVAR CITA
                    </button>
                `;
                lista.appendChild(div);
            });
        }

        window.cambiarEstado = (id, nuevo) => {
            update(ref(db, `citas/${id}`), { estado: nuevo });
        };
    </script>
</body>
</html>
