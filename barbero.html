    <style>
        /* ==========================================
           VARIABLES DE DISEÑO (PALETA ÉLITE)
           ========================================== */
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --gold: #d4af37; 
            --gold-dark: #aa8c2c; 
            --border: #1a1a1a; 
            --green: #2ecc71; 
            --red: #ff4d4d; 
            --glass: rgba(10, 10, 10, 0.98); 
        }

        .block-item-admin { 
    display: flex; justify-content: space-between; align-items: center; 
    background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 12px; 
    margin-bottom: 8px; font-size: 0.8rem; border-left: 3px solid var(--red); 
}
        
        /* ==========================================
           ESTILOS BASE Y SCROLLBAR
           ========================================== */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* ==========================================
           LOGIN OVERLAY
           ========================================== */
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .login-box { 
            width: 320px; 
            padding: 45px; 
            text-align: center; 
            background: var(--card); 
            border-radius: 35px; 
            border: 1px solid var(--border); 
            box-shadow: 0 0 40px rgba(212,175,55,0.05); 
        }

        /* ==========================================
           ESTRUCTURA DASHBOARD
           ========================================== */
        #admin-content { 
            display: none; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .main-grid { 
            display: grid; 
            grid-template-columns: 1fr 340px; 
            gap: 25px; 
            margin-top: 10px; 
        }

        @media (max-width: 1100px) { 
            .main-grid { 
                grid-template-columns: 1fr; 
            } 
        }

        /* ==========================================
           CALENDARIO (MODERN DARK)
           ========================================== */
     #calendar-container {
    background: var(--card);
    padding: 15px;
    border-radius: 35px;
    border: 1px solid var(--border);
    /* ASEGÚRATE DE QUE ESTÉ ASÍ */
    height: auto; 
}

        .fc { 
            --fc-border-color: #161616; 
            --fc-today-bg-color: rgba(212,175,55,0.02); 
            font-size: 0.85rem; 
        }

        .fc .fc-toolbar-title { 
            font-size: 1.1rem !important; 
            text-transform: uppercase; 
            color: var(--gold); 
            font-weight: 600; 
            letter-spacing: 1px;
        }

        .fc-event-main { 
            font-weight: 600; 
            font-size: 0.75rem !important; 
            line-height: 1.2; 
            display: flex; 
            align-items: center; 
            padding: 3px 6px; 
            cursor: pointer; 
        }

        .fc .fc-button-primary {
            background-color: #111 !important;
            border-color: #222 !important;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .fc .fc-button-primary:hover {
            background-color: var(--gold) !important;
            color: #000 !important;
        }

        /* ==========================================
           SIDEBAR STATS
           ========================================== */
        .sidebar-stats { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 35px; 
            padding: 30px; 
            border-top: 5px solid var(--gold); 
            position: sticky; 
            top: 15px; 
            height: fit-content; 
        }

        .sidebar-logo { 
            width: 100px; 
            margin-bottom: 20px; 
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.2)); 
        }

        .stat-group {
            margin-bottom: 25px;
        }

        .stat-val { 
            font-size: 2.3rem; 
            font-weight: 600; 
            color: var(--gold); 
            line-height: 1;
        }

        .stat-label { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: #666; 
            letter-spacing: 2px; 
            font-weight: 600;
        }

        #desglose-servicios { 
            margin-top: 15px; 
            border-top: 1px solid #1a1a1a; 
            padding-top: 10px; 
        }

        .serv-stat-item { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.65rem; 
            color: #888; 
            margin-top: 6px; 
            text-transform: uppercase; 
        }

        /* ==========================================
           TARJETAS DE CITAS PENDIENTES
           ========================================== */
        .citas-list { 
            margin-top: 40px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; 
            padding-bottom: 120px; 
        }

        .card { 
            background: #060606; 
            border: 1px solid var(--border); 
            padding: 15px 20px; 
            border-radius: 20px; 
            border-left: 4px solid var(--gold); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #333;
        }

        /* ==========================================
           SISTEMA DE MODALES (VENTANAS ELEGANTES)
           ========================================== */
        .modal { 
            display: none; 
            position: fixed; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(15px); 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
        }

        .modal-content { 
            background: var(--glass); 
            padding: 40px; 
            border: 1px solid var(--gold); 
            width: 90%; 
            max-width: 400px; 
            border-radius: 40px; 
            text-align: center; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); 
        }

        .modal-content h3 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ==========================================
           ELEMENTOS DE FORMULARIO
           ========================================== */
        input, select, textarea { 
            background: rgba(255,255,255,0.03); 
            color: #fff; 
            border: 1px solid #1a1a1a; 
            padding: 14px; 
            border-radius: 18px; 
            width: 100%; 
            margin-bottom: 12px; 
            outline: none; 
            font-family: 'Poppins'; 
            box-sizing: border-box; 
            font-size: 0.85rem; 
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        /* ==========================================
           BOTONES PERSONALIZADOS
           ========================================== */
        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 20px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn-gold { 
            background: linear-gradient(135deg, var(--gold), var(--gold-dark)); 
            color: #000; 
        }

        .btn-gold:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(212,175,55,0.2);
        }

        .btn-outline { 
            background: transparent; 
            border: 1px solid #333; 
            color: #777; 
            margin-top: 12px; 
        }

        .btn-red { 
            background: rgba(255, 77, 77, 0.1); 
            border: 1px solid var(--red); 
            color: var(--red); 
        }

        .btn-mini { 
            width: auto; 
            padding: 6px 14px; 
            border-radius: 10px; 
            font-size: 0.6rem; 
            font-weight: 700; 
            background: var(--green); 
            color: #000; 
            border: none; 
            cursor: pointer; 
        }

        .btn-config-float { 
            position: fixed; 
            bottom: 35px; 
            right: 35px; 
            background: var(--gold); 
            color: #000; 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.8rem; 
            z-index: 5000; 
            border: none; 
            cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* ==========================================
           NOTIFICACIONES (TOAST)
           ========================================== */
        #toast { 
            position: fixed; 
            bottom: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: var(--gold); 
            color: #000; 
            padding: 16px 45px; 
            border-radius: 50px; 
            font-weight: 700; 
            z-index: 11000; 
            transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            font-size: 0.85rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #toast.show { 
            bottom: 40px; 
        }
       /* --- LIMPIEZA DEL POPUP (SOLO QUITAR AMARILLO) --- */
.fc-popover {
    background-color: #0a0a0a !important;
    border: 1px solid var(--gold) !important;
    z-index: 9999 !important;
}

.fc-popover-header {
    background-color: #1a1a1a !important;
    color: var(--gold) !important;
}

.fc-popover-body {
    background-color: #0a0a0a !important;
}

/* LA CLAVE: Aquí quitamos el amarillo y ponemos texto blanco */
.fc-popover-body .fc-daygrid-event {
    background-color: transparent !important; /* Cero amarillo */
    border: none !important;
    color: #ffffff !important; /* Texto blanco puro */
}

/* El punto dorado para que no se vea vacío */
.fc-popover-body .fc-daygrid-event::before {
    content: "• ";
    color: var(--gold);
    font-weight: bold;
}

.fc-popover-close {
    color: #fff !important;
}
    </style>
</head>

        // --- RENDERIZADO MAESTRO DE DATOS ---
        function renderAdmin(data) {
            const lista = document.getElementById('lista-citas');
            const cCount = document.getElementById('citas-count');
            const iTotal = document.getElementById('ingreso-total');
            const pCount = document.getElementById('count-pendientes');
            const pLabel = document.getElementById('label-pendientes');
            const desglose = document.getElementById('desglose-servicios');
            
            lista.innerHTML = ''; 
            desglose.innerHTML = '';
            
            let finalizadosMes = 0;
            let ingresosMes = 0;
            let pendientesDiaEnPantalla = 0;
            let eventosCalendar = [];
            let contadorServicios = {};

            const ahora = new Date();
            const mesActual = ahora.getMonth();
            const añoActual = ahora.getFullYear();
            const hoyRealIso = ahora.toISOString().split('T')[0];

            // 1. Etiqueta de la fecha
            if (fechaVisualizada === hoyRealIso) {
                pLabel.innerText = "Pendientes Hoy";
            } else {
                const opciones = { day: 'numeric', month: 'short' };
                const fechaFormateada = new Date(fechaVisualizada + "T12:00:00").toLocaleDateString('es-GT', opciones);
                pLabel.innerText = "Pendientes " + fechaFormateada;
            }

            if(data){
                Object.keys(data).forEach(id => {
                    const cita = data[id];
                    if (!cita.fecha) return;

                    // 1. Definición limpia de estados
                    const esFinalizada = cita.estado === 'Finalizada';
                    const fechaLimpia = cita.fecha.split('T')[0];
                    const fCita = new Date(fechaLimpia + "T12:00:00");

                    // 2. CONTAR FINALIZADOS DEL MES (Cuadros de Clientes e Ingresos)
                    if(esFinalizada && fCita.getMonth() === mesActual && fCita.getFullYear() === añoActual) { 
                        finalizadosMes++; 
                        ingresosMes += parseFloat(cita.precio || 0); 
                        if(cita.servicio) {
                            contadorServicios[cita.servicio] = (contadorServicios[cita.servicio] || 0) + 1; 
                        }
                    }

                    // 3. CONTAR PENDIENTES DEL DÍA (Número dorado de la derecha)
                    // Usamos fechaLimpia === fechaVisualizada para precisión total
                    if (cita.estado !== 'Finalizada' && fechaLimpia === fechaVisualizada) {
                        pendientesDiaEnPantalla++;
                    }

                    // 4. Configurar eventos del calendario
                    eventosCalendar.push({ 
                        id: id, 
                        title: cita.nombre, 
                        start: cita.fecha, 
                        backgroundColor: esFinalizada ? '#1a1a1a' : '#d4af37', 
                        borderColor: esFinalizada ? '#222' : '#aa8c2c',
                        textColor: esFinalizada ? '#555' : '#000', 
                        extendedProps: { ...cita } 
                    });
                    
                    // 5. Dibujar las tarjetas (Cintas) de abajo
                    // Usamos la misma lógica que el punto 3 para que coincidan
                    // 5. Dibujar las tarjetas (Cintas) de abajo
                    if (esPendiente && fechaLimpia === fechaVisualizada) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div style="flex:1">
                                <div style="font-size:0.6rem; color:var(--gold); font-weight:600; text-transform:uppercase; margin-bottom:2px;">
                                    ${cita.fecha.split('T')[1]} - ${cita.servicio}
                                </div>
                                <h4 style="margin:0; font-size:0.85rem; letter-spacing:0.5px;">${cita.nombre}</h4>
                                ${cita.nota ? `<p style="margin:4px 0 0; font-size:0.65rem; color:#555; font-style:italic;">"${cita.nota}"</p>` : ""}
                            </div>
                            <button class="btn-mini" onclick="cambiarEstado('${id}','Finalizada')">
                                <i class="fas fa-check"></i> FIN
                            </button>
                        `;
                        lista.appendChild(card);
                    }
                });
            }

            // 6. Mostrar el desglose de servicios
            Object.keys(contadorServicios).forEach(serv => {
                desglose.innerHTML += `<div class="serv-stat-item"><span>${serv}</span><span>x${contadorServicios[serv]}</span></div>`;
            });

            // 7. ACTUALIZAR LOS NÚMEROS EN PANTALLA
            cCount.innerText = finalizadosMes;
            iTotal.innerText = 'Q' + ingresosMes.toLocaleString('es-GT', { minimumFractionDigits: 2 });
            pCount.innerText = pendientesDiaEnPantalla;

            // Actualizar calendario
            calendar.removeAllEvents();
            calendar.addEventSource(eventosCalendar);
        }

        // --- FUNCIÓN PARA MOVER CITAS (DRAG & DROP) ---
        function actualizarHorarioCita(event) {
    const citaId = event.id;
    
    // Convertimos la fecha al formato que entiende tu sistema (YYYY-MM-DDTHH:mm)
    // Esto asegura que el "index" detecte el cambio correctamente
    const start = event.start;
    const year = start.getFullYear();
    const month = String(start.getMonth() + 1).padStart(2, '0');
    const day = String(start.getDate()).padStart(2, '0');
    const hours = String(start.getHours()).padStart(2, '0');
    const minutes = String(start.getMinutes()).padStart(2, '0');
    
    const nuevaFechaFormateada = `${year}-${month}-${day}T${hours}:${minutes}`;

    // Actualizamos en Firebase
    update(ref(db, 'citas/' + citaId), {
        fecha: nuevaFechaFormateada
    }).then(() => {
        showToast("HORARIO ACTUALIZADOO");
    }).catch((error) => {
        console.error("Error al mover:", error);
        showToast("ERROR AL REPROGRAMAR");
        location.reload(); 
    });
}
        window.abrirEventoDirecto = function(id) {
    const ev = calendar.getEventById(id);
    if(ev) calendar.trigger('eventClick', { event: ev });
};
