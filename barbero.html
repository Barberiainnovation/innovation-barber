<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Innovation</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #111; --gold: #d4af37; --border: #333; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        header { text-align: center; margin-bottom: 20px; }
        .logo { width: 80px; }
        #calendar-container { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; }
        .fc { color: #fff; font-size: 0.8rem; }
        .fc-toolbar-title { color: var(--gold) !important; font-size: 1rem !important; }
        .fc-button { background: var(--gold) !important; color: #000 !important; border: none !important; font-weight: bold !important; }
        
        .container { width: 100%; max-width: 450px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-accept { background: var(--gold); color: #000; }
        .btn-finish { background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>
    <header><img src="logo.png" alt="Logo" class="logo"><h2>Panel Admin</h2></header>

    <div id="calendar-container"><div id="calendar"></div></div>

    <div class="container"><div id="lista-citas"></div></div>

    <audio id="notif-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2210/2210-preview.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let calendar;
        let inicial = true;

        document.addEventListener('DOMContentLoaded', () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: 'auto',
                navLinks: true,
                // Al tocar el número o el día, va a la vista de día
                navLinkDayClick: (date) => calendar.changeView('timeGridDay', date),
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridDay' },
                buttonText: { today: 'Hoy', month: 'Mes', day: 'Día' }
            });
            calendar.render();
        });

        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            // Sonido: Solo si no es la primera carga y hay datos nuevos
            if (!inicial && data) {
                const sound = document.getElementById('notif-sound');
                sound.play().catch(e => console.log("Interacción requerida para sonido"));
            }
            inicial = false;
            render(data);
        });

        function render(data) {
            const lista = document.getElementById('lista-citas');
            lista.innerHTML = '';
            const eventos = [];
            if (!data) return;

            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;

                // Ahora el evento muestra Nombre y Servicio
                eventos.push({ 
                    title: `${c.nombre} - ${c.servicio}`, 
                    start: c.fecha, 
                    backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : '#444' 
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-size:0.7rem; color:var(--gold); float:right">${c.estado}</div>
                    <h3>${c.nombre}</h3>
                    <p>💈 ${c.servicio}</p>
                    <p>📅 ${new Date(c.fecha).toLocaleString()}</p>
                    ${c.estado === 'Pendiente' ? 
                    `<button class="btn btn-accept" onclick="cambiarEstado('${id}', 'Aceptada')">Aceptar y WhatsApp</button>` : 
                    `<button class="btn btn-finish" onclick="cambiarEstado('${id}', 'Finalizada')">Finalizar</button>`}
                `;
                lista.appendChild(card);
            });
            calendar.removeAllEvents();
            calendar.addEventSource(eventos);
        }

        window.cambiarEstado = (id, estado) => {
            get(ref(db, `citas/${id}`)).then((snap) => {
                const c = snap.val();
                if (c && estado === 'Aceptada') {
                    const msg = `¡Hola ${c.nombre}! 👋 Confirmamos tu cita para *${c.servicio}* el día *${new Date(c.fecha).toLocaleString()}*.`;
                    window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
                }
                update(ref(db, `citas/${id}`), { estado });
            });
        };
    </script>
</body>
</html>
