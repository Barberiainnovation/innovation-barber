<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin | Elite Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/es.global.min.js"></script>
    
    <style>
        /* ==========================================
           VARIABLES DE DISEÑO (PALETA ÉLITE)
           ========================================== */
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --gold: #d4af37; 
            --gold-dark: #aa8c2c; 
            --border: #1a1a1a; 
            --green: #2ecc71; 
            --red: #ff4d4d; 
            --glass: rgba(10, 10, 10, 0.98); 
        }

        /* ==========================================
           ESTILOS BASE Y SCROLLBAR
           ========================================== */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; 
        }

        .login-box { 
            width: 320px; padding: 45px; text-align: center; background: var(--card); 
            border-radius: 35px; border: 1px solid var(--border); box-shadow: 0 0 40px rgba(212,175,55,0.05); 
        }

        #admin-content { display: none; max-width: 1400px; margin: 0 auto; }

        .main-grid { 
            display: grid; grid-template-columns: 1fr 340px; gap: 25px; margin-top: 10px; 
        }

        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

        /* ==========================================
           CALENDARIO (MODERN DARK)
           ========================================== */
        #calendar-container { 
            background: var(--card); padding: 20px; border-radius: 35px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .fc { --fc-border-color: #161616; --fc-today-bg-color: rgba(212,175,55,0.02); font-size: 0.85rem; }
        .fc .fc-toolbar-title { font-size: 1.1rem !important; text-transform: uppercase; color: var(--gold); font-weight: 600; letter-spacing: 1px;}
        .fc-event-main { font-weight: 600; font-size: 0.75rem !important; display: flex; align-items: center; padding: 3px 6px; cursor: pointer; }
        .fc .fc-button-primary { background-color: #111 !important; border-color: #222 !important; text-transform: uppercase; font-size: 0.7rem; font-weight: 600; }
        .fc .fc-button-primary:hover { background-color: var(--gold) !important; color: #000 !important; }

        /* ==========================================
           SIDEBAR STATS
           ========================================== */
        .sidebar-stats { 
            background: var(--card); border: 1px solid var(--border); border-radius: 35px; 
            padding: 30px; border-top: 5px solid var(--gold); position: sticky; top: 15px; height: fit-content; 
        }

        .sidebar-logo { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.2)); }
        .stat-group { margin-bottom: 25px; }
        .stat-val { font-size: 2.3rem; font-weight: 600; color: var(--gold); line-height: 1; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #666; letter-spacing: 2px; font-weight: 600; }

        /* ==========================================
           TARJETAS DE CITAS PENDIENTES
           ========================================== */
        .citas-list { 
            margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; padding-bottom: 120px; 
        }

        .card { 
            background: #060606; border: 1px solid var(--border); padding: 15px 20px; border-radius: 20px; 
            border-left: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; 
        }

        /* ==========================================
           MODALES
           ========================================== */
        .modal { 
            display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; z-index: 10000; 
        }

        .modal-content { 
            background: var(--glass); padding: 40px; border: 1px solid var(--gold); width: 90%; 
            max-width: 400px; border-radius: 40px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.8); 
        }

        input, select, textarea { 
            background: rgba(255,255,255,0.03); color: #fff; border: 1px solid #1a1a1a; 
            padding: 14px; border-radius: 18px; width: 100%; margin-bottom: 12px; outline: none; 
            font-family: 'Poppins'; box-sizing: border-box; font-size: 0.85rem; 
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 20px; font-weight: 700; cursor: pointer; 
            border: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; 
        }

        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #777; margin-top: 12px; }
        .btn-red { background: rgba(255, 77, 77, 0.1); border: 1px solid var(--red); color: var(--red); }
        .btn-config-float { position: fixed; bottom: 35px; right: 35px; background: var(--gold); color: #000; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; z-index: 5000; border: none; cursor: pointer; }

        /* FIX WHATSAPP MOVIL */
        .iti { width: 100% !important; margin-bottom: 12px; }
        .iti__country-list { 
            background-color: #0a0a0a !important; 
            border: 1px solid #333 !important; 
            color: white !important; 
            max-width: 300px !important; 
        }
        
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 16px 45px; border-radius: 50px; font-weight: 700; z-index: 11000; transition: 0.6s; font-size: 0.85rem; }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div id="toast">ACCIÓN EXITOSA</div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" style="width: 90px; margin-bottom: 25px;">
            <h2 style="font-size: 1rem; color: var(--gold); margin-bottom: 30px; letter-spacing: 2px;">ADMIN PANEL</h2>
            <button class="btn btn-gold" onclick="loginGoogle()">
                <i class="fab fa-google" style="margin-right: 10px;"></i> ENTRAR AL SISTEMA
            </button>
        </div>
    </div>

    <div id="admin-content">
        <button class="btn-config-float" onclick="toggleConfig()">
            <i class="fas fa-sliders-h"></i>
        </button>

        <div class="main-grid">
            <div id="calendar-container">
                <div id="calendar"></div>
            </div>

            <aside class="sidebar-stats">
                <header style="text-align: center; margin-bottom:40px;">
                    <img src="logo.png" class="sidebar-logo">
                </header>
                <div class="stat-group">
                    <span class="stat-label">Finalizados Mes</span><br>
                    <span class="stat-val" id="citas-count">0</span>
                    <div id="desglose-servicios" style="font-size: 0.7rem; color: #666; margin-top: 10px;"></div>
                </div>
                <div class="stat-group" style="background: rgba(212, 175, 55, 0.05); padding: 20px; border-radius: 25px;">
                    <span class="stat-label" id="label-pendientes">Pendientes Hoy</span><br>
                    <span class="stat-val" id="count-pendientes">0</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">Ingresos Mes</span><br>
                    <span class="stat-val" id="ingreso-total" style="color:var(--green);">Q0.00</span>
                </div>
            </aside>
        </div>

        <div class="citas-list" id="lista-citas"></div>

        <div id="modalAddCita" class="modal">
            <div class="modal-content">
                <h3 style="color:var(--gold);">AGENDAR CITA</h3>
                <p id="add-fecha-display" style="font-size: 0.8rem; color: #666;"></p>
                <input type="text" id="add-nombre" placeholder="Nombre del cliente">
                <input type="tel" id="add-whatsapp-input">
                <select id="add-servicio-select"></select>
                <textarea id="add-nota" placeholder="Notas..."></textarea>
                <button class="btn btn-gold" id="btn-save-cita-calendar">CONFIRMAR</button>
                <button class="btn btn-outline" onclick="cerrarModalAdd()">CANCELAR</button>
            </div>
        </div>
        
        <div id="modalEvento" class="modal">
            <div class="modal-content">
                <div id="view-mode">
                    <h3 id="pop-nombre" style="color:var(--gold);">Detalle</h3>
                    <p id="pop-fecha" style="font-size:0.85rem; color:#666;"></p>
                    <div id="pop-detalle-corte" style="margin: 20px 0;"></div>
                    <div id="pop-whatsapp" style="background:rgba(46, 204, 113, 0.1); padding:15px; border-radius:15px; cursor:pointer;">
                        <i class="fab fa-whatsapp"></i> RECORDATORIO
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                        <button class="btn btn-gold" onclick="entrarModoEdicion()">EDITAR</button>
                        <button class="btn btn-red" id="btn-eliminar-pop">BORRAR</button>
                    </div>
                    <button class="btn btn-outline" onclick="cerrarPop()">CERRAR</button>
                </div>

                <div id="edit-mode" style="display:none;">
                    <h3 style="color:var(--gold);">EDITAR</h3>
                    <input type="text" id="edit-nombre">
                    <input type="tel" id="edit-whatsapp-input">
                    <select id="edit-servicio-select"></select>
                    <input type="number" id="edit-precio">
                    <textarea id="edit-nota"></textarea>
                    <button class="btn btn-gold" id="btn-update-cita">GUARDAR</button>
                    <button class="btn btn-outline" onclick="salirModoEdicion()">VOLVER</button>
                </div>
            </div>
        </div>

        <div id="modalConfig" class="modal">
            <div class="modal-content">
                <h3>PANEL CONTROL</h3>
                <select id="config-apertura"></select>
                <select id="config-cierre"></select>
                <button class="btn btn-gold" id="btn-save-hours">GUARDAR HORARIO</button>
                <hr style="border:1px solid #111; margin:20px 0;">
                <input type="text" id="serv-n" placeholder="Servicio">
                <input type="number" id="serv-p" placeholder="Precio">
                <button class="btn btn-gold" id="btn-add-serv">AÑADIR SERVICIO</button>
                <div id="lista-servicios-admin" style="max-height:150px; overflow-y:auto; margin-top:15px;"></div>
                <button class="btn btn-outline" onclick="toggleConfig()">CERRAR</button>
            </div>
        </div>

        <div id="modalConfirm" class="modal">
            <div class="modal-content" style="max-width:300px;">
                <p id="confirm-text"></p>
                <button class="btn btn-red" id="confirm-yes">SÍ</button>
                <button class="btn btn-outline" onclick="document.getElementById('modalConfirm').style.display='none'">NO</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", 
            authDomain: "innovation-barber-studio.firebaseapp.com", 
            projectId: "innovation-barber-studio", 
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        
        let calendar, selectedDateTime, currentEditingId;
        let catalogoGlobal = {};
        let itiAdd, itiEdit;
        let fechaVisualizada = new Date().toISOString().split('T')[0];

        // CONFIGURACION TELEFONO CON FIX MÓVIL
        const itc = {
            initialCountry: "gt",
            onlyCountries: ["gt", "sv", "hn", "ni", "cr", "pa", "us", "mx"],
            separateDialCode: true,
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
        };
        itiAdd = window.intlTelInput(document.querySelector("#add-whatsapp-input"), itc);
        itiEdit = window.intlTelInput(document.querySelector("#edit-whatsapp-input"), itc);

        window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); };
        window.confirmarAccion = (t, c) => { document.getElementById('confirm-text').innerText=t; document.getElementById('modalConfirm').style.display='flex'; document.getElementById('confirm-yes').onclick=()=>{c(); document.getElementById('modalConfirm').style.display='none';}; };

        // LLENAR HORAS CONFIG
        const apS = document.getElementById('config-apertura');
        const ciS = document.getElementById('config-cierre');
        for(let h=0; h<=23; h++){ 
            const opt = document.createElement('option'); opt.value = h; opt.innerText = h.toString().padStart(2,'0')+":00";
            apS.appendChild(opt.cloneNode(true)); ciS.appendChild(opt);
        }

        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.toggleConfig = () => { const m = document.getElementById('modalConfig'); m.style.display = (m.style.display==='flex')?'none':'flex'; };

        onAuthStateChanged(auth, (user) => { if(user){ document.getElementById('login-overlay').style.display='none'; document.getElementById('admin-content').style.display='block'; initDashboard(); } });

        function initDashboard() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridDay', locale: 'es', allDaySlot: false, slotDuration: '00:30:00', nowIndicator: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                
                // --- BLOQUEO DE ALMUERZO (REINCORPORADO) ---
                events: (info, success) => {
                    onValue(ref(db, 'citas'), (snapshot) => {
                        const data = snapshot.val();
                        let evs = [];
                        // Generar bloqueos de almuerzo para los días visibles
                        let d = new Date(info.start);
                        while(d < info.end){
                            evs.push({
                                title: 'LUNCH 🍔',
                                start: d.toISOString().split('T')[0] + 'T13:00:00',
                                end: d.toISOString().split('T')[0] + 'T14:00:00',
                                display: 'background', color: '#111', overlap: false
                            });
                            d.setDate(d.getDate() + 1);
                        }
                        // Agregar citas
                        if(data) Object.keys(data).forEach(id => {
                            const c = data[id];
                            evs.push({ id, title: c.nombre, start: c.fecha, backgroundColor: c.estado==='Finalizada'?'#1a1a1a':'#d4af37', extendedProps: c });
                        });
                        success(evs);
                        renderListAndStats(data);
                    });
                },

                datesSet: (info) => { if(info.view.type !== 'dayGridMonth'){ fechaVisualizada = info.view.currentStart.toISOString().split('T')[0]; refreshData(); } },
                dateClick: (info) => { if(calendar.view.type === 'dayGridMonth'){ fechaVisualizada = info.dateStr; refreshData(); showToast("Día: " + info.dateStr); } },
                selectable: true,
                select: (info) => {
                    if(info.view.type !== 'dayGridMonth'){
                        selectedDateTime = info.startStr.substring(0,16);
                        document.getElementById('add-fecha-display').innerText = info.start.toLocaleString();
                        document.getElementById('modalAddCita').style.display='flex';
                    }
                },
                eventClick: (info) => {
                    if(info.event.display === 'background') return;
                    currentEditingId = info.event.id;
                    const m = info.event.extendedProps;
                    document.getElementById('pop-nombre').innerText = m.nombre;
                    document.getElementById('pop-detalle-corte').innerHTML = `<b>${m.servicio}</b><br>Q${m.precio}`;
                    
                    // Preparar Edición
                    document.getElementById('edit-nombre').value = m.nombre;
                    document.getElementById('edit-precio').value = m.precio;
                    document.getElementById('edit-nota').value = m.nota || "";
                    itiEdit.setNumber(m.whatsapp || "");

                    // Auto-seleccionar servicio actual
                    const sel = document.getElementById('edit-servicio-select');
                    for(let i=0; i<sel.options.length; i++) if(sel.options[i].text.includes(m.servicio)) sel.selectedIndex = i;

                    document.getElementById('modalEvento').style.display='flex';
                    
                    document.getElementById('pop-whatsapp').onclick = () => {
                        window.open(`https://wa.me/${m.whatsapp.replace(/\D/g,'')}?text=Hola ${m.nombre}, recordatorio de tu cita.`);
                    };
                }
            });
            calendar.render();

            onValue(ref(db, 'configuracion_horario'), s => {
                const c = s.val(); if(c){ calendar.setOption('slotMinTime', c.apertura.padStart(2,'0')+':00:00'); calendar.setOption('slotMaxTime', c.cierre.padStart(2,'0')+':00:00'); }
            });
            onValue(ref(db, 'servicios'), s => renderServicios(s.val() || {}));
        }

        function refreshData() { calendar.refetchEvents(); }

        function renderListAndStats(data) {
            const lista = document.getElementById('lista-citas');
            const desglose = document.getElementById('desglose-servicios');
            lista.innerHTML = ''; desglose.innerHTML = '';
            
            let finMes = 0, ingMes = 0, pendDia = 0;
            const hoy = new Date();
            const mes = hoy.getMonth(), año = hoy.getFullYear();

            if(data) Object.keys(data).forEach(id => {
                const c = data[id];
                const f = new Date(c.fecha);
                if(c.estado==='Finalizada' && f.getMonth()===mes && f.getFullYear()===año){ finMes++; ingMes += parseFloat(c.precio); }
                if(c.estado!=='Finalizada' && c.fecha.startsWith(fechaVisualizada)){
                    pendDia++;
                    const card = document.createElement('div'); card.className='card';
                    card.innerHTML = `<div><b>${c.fecha.split('T')[1]}</b> ${c.nombre}</div><button class="btn-mini" onclick="cambiarEstado('${id}','Finalizada')">FIN</button>`;
                    lista.appendChild(card);
                }
            });

            document.getElementById('citas-count').innerText = finMes;
            document.getElementById('ingreso-total').innerText = 'Q'+ingMes.toFixed(2);
            document.getElementById('count-pendientes').innerText = pendDia;
        }

        function renderServicios(servs){
            catalogoGlobal = servs;
            const sA = document.getElementById('add-servicio-select');
            const sE = document.getElementById('edit-servicio-select');
            const lA = document.getElementById('lista-servicios-admin');
            sA.innerHTML = '<option value="">Servicio...</option>'; sE.innerHTML = '<option value="">(Sin cambios)</option>'; lA.innerHTML = '';
            Object.keys(servs).forEach(id => {
                const s = servs[id];
                const o = `<option value="${id}">${s.nombre} - Q${s.precio}</option>`;
                sA.innerHTML+=o; sE.innerHTML+=o;
                lA.innerHTML+=`<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #111;">${s.nombre} <button onclick="eliminarServicio('${id}')">X</button></div>`;
            });
        }

        window.cambiarEstado = (id, e) => update(ref(db, 'citas/'+id), {estado:e});
        window.entrarModoEdicion = () => { document.getElementById('view-mode').style.display='none'; document.getElementById('edit-mode').style.display='block'; };
        window.salirModoEdicion = () => { document.getElementById('view-mode').style.display='block'; document.getElementById('edit-mode').style.display='none'; };
        window.cerrarPop = () => { document.getElementById('modalEvento').style.display='none'; salirModoEdicion(); };
        window.cerrarModalAdd = () => { document.getElementById('modalAddCita').style.display='none'; };

        document.getElementById('btn-update-cita').onclick = () => {
            const up = { nombre: document.getElementById('edit-nombre').value, whatsapp: itiEdit.getNumber(), precio: document.getElementById('edit-precio').value, nota: document.getElementById('edit-nota').value };
            const sKey = document.getElementById('edit-servicio-select').value;
            if(sKey){ up.servicio = catalogoGlobal[sKey].nombre; up.precio = catalogoGlobal[sKey].precio; }
            update(ref(db, 'citas/'+currentEditingId), up).then(() => { showToast("EDITADO"); cerrarPop(); });
        };

        document.getElementById('btn-save-cita-calendar').onclick = () => {
            const n = document.getElementById('add-nombre').value;
            const sk = document.getElementById('add-servicio-select').value;
            if(!n || !sk) return showToast("Faltan datos");
            push(ref(db, 'citas'), { nombre: n, whatsapp: itiAdd.getNumber(), servicio: catalogoGlobal[sk].nombre, precio: catalogoGlobal[sk].precio, fecha: selectedDateTime, estado: "Pendiente", nota: document.getElementById('add-nota').value })
            .then(() => { cerrarModalAdd(); showToast("Agendado"); });
        };

        document.getElementById('btn-add-serv').onclick = () => {
            const n = document.getElementById('serv-n').value, p = document.getElementById('serv-p').value;
            if(n && p) push(ref(db, 'servicios'), { nombre: n, precio: p });
        };

        document.getElementById('btn-save-hours').onclick = () => set(ref(db, 'configuracion_horario'), { apertura: apS.value, cierre: ciS.value });
        document.getElementById('btn-eliminar-pop').onclick = () => confirmarAccion("¿Borrar?", ()=>remove(ref(db, 'citas/'+currentEditingId)).then(cerrarPop));
    </script>
</body>
</html>
