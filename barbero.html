<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Admin | Acceso Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; --text-dim: #888; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* PANTALLA DE LOGIN */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            width: 100%; max-width: 320px; padding: 40px; text-align: center;
            background: var(--card); border-radius: 25px; border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,1);
        }
        .btn-google {
            background: #fff; color: #000; padding: 12px; border-radius: 12px; 
            border: none; font-weight: 600; display: flex; align-items: center; 
            justify-content: center; gap: 10px; width: 100%; cursor: pointer; margin-top: 20px;
        }
        .btn-registro {
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 12px; border-radius: 12px; font-weight: 600; width: 100%;
            cursor: pointer; margin-top: 15px; font-size: 0.7rem; text-transform: uppercase;
        }
        
        /* CONTENIDO PRINCIPAL */
        #admin-content { display: none; }
        header { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 10px auto 30px; }
        .logo { width: 60px; }
        .btn-config { background: transparent; border: none; color: var(--gold); font-size: 1.5rem; cursor: pointer; }

        /* CALENDARIO PREMIUM */
        #calendar-container { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); max-width: 900px; margin: 0 auto 40px; }
        .fc-col-header-cell-cushion, .fc-daygrid-day-number, .fc-timegrid-slot-label-cushion { 
            text-decoration: none !important; border: none !important; color: #fff !important; 
        }
        .fc-button { background: transparent !important; border: 1px solid var(--border) !important; color: var(--gold) !important; text-transform: uppercase !important; font-size: 0.6rem !important; }
        .fc-button-active { background: var(--gold) !important; color: #000 !important; }

        /* CITAS */
        .admin-box { max-width: 500px; margin: 0 auto; }
        .card { background: linear-gradient(145deg, #111, #080808); border: 1px solid var(--border); padding: 20px; border-radius: 18px; margin-bottom: 15px; border-left: 4px solid var(--gold); position: relative; }
        .price-tag { position: absolute; top: 15px; right: 15px; color: var(--gold); font-weight: bold; }
        .nota-cliente { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--gold); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.75rem; display: block; }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; font-size: 0.65rem; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: #000; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 30px; border: 1px solid var(--gold); width: 90%; max-width: 400px; border-radius: 20px; }
        input { background: #000; color: #fff; border: 1px solid #222; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" alt="Logo" style="width: 70px; margin-bottom: 10px;">
            <h2 style="color:var(--gold); font-size: 0.8rem; letter-spacing: 2px;">INNOVATION ADMIN</h2>
            <button class="btn-google" onclick="loginGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                Entrar con Google
            </button>
            <button class="btn-registro" onclick="registrarNuevoAdmin()">¿Eres nuevo? Registrarse</button>
            <p id="error-msg" style="color: red; font-size: 0.6rem; margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <div id="admin-content">
        <header>
            <img src="logo.png" alt="Logo" class="logo">
            <button class="btn-config" onclick="toggleModal()"><i class="fas fa-cog"></i></button>
        </header>
        <div id="calendar-container"><div id="calendar"></div></div>
        <div class="admin-box"><div id="lista-citas"></div></div>

        <div id="modalServicios" class="modal">
            <div class="modal-content">
                <h3 style="color:var(--gold); margin-top:0;">Configurar Servicios</h3>
                <input type="text" id="serv-n" placeholder="Nombre (ej: Corte)">
                <input type="text" id="serv-p" placeholder="Precio (ej: 100)">
                <button class="btn btn-gold" onclick="agregarServicio()">Añadir</button>
                <div id="lista-servicios-admin" style="margin-top:20px; max-height:200px; overflow-y:auto;"></div>
                <button class="btn" style="background:#222; color:#fff;" onclick="toggleModal()">Cerrar</button>
                <button class="btn" style="background:red; color:#fff; margin-top:20px;" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", 
            authDomain: "innovation-barber-studio.firebaseapp.com", 
            projectId: "innovation-barber-studio", 
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        let calendar;

        // REGISTRO CON AUTO-APROBACIÓN PARA EL PRIMERO
        window.registrarNuevoAdmin = () => {
            signInWithPopup(auth, provider).then((result) => {
                const user = result.user;
                get(ref(db, 'admins_autorizados')).then((snap) => {
                    if (!snap.exists()) {
                        set(ref(db, 'admins_autorizados/' + user.uid), { nombre: user.displayName, email: user.email, rol: 'Dueño' })
                        .then(() => { alert("¡Bienvenido! Eres el primer administrador."); location.reload(); });
                    } else {
                        set(ref(db, 'solicitudes_acceso/' + user.uid), { nombre: user.displayName, email: user.email, fecha: new Date().toISOString() })
                        .then(() => { alert("Solicitud enviada. Espera aprobación."); signOut(auth); });
                    }
                });
            }).catch(err => alert("Error: " + err.message));
        };

        window.loginGoogle = () => { signInWithPopup(auth, provider).catch(err => console.error(err)); };
        window.logout = () => { signOut(auth).then(() => location.reload()); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                get(ref(db, 'admins_autorizados/' + user.uid)).then((snap) => {
                    if (snap.exists()) {
                        document.getElementById('login-overlay').style.display = 'none';
                        document.getElementById('admin-content').style.display = 'block';
                        initCalendar();
                    } else {
                        document.getElementById('error-msg').innerText = "Acceso denegado: Usuario no autorizado.";
                        document.getElementById('error-msg').style.display = 'block';
                        signOut(auth);
                    }
                });
            }
        });

        function initCalendar() {
            if (calendar) return;
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'es', firstDay: 1, navLinks: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridDay' },
                buttonText: { today: 'Hoy', month: 'Mes', day: 'Día' },
                navLinkDayClick: (date) => calendar.changeView('timeGridDay', date),
                selectable: true,
                select: (info) => {
                    if (calendar.view.type === 'timeGridDay') {
                        const n = prompt("Nombre Cliente:");
                        if(n) push(ref(db, 'citas'), { nombre: n + " (Manual)", whatsapp: "N/A", servicio: "Manual", fecha: info.startStr.slice(0, 16), estado: 'Aceptada' });
                    }
                }
            });
            calendar.render();
            onValue(ref(db, 'citas'), (snap) => { renderCitas(snap.val()); });
            onValue(ref(db, 'servicios'), (snap) => { renderServicios(snap.val()); });
        }

        function renderCitas(data) {
            const lista = document.getElementById('lista-citas'); lista.innerHTML = ''; const eventos = []; if(!data) return;
            Object.keys(data).reverse().forEach(id => {
                const c = data[id]; if(c.estado === 'Finalizada') return;
                eventos.push({ title: c.nombre, start: c.fecha, backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : '#222', borderColor: 'transparent' });
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<div class="price-tag">${c.precio || ''}</div><div style="font-size:0.6rem; color:var(--gold); text-transform:uppercase;">${c.estado}</div><h3>${c.nombre}</h3><p>💈 ${c.servicio}</p><p>📅 ${new Date(c.fecha).toLocaleString('es-GT')}</p>${c.nota ? `<div class="nota-cliente"><strong>Nota:</strong> ${c.nota}</div>` : ''}<button class="btn btn-gold" onclick="cambiarEstado('${id}', '${c.estado === 'Pendiente' ? 'Aceptada' : 'Finalizada'}')">${c.estado === 'Pendiente' ? 'Aceptar' : 'Finalizar'}</button><button class="btn" style="background:transparent; color:red; border:1px solid red; margin-top:5px;" onclick="eliminarCita('${id}')">Eliminar</button>`;
                lista.appendChild(card);
            });
            if(calendar) { calendar.removeAllEvents(); calendar.addEventSource(eventos); }
        }

        function renderServicios(servs) {
            const div = document.getElementById('lista-servicios-admin'); div.innerHTML = '';
            if(servs) Object.keys(servs).forEach(id => { div.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #111; font-size: 0.8rem;"><span>${servs[id].nombre} (Q${servs[id].precio})</span><span style="color:red; cursor:pointer;" onclick="eliminarServicio('${id}')">✕</span></div>`; });
        }

        window.toggleModal = () => { const m = document.getElementById('modalServicios'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; };
        window.agregarServicio = () => { const n = document.getElementById('serv-n').value, p = document.getElementById('serv-p').value; if(n && p) { push(ref(db, 'servicios'), { nombre: n, precio: p }); document.getElementById('serv-n').value = ''; document.getElementById('serv-p').value = ''; } };
        window.eliminarServicio = (id) => { if(confirm('¿Borrar servicio?')) remove(ref(db, `servicios/${id}`)); };
        window.eliminarCita = (id) => { if(confirm('¿Eliminar cita?')) remove(ref(db, `citas/${id}`)); };
        window.cambiarEstado = (id, est) => { get(ref(db, `citas/${id}`)).then(snap => { const c = snap.val(); if(c && est === 'Aceptada' && c.whatsapp !== "N/A") window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent('¡Hola '+c.nombre+'! Tu cita de '+c.servicio+' ha sido confirmada.')}`); update(ref(db, `citas/${id}`), { estado: est }); }); };
    </script>
</body>
</html>
