<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin | Elite Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/es.global.min.js"></script>
    
    <style>
        :root { --bg: #000; --card: #0a0a0a; --gold: #d4af37; --gold-dark: #aa8c2c; --border: #1a1a1a; --green: #2ecc71; --red: #ff4d4d; --glass: rgba(10, 10, 10, 0.98); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 320px; padding: 45px; text-align: center; background: var(--card); border-radius: 35px; border: 1px solid var(--border); box-shadow: 0 0 40px rgba(212,175,55,0.05); }

        #admin-content { display: none; max-width: 1400px; margin: 0 auto; }
        .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 25px; margin-top: 10px; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

        #calendar-container { background: var(--card); padding: 20px; border-radius: 35px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .fc { --fc-border-color: #161616; --fc-today-bg-color: rgba(212,175,55,0.02); font-size: 0.85rem; }
        .fc .fc-toolbar-title { font-size: 1.1rem !important; text-transform: uppercase; color: var(--gold); font-weight: 600; letter-spacing: 1px; }

        .sidebar-stats { background: var(--card); border: 1px solid var(--border); border-radius: 35px; padding: 30px; border-top: 5px solid var(--gold); position: sticky; top: 15px; height: fit-content; }
        .stat-val { font-size: 2.3rem; font-weight: 600; color: var(--gold); line-height: 1; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #666; letter-spacing: 2px; font-weight: 600; }

        .citas-list { margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding-bottom: 120px; }
        .card { background: #060606; border: 1px solid var(--border); padding: 15px 20px; border-radius: 20px; border-left: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }

        .modal { display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: var(--glass); padding: 40px; border: 1px solid var(--gold); width: 90%; max-width: 400px; border-radius: 40px; text-align: center; max-height: 85vh; overflow-y: auto; }

        input, select, textarea { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid #1a1a1a; padding: 14px; border-radius: 18px; width: 100%; margin-bottom: 12px; font-family: 'Poppins'; box-sizing: border-box; font-size: 0.85rem; }
        .btn { width: 100%; padding: 18px; border-radius: 20px; font-weight: 700; cursor: pointer; border: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #777; margin-top: 12px; }
        .btn-red { background: rgba(255, 77, 77, 0.1); border: 1px solid var(--red); color: var(--red); }
        .btn-config-float { position: fixed; bottom: 35px; right: 35px; background: var(--gold); color: #000; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; z-index: 5000; border: none; cursor: pointer; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 16px 45px; border-radius: 50px; font-weight: 700; z-index: 11000; transition: 0.6s; }
        #toast.show { bottom: 40px; }
        .block-item { background: rgba(255, 77, 77, 0.05); padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; border: 1px solid #1a1a1a; }
    </style>
</head>
<body>

    <div id="toast">ACCIÓN EXITOSA</div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" style="width: 90px; margin-bottom: 25px;">
            <h2 style="font-size: 1rem; color: var(--gold); margin-bottom: 30px; letter-spacing: 2px;">ADMIN PANEL</h2>
            <button class="btn btn-gold" onclick="loginGoogle()"><i class="fab fa-google"></i> ENTRAR AL SISTEMA</button>
        </div>
    </div>

    <div id="admin-content">
        <button class="btn-config-float" onclick="toggleConfig()"><i class="fas fa-sliders-h"></i></button>

        <div class="main-grid">
            <div id="calendar-container"><div id="calendar"></div></div>
            <aside class="sidebar-stats">
                <header style="text-align: center; margin-bottom:40px;"><img src="logo.png" class="sidebar-logo"></header>
                <div class="stat-group"><span class="stat-label">Finalizados Mes</span><br><span class="stat-val" id="citas-count">0</span><div id="desglose-servicios"></div></div>
                <div class="stat-group" style="background: rgba(212, 175, 55, 0.05); padding: 20px; border-radius: 25px; border: 1px solid rgba(212,175,55,0.1);"><span class="stat-label" id="label-pendientes">Pendientes Hoy</span><br><span class="stat-val" id="count-pendientes" style="font-size: 1.8rem;">0</span></div>
                <div class="stat-group" style="background: rgba(46, 204, 113, 0.05); padding: 20px; border-radius: 25px;"><span class="stat-label" style="color:var(--green);">Ingresos Mes</span><br><span class="stat-val" id="ingreso-total" style="color:var(--green);">Q0.00</span></div>
            </aside>
        </div>

        <div class="citas-list" id="lista-citas"></div>

        <div id="modalAddCita" class="modal">
            <div class="modal-content">
                <h3 style="color:var(--gold);">AGENDAR CITA</h3>
                <p id="add-fecha-display" style="font-size: 0.8rem; color: #666; margin-bottom: 20px;"></p>
                <input type="text" id="add-nombre" placeholder="Nombre completo del cliente">
                <input type="tel" id="add-whatsapp-input">
                <select id="add-servicio-select"></select>
                <textarea id="add-nota" placeholder="¿Alguna nota especial?" rows="3"></textarea>
                <button class="btn btn-gold" id="btn-save-cita-calendar">CONFIRMAR CITA</button>
                <button class="btn btn-outline" onclick="cerrarModalAdd()">CANCELAR</button>
            </div>
        </div>
        
        <div id="modalEvento" class="modal">
            <div class="modal-content">
                <div id="view-mode">
                    <h3 id="pop-nombre" style="color:var(--gold);"></h3>
                    <p id="pop-fecha" style="font-size:0.85rem; color:#666;"></p>
                    <div id="pop-detalle-corte" style="margin: 20px 0;"></div>
                    <div id="pop-whatsapp" style="font-size:0.9rem; color:var(--green); font-weight:600; cursor:pointer; background:rgba(46, 204, 113, 0.08); padding:20px; border-radius:25px; margin-bottom:25px; border: 1px solid rgba(46, 204, 113, 0.2);"><i class="fab fa-whatsapp"></i> ENVIAR RECORDATORIO</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"><button class="btn btn-gold" onclick="entrarModoEdicion()">EDITAR</button><button class="btn btn-red" id="btn-eliminar-pop">ELIMINAR</button></div>
                    <button class="btn btn-outline" onclick="cerrarPop()">CERRAR</button>
                </div>
                <div id="edit-mode" style="display:none;">
                    <h3 style="color:var(--gold);">EDITAR</h3>
                    <input type="text" id="edit-nombre"><input type="text" id="edit-whatsapp">
                    <select id="edit-servicio-select"></select><input type="number" id="edit-precio">
                    <textarea id="edit-nota" rows="2"></textarea>
                    <button class="btn btn-gold" id="btn-update-cita">GUARDAR CAMBIOS</button>
                    <button class="btn btn-outline" onclick="salirModoEdicion()">CANCELAR</button>
                </div>
            </div>
        </div>

        <div id="modalConfig" class="modal">
            <div class="modal-content" style="max-width: 450px; max-height: 85vh; overflow-y: auto;">
                <h3 style="color:var(--gold);">PANEL DE CONTROL</h3>
                
                <p style="font-size: 0.7rem; color: #666; text-transform: uppercase; margin-top: 20px;">HORARIO LABORAL</p>
                <div style="display:flex; gap:12px; margin-bottom:10px;"><select id="config-apertura"></select><select id="config-cierre"></select></div>

                <p style="font-size: 0.7rem; color: #666; text-transform: uppercase;">HORARIO DE ALMUERZO (LUNCH)</p>
                <div style="display:flex; gap:12px; margin-bottom:10px;">
                    <select id="lunch-inicio"><option value="">Sin lunch</option></select>
                    <select id="lunch-fin"><option value="">Sin lunch</option></select>
                </div>
                <button class="btn btn-gold" id="btn-save-hours" style="padding: 12px; font-size: 0.6rem;">ACTUALIZAR HORARIOS</button>

                <hr style="border:0; border-top:1px solid #1a1a1a; margin:25px 0;">

                <p style="font-size: 0.7rem; color: #666; text-transform: uppercase;">BLOQUEAR DÍA ENTERO</p>
                <input type="text" id="input-block-date" placeholder="Elegir fecha" readonly style="cursor:pointer; text-align: center;">
                <button class="btn btn-red" id="btn-add-block" style="padding:12px; font-size: 0.6rem;">BLOQUEAR FECHA SELECCIONADA</button>
                <div id="lista-bloqueos-admin" style="margin-top:15px; text-align: left;"></div>

                <hr style="border:0; border-top:1px solid #1a1a1a; margin:30px 0;">

                <p style="font-size: 0.7rem; color: #666; text-transform: uppercase;">CATÁLOGO DE SERVICIOS</p>
                <input type="text" id="serv-n" placeholder="Nombre"><input type="number" id="serv-p" placeholder="Precio (Q)">
                <button class="btn btn-gold" id="btn-add-serv" style="padding: 12px; font-size: 0.6rem;">AÑADIR SERVICIO</button>
                <div id="lista-servicios-admin" style="margin-top:20px;"></div>

                <button class="btn btn-outline" onclick="toggleConfig()" style="margin-top: 30px;">CERRAR PANEL</button>
            </div>
        </div>

        <div id="modalConfirm" class="modal"><div class="modal-content" style="max-width: 340px;"><p id="confirm-text"></p><div style="display:flex; gap:15px;"><button class="btn btn-red" id="confirm-yes">SÍ</button><button class="btn btn-outline" onclick="document.getElementById('modalConfirm').style.display='none'">NO</button></div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        
        let calendar, selectedDateTime = null, catalogoGlobal = {}, iti, fpBlock, currentEditingId = null, fechaVisualizada = new Date().toISOString().split('T')[0];

        iti = window.intlTelInput(document.querySelector("#add-whatsapp-input"), { initialCountry: "gt", separateDialCode: true, utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js" });
        fpBlock = flatpickr("#input-block-date", { locale: "es", minDate: "today", dateFormat: "Y-m-d" });

        window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); };
        window.confirmarAccion = (t, cb) => { document.getElementById('confirm-text').innerText=t; document.getElementById('modalConfirm').style.display='flex'; document.getElementById('confirm-yes').onclick=()=>{ cb(); document.getElementById('modalConfirm').style.display='none'; }; };

        const apS = document.getElementById('config-apertura'), ciS = document.getElementById('config-cierre'), lIn = document.getElementById('lunch-inicio'), lFi = document.getElementById('lunch-fin');
        for(let h=0; h<=23; h++){ const opt = document.createElement('option'); opt.value = h; opt.innerText = h.toString().padStart(2,'0')+":00"; apS.appendChild(opt.cloneNode(true)); ciS.appendChild(opt.cloneNode(true)); lIn.appendChild(opt.cloneNode(true)); lFi.appendChild(opt); }

        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.toggleConfig = () => { const m = document.getElementById('modalConfig'); m.style.display = (m.style.display==='flex')?'none':'flex'; };

        onAuthStateChanged(auth, (user) => { if(user){ document.getElementById('login-overlay').style.display='none'; document.getElementById('admin-content').style.display='block'; initDashboard(); } });

        function initDashboard() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridDay', locale: 'es', allDaySlot: false, slotDuration: '00:30:00', nowIndicator: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                datesSet: (info) => { fechaVisualizada = info.view.currentStart.toISOString().split('T')[0]; refreshData(); },
                selectable: true,
                select: (info) => {
                    if(info.view.type !== 'dayGridMonth'){
                        selectedDateTime = info.startStr.substring(0,16);
                        document.getElementById('add-fecha-display').innerText = info.start.toLocaleString('es-GT');
                        document.getElementById('modalAddCita').style.display = 'flex';
                    }
                },
                eventClick: (info) => {
                    if(info.event.display === 'background') return;
                    currentEditingId = info.event.id;
                    const m = info.event.extendedProps;
                    document.getElementById('pop-nombre').innerText = m.nombre;
                    document.getElementById('pop-detalle-corte').innerHTML = `<div style="color:var(--gold); font-size:1.1rem; font-weight:600;">${m.servicio}</div><div style="color:var(--green); font-size:1.2rem;">Q${m.precio}</div>`;
                    document.getElementById('edit-nombre').value = m.nombre;
                    document.getElementById('edit-whatsapp').value = m.whatsapp;
                    document.getElementById('edit-precio').value = m.precio;
                    document.getElementById('modalEvento').style.display = 'flex';
                }
            });
            calendar.render();

            onValue(ref(db, 'configuracion_horario'), snap => {
                const c = snap.val();
                if(c){
                    calendar.setOption('slotMinTime', c.apertura.padStart(2,'0')+':00:00');
                    calendar.setOption('slotMaxTime', c.cierre.padStart(2,'0')+':00:00');
                    apS.value = c.apertura; ciS.value = c.cierre;
                    lIn.value = c.lunch_inicio || ""; lFi.value = c.lunch_fin || "";
                }
            });

            onValue(ref(db, 'dias_bloqueados'), snap => {
                const list = document.getElementById('lista-bloqueos-admin');
                list.innerHTML = ''; const bloqueos = snap.val() || {};
                Object.keys(bloqueos).forEach(f => {
                    list.innerHTML += `<div class="block-item"><span>${f}</span><i class="fas fa-trash" style="color:var(--red); cursor:pointer;" onclick="window.eliminarBloqueo('${f}')"></i></div>`;
                });
                refreshData();
            });

            onValue(ref(db, 'citas'), snap => renderAdmin(snap.val()));
            onValue(ref(db, 'servicios'), snap => renderServicios(snap.val() || {}));
        }

        function refreshData(){ onValue(ref(db, '/'), snap => {
            const data = snap.val() || {};
            const citas = data.citas || {};
            const bloqueos = data.dias_bloqueados || {};
            const config = data.configuracion_horario || {};
            let evs = [];

            // Render Bloqueos y Lunch
            let d = new Date(calendar.view.activeStart);
            while(d < calendar.view.activeEnd){
                const fISO = d.toISOString().split('T')[0];
                if(bloqueos[fISO]) evs.push({ start: fISO, end: fISO, display: 'background', color: 'rgba(255,0,0,0.1)' });
                if(config.lunch_inicio && config.lunch_fin){
                    evs.push({ title: 'ALMUERZO 🍱', start: fISO+'T'+config.lunch_inicio.padStart(2,'0')+':00:00', end: fISO+'T'+config.lunch_fin.padStart(2,'0')+':00:00', display: 'background', color: '#111' });
                }
                d.setDate(d.getDate()+1);
            }

            Object.keys(citas).forEach(id => {
                const c = citas[id];
                evs.push({ id, title: c.nombre, start: c.fecha, backgroundColor: c.estado==='Finalizada'?'#1a1a1a':'#d4af37', extendedProps: c });
            });
            calendar.removeAllEvents(); calendar.addEventSource(evs);
        }, {onlyOnce: true}); }

        function renderAdmin(data) {
            const lista = document.getElementById('lista-citas'), cCount = document.getElementById('citas-count'), iTotal = document.getElementById('ingreso-total'), pCount = document.getElementById('count-pendientes');
            lista.innerHTML = ''; let fMes = 0, iMes = 0, pDia = 0, mesA = new Date().getMonth();
            if(data){
                Object.keys(data).forEach(id => {
                    const c = data[id], f = new Date(c.fecha);
                    if(c.estado==='Finalizada' && f.getMonth()===mesA){ fMes++; iMes+=parseFloat(c.precio); }
                    if(c.estado!=='Finalizada' && c.fecha.startsWith(fechaVisualizada)){
                        pDia++;
                        const card = document.createElement('div'); card.className='card';
                        card.innerHTML = `<div><div style="font-size:0.6rem; color:var(--gold);">${c.fecha.split('T')[1]}</div><h4>${c.nombre}</h4></div><button class="btn-mini" onclick="cambiarEstado('${id}','Finalizada')">FIN</button>`;
                        lista.appendChild(card);
                    }
                });
            }
            cCount.innerText = fMes; iTotal.innerText = 'Q'+iMes.toFixed(2); pCount.innerText = pDia;
        }

        window.eliminarBloqueo = (f) => remove(ref(db, `dias_bloqueados/${f}`));
        document.getElementById('btn-add-block').onclick = () => { const f = document.getElementById('input-block-date').value; if(f) set(ref(db, `dias_bloqueados/${f}`), true); };
        window.cambiarEstado = (id, e) => update(ref(db, `citas/${id}`), { estado: e });
        window.cerrarPop = () => { document.getElementById('modalEvento').style.display='none'; salirModoEdicion(); };
        window.cerrarModalAdd = () => document.getElementById('modalAddCita').style.display='none';
        window.entrarModoEdicion = () => { document.getElementById('view-mode').style.display='none'; document.getElementById('edit-mode').style.display='block'; };
        window.salirModoEdicion = () => { document.getElementById('view-mode').style.display='block'; document.getElementById('edit-mode').style.display='none'; };

        document.getElementById('btn-save-hours').onclick = () => {
            update(ref(db, 'configuracion_horario'), { apertura: apS.value, cierre: ciS.value, lunch_inicio: lIn.value, lunch_fin: lFi.value }).then(()=>showToast("GUARDADO"));
        };

        document.getElementById('btn-save-cita-calendar').onclick = () => {
            const n = document.getElementById('add-nombre').value, sk = document.getElementById('add-servicio-select').value;
            if(!n || !sk) return;
            const s = catalogoGlobal[sk];
            push(ref(db, 'citas'), { nombre: n, whatsapp: iti.getNumber(), servicio: s.nombre, precio: s.precio, fecha: selectedDateTime, estado: "Pendiente", nota: document.getElementById('add-nota').value }).then(cerrarModalAdd);
        };

        function renderServicios(servs){
            catalogoGlobal = servs;
            const sAdd = document.getElementById('add-servicio-select'), sEd = document.getElementById('edit-servicio-select'), lAd = document.getElementById('lista-servicios-admin');
            sAdd.innerHTML = '<option value="">Elegir...</option>'; sEd.innerHTML = '<option value="">Sin cambios</option>'; lAd.innerHTML = '';
            Object.keys(servs).forEach(id => {
                const opt = `<option value="${id}">${servs[id].nombre} - Q${servs[id].precio}</option>`;
                sAdd.innerHTML += opt; sEd.innerHTML += opt;
                lAd.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${servs[id].nombre}</span><i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="eliminarServicio('${id}')"></i></div>`;
            });
        }
        window.eliminarServicio = (id) => confirmarAccion("¿Eliminar?", () => remove(ref(db, `servicios/${id}`)));
        document.getElementById('btn-add-serv').onclick = () => {
            const n = document.getElementById('serv-n').value, p = document.getElementById('serv-p').value;
            if(n && p) push(ref(db, 'servicios'), { nombre: n, precio: p }).then(() => { document.getElementById('serv-n').value=''; document.getElementById('serv-p').value=''; });
        };
    </script>
</body>
</html>
