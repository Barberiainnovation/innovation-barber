<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Innovation Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        header { text-align: center; margin-bottom: 25px; }
        .logo { width: 80px; }

        /* CORRECCIÓN VISIBILIDAD DÍAS */
        .fc-col-header-cell-cushion { 
            color: #ffffff !important; 
            text-decoration: none !important; 
            text-transform: capitalize !important;
            font-weight: 600 !important;
            font-size: 0.85rem !important;
        }
        .fc-col-header-cell.fc-day-today .fc-col-header-cell-cushion { color: var(--gold) !important; }
        .fc-daygrid-day-number { color: #ffffff !important; text-decoration: none !important; padding: 5px !important; }

        /* ELIMINAR RESALTADO AMARILLO */
        .fc-day-today { background: transparent !important; }
        .fc-timegrid-col.fc-day-today { background: transparent !important; }
        .fc-timegrid-now-indicator-line { border-color: var(--gold) !important; border-width: 2px !important; }

        /* CALENDARIO ESTÉTICO */
        #calendar-container { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.8); margin-bottom: 40px; }
        .fc { border: none !important; }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid var(--border) !important; }
        .fc-event { border: none !important; border-radius: 6px !important; padding: 5px; font-weight: 600; font-size: 0.75rem !important; }

        /* BOTONES */
        .fc-toolbar-title { color: var(--gold) !important; font-size: 1.1rem !important; }
        .fc-button { background: transparent !important; border: 1px solid var(--border) !important; color: var(--gold) !important; border-radius: 10px !important; text-transform: uppercase !important; font-size: 0.65rem !important; }
        .fc-button-active { background: var(--gold) !important; color: #000 !important; }

        /* LISTA DE CITAS */
        #seccion-lista { max-width: 500px; margin: auto; }
        .card { background: #111; border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
        .btn { width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; font-size: 0.7rem; }
        .btn-accept { background: var(--gold); color: #000; }
        .btn-finish { background: transparent; color: #555; border: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>
    <header><img src="logo.png" alt="Logo" class="logo"><h2>Admin Panel</h2></header>
    <div id="calendar-container"><div id="calendar"></div></div>
    <div id="seccion-lista"><div id="lista-citas"></div></div>
    <audio id="notif-sound" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2210/2210-preview.mp3" type="audio/mpeg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let calendar;

        document.body.addEventListener('click', () => {
            const s = document.getElementById('notif-sound');
            s.play().then(() => { s.pause(); s.currentTime = 0; });
        }, { once: true });

        document.addEventListener('DOMContentLoaded', () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: 'auto',
                navLinks: true,
                slotMinTime: '06:00:00',
                slotMaxTime: '22:00:00',
                nowIndicator: true,
                navLinkDayClick: (date) => calendar.changeView('timeGridDay', date),
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridDay' },
                buttonText: { today: 'Hoy', month: 'Mes', day: 'Día' }
            });
            calendar.render();
        });

        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            render(data);
        });

        function render(data) {
            const lista = document.getElementById('lista-citas');
            lista.innerHTML = '';
            const eventos = [];
            if (!data) return;

            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;
                eventos.push({ 
                    title: `${c.nombre} | ${c.servicio}`, 
                    start: c.fecha, 
                    backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : '#222',
                    textColor: c.estado === 'Aceptada' ? '#000' : '#fff'
                });
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-size:0.6rem; color:var(--gold); float:right">${c.estado}</div>
                    <h3>${c.nombre}</h3>
                    <p>💈 ${c.servicio}</p>
                    <p>📅 ${new Date(c.fecha).toLocaleString()}</p>
                    ${c.estado === 'Pendiente' ? 
                    `<button class="btn btn-accept" onclick="cambiarEstado('${id}', 'Aceptada')">Aceptar y WhatsApp</button>` : 
                    `<button class="btn btn-finish" onclick="cambiarEstado('${id}', 'Finalizada')">Finalizar</button>`}
                `;
                lista.appendChild(card);
            });
            calendar.removeAllEvents();
            calendar.addEventSource(eventos);
        }

        window.cambiarEstado = (id, estado) => {
            get(ref(db, `citas/${id}`)).then((snap) => {
                const c = snap.val();
                if (c && estado === 'Aceptada') {
                    const msg = `¡Hola ${c.nombre}! 👋 Confirmamos tu cita para *${c.servicio}*.`;
                    window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
                }
                update(ref(db, `citas/${id}`), { estado });
            });
        };
    </script>
</body>
</html>
