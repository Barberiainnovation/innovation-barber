<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 6px solid #d4af37; }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; text-align: center; text-decoration: none; cursor: pointer; text-transform: uppercase; }
        .btn-wa { background: #25d366; color: white; }
        .btn-status { background: #28a745; color: white; }
        .btn-finish { background: #d4af37; color: #000; }
        .logo { width: 100px; display: block; margin: 0 auto 20px; }
    </style>
</head>
<body>
    <img src="logo.png" class="logo">
    <h2 style="text-align:center;">CITAS INNOVATION</h2>
    <div id="lista-citas" class="container">Cargando...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            storageBucket: "innovation-barber-studio.firebasestorage.app",
            messagingSenderId: "589786876751",
            appId: "1:589786876751:web:31b40f11b3810470e9933a",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const lista = document.getElementById('lista-citas');

        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            lista.innerHTML = '';

            if (!data) {
                lista.innerHTML = '<p style="text-align:center;">No hay citas registradas.</p>';
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;

                const div = document.createElement('div');
                div.className = 'card';
                
                // Creamos el link de WhatsApp con el número que viene de Firebase
                const linkWA = `https://wa.me/${c.whatsapp}?text=Hola%20${encodeURIComponent(c.nombre)}%2C%20confirmamos%20tu%20cita%20en%20Innovation%20Barber%20Studio.`;

                div.innerHTML = `
                    <h3>${c.nombre}</h3>
                    <p>📱 WhatsApp: ${c.whatsapp}</p>
                    <p>💈 Servicio: ${c.servicio}</p>
                    <p>📅 Fecha: ${c.fecha}</p>
                    
                    <a href="${linkWA}" target="_blank" class="btn btn-wa">ENVIAR WHATSAPP</a>

                    ${c.estado === 'Pendiente' ? 
                        `<button class="btn btn-status" onclick="cambiarEstado('${id}', 'Aceptada')">ACEPTAR CITA</button>` : 
                        `<button class="btn btn-finish" onclick="cambiarEstado('${id}', 'Finalizada')">FINALIZAR CITA</button>`
                    }
                `;
                lista.appendChild(div);
            });
        });

        window.cambiarEstado = (id, nuevo) => {
            update(ref(db, `citas/${id}`), { estado: nuevo });
        };
    </script>
</body>
</html>
