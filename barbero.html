<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Admin | Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; --text-dim: #888; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        header { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 10px auto 30px; }
        .logo { width: 60px; }
        h2 { font-weight: 300; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; font-size: 0.8rem; margin: 0; }
        
        /* BOTÓN CONFIGURACIÓN */
        .btn-config { background: transparent; border: none; color: var(--gold); font-size: 1.5rem; cursor: pointer; transition: 0.3s; }
        .btn-config:hover { transform: rotate(45deg); }

        /* CALENDARIO PREMIUM - SIN SUBRAYADOS */
        #calendar-container { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); max-width: 900px; margin: 0 auto 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        
        .fc-col-header-cell-cushion, 
        .fc-daygrid-day-number, 
        .fc-timegrid-slot-label-cushion { 
            text-decoration: none !important; 
            border-bottom: none !important; 
            outline: none !important; 
            color: #fff !important; 
        }
        
        .fc-col-header { background-color: #000 !important; }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid #111 !important; }
        .fc-button { background: transparent !important; border: 1px solid var(--border) !important; color: var(--gold) !important; border-radius: 10px !important; text-transform: uppercase !important; font-size: 0.6rem !important; }
        .fc-button-active { background: var(--gold) !important; color: #000 !important; }
        .fc-toolbar-title { color: var(--gold) !important; font-size: 1rem !important; text-transform: uppercase; }
        .fc-day-today { background: rgba(212, 175, 55, 0.05) !important; }

        /* CITAS Y CARDS */
        .admin-box { max-width: 500px; margin: 0 auto; }
        .card { background: linear-gradient(145deg, #111, #080808); border: 1px solid var(--border); padding: 20px; border-radius: 18px; margin-bottom: 15px; border-left: 4px solid var(--gold); position: relative; }
        .price-tag { position: absolute; top: 15px; right: 15px; color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        
        /* NOTA SIEMPRE VISIBLE */
        .nota-cliente { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--gold); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.75rem; color: #eee; display: block; }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; font-size: 0.65rem; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: #000; }
        
        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 30px; border: 1px solid var(--gold); width: 90%; max-width: 450px; border-radius: 20px; }
        input { background: #000; color: #fff; border: 1px solid #222; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; font-family: 'Poppins'; }
        
        #status-audio { position: fixed; bottom: 15px; left: 15px; font-size: 0.55rem; color: var(--text-dim); z-index: 1000; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo" class="logo">
        <h2>Admin Panel</h2>
        <button class="btn-config" onclick="toggleModal()"><i class="fas fa-cog"></i></button>
    </header>
    
    <div id="calendar-container"><div id="calendar"></div></div>
    <div class="admin-box"><div id="lista-citas"></div></div>

    <div id="modalServicios" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold); margin-top:0;">Configurar Servicios</h3>
            <input type="text" id="serv-n" placeholder="Nombre del servicio">
            <input type="text" id="serv-p" placeholder="Precio (ej: 150)">
            <button class="btn btn-gold" onclick="agregarServicio()">Añadir al Catálogo</button>
            <div id="lista-servicios-admin" style="margin-top:20px; max-height:200px; overflow-y:auto;"></div>
            <button class="btn" style="background:#222; color:#fff;" onclick="toggleModal()">Cerrar</button>
        </div>
    </div>

    <div id="status-audio" onclick="activarAudio()">🔈 SONIDO OFF</div>
    <audio id="notif-sound" preload="auto" crossorigin="anonymous"><source src="https://assets.mixkit.co/active_storage/sfx/2210/2210-preview.mp3" type="audio/mpeg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let calendar;
        let inicial = true;
        const sound = document.getElementById('notif-sound');

        window.toggleModal = () => {
            const m = document.getElementById('modalServicios');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        };

        window.activarAudio = () => {
            sound.play().then(() => { sound.pause(); sound.currentTime = 0; document.getElementById('status-audio').innerText = "🔔 SONIDO ON"; });
        };

        document.addEventListener('DOMContentLoaded', () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', // INICIA EN MES
                locale: 'es', // IDIOMA FORZADO
                firstDay: 1,
                slotMinTime: '06:00:00',
                slotMaxTime: '22:00:00',
                navLinks: true, // CLIC EN NÚMERO DE DÍA PARA VER DETALLE
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridDay' },
                buttonText: { today: 'Hoy', month: 'Mes', day: 'Día' },
                navLinkDayClick: (date) => calendar.changeView('timeGridDay', date),
                selectable: true,
                select: (info) => {
                    if (calendar.view.type === 'timeGridDay') {
                        const n = prompt("Nombre Cliente (Cita Manual):");
                        if(n) push(ref(db, 'citas'), { nombre: n + " (Manual)", whatsapp: "N/A", servicio: "Manual", fecha: info.startStr.slice(0, 16), estado: 'Aceptada' });
                    }
                }
            });
            calendar.render();
        });

        onValue(ref(db, 'citas'), (snap) => { renderCitas(snap.val()); });
        onValue(ref(db, 'servicios'), (snap) => {
            const div = document.getElementById('lista-servicios-admin'); div.innerHTML = ''; const servs = snap.val();
            if(servs) Object.keys(servs).forEach(id => { div.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #111;"><span>${servs[id].nombre} (Q${servs[id].precio})</span><span style="color:red; cursor:pointer;" onclick="eliminarServicio('${id}')">✕</span></div>`; });
        });

        function renderCitas(data) {
            const lista = document.getElementById('lista-citas'); lista.innerHTML = ''; const eventos = []; if(!data) return;
            Object.keys(data).reverse().forEach(id => {
                const c = data[id]; if(c.estado === 'Finalizada') return;
                eventos.push({ title: c.nombre, start: c.fecha, backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : '#222', borderColor: 'transparent' });
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<div class="price-tag">${c.precio || ''}</div><div style="font-size:0.6rem; color:var(--gold); text-transform:uppercase;">${c.estado}</div><h3>${c.nombre}</h3><p>💈 ${c.servicio}</p><p>📅 ${new Date(c.fecha).toLocaleString('es-GT')}</p>${c.nota ? `<div class="nota-cliente"><strong>Nota:</strong> ${c.nota}</div>` : ''}<button class="btn btn-gold" onclick="cambiarEstado('${id}', '${c.estado === 'Pendiente' ? 'Aceptada' : 'Finalizada'}')">${c.estado === 'Pendiente' ? 'Aceptar' : 'Finalizar'}</button><button class="btn" style="background:transparent; color:red; border:1px solid red; margin-top:5px;" onclick="eliminarCita('${id}')">Eliminar</button>`;
                lista.appendChild(card);
            });
            calendar.removeAllEvents(); calendar.addEventSource(eventos);
        }

        window.agregarServicio = () => { const n = document.getElementById('serv-n').value, p = document.getElementById('serv-p').value; if(n && p) { push(ref(db, 'servicios'), { nombre: n, precio: p }); document.getElementById('serv-n').value = ''; document.getElementById('serv-p').value = ''; } };
        window.eliminarServicio = (id) => { if(confirm('¿Borrar servicio?')) remove(ref(db, `servicios/${id}`)); };
        window.eliminarCita = (id) => { if(confirm('¿Eliminar cita?')) remove(ref(db, `citas/${id}`)); };
        window.cambiarEstado = (id, est) => { get(ref(db, `citas/${id}`)).then(snap => { const c = snap.val(); if(c && est === 'Aceptada' && c.whatsapp !== "N/A") window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent('¡Hola '+c.nombre+'! Tu cita de '+c.servicio+' ha sido confirmada.')}`); update(ref(db, `citas/${id}`), { estado: est }); }); };
    </script>
</body>
</html>
