<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Innovation Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #111; --gold: #d4af37; --border: #333; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        header { text-align: center; margin-bottom: 20px; }
        .logo { width: 80px; }
        
        /* --- ESTILOS PARA QUITAR EL AMARILLO --- */
        /* Quita el fondo resaltado del día de hoy en vista de Mes y Día */
        .fc-day-today {
            background-color: transparent !important;
        }
        /* Quita el resaltado amarillo de la columna de tiempo en vista de Día */
        .fc-timegrid-col.fc-day-today {
            background-color: transparent !important;
        }
        /* Cambia el color del indicador de la hora actual (la línea roja/amarilla) a Dorado */
        .fc-timegrid-now-indicator-line {
            border-color: var(--gold) !important;
            border-width: 2px !important;
        }
        .fc-timegrid-now-indicator-arrow {
            border-color: var(--gold) !important;
            border-top-color: transparent !important;
            border-bottom-color: transparent !important;
        }
        /* Quita cualquier borde de selección azul/amarillo */
        .fc-highlight {
            background: rgba(212, 175, 55, 0.1) !important; /* Un dorado casi invisible */
        }

        /* Contenedor del Calendario */
        #calendar-container { 
            background: var(--card); 
            padding: 10px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            margin-bottom: 30px; 
        }

        #seccion-lista { width: 100%; max-width: 500px; margin: 20px auto; display: block; }
        .titulo-lista { color: var(--gold); text-transform: uppercase; font-size: 0.9rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
        
        .fc { color: #fff; font-size: 0.85rem; }
        .fc-toolbar-title { color: var(--gold) !important; font-size: 1rem !important; }
        .fc-button { background: var(--gold) !important; color: #000 !important; border: none !important; font-weight: bold !important; font-size: 0.7rem !important; }
        
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-accept { background: var(--gold); color: #000; }
        .btn-finish { background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>
    <header><img src="logo.png" alt="Logo" class="logo"><h2>Admin Panel</h2></header>

    <div id="calendar-container"><div id="calendar"></div></div>

    <div id="seccion-lista">
        <h3 class="titulo-lista">Citas Próximas</h3>
        <div id="lista-citas"></div>
    </div>

    <audio id="notif-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2210/2210-preview.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let calendar;
        let inicial = true;

        document.body.addEventListener('click', () => {
            const sound = document.getElementById('notif-sound');
            sound.play().then(() => { sound.pause(); sound.currentTime = 0; });
        }, { once: true });

        document.addEventListener('DOMContentLoaded', () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: 'auto',
                navLinks: true,
                navLinkDayClick: (date) => calendar.changeView('timeGridDay', date),
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridDay' },
                buttonText: { today: 'Hoy', month: 'Mes', day: 'Día' },
                nowIndicator: true, // Muestra la línea del tiempo actual, pero ahora en dorado.
            });
            calendar.render();
        });

        onValue(ref(db, 'citas'), (snapshot) => {
            const data = snapshot.val();
            if (!inicial && data) {
                document.getElementById('notif-sound').play().catch(() => {});
            }
            inicial = false;
            render(data);
        });

        function render(data) {
            const lista = document.getElementById('lista-citas');
            lista.innerHTML = '';
            const eventos = [];
            if (!data) return;

            Object.keys(data).reverse().forEach(id => {
                const c = data[id];
                if (c.estado === 'Finalizada') return;

                eventos.push({ 
                    title: `${c.nombre} - ${c.servicio}`, 
                    start: c.fecha, 
                    backgroundColor: c.estado === 'Aceptada' ? '#d4af37' : '#444',
                    textColor: c.estado === 'Aceptada' ? '#000' : '#fff'
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-size:0.7rem; color:var(--gold); float:right">${c.estado}</div>
                    <h3 style="margin:0">${c.nombre}</h3>
                    <p style="margin:5px 0">💈 ${c.servicio}</p>
                    <p style="margin:5px 0; font-size:0.8rem">📅 ${new Date(c.fecha).toLocaleString()}</p>
                    ${c.estado === 'Pendiente' ? 
                    `<button class="btn btn-accept" onclick="cambiarEstado('${id}', 'Aceptada')">Aceptar y WhatsApp</button>` : 
                    `<button class="btn btn-finish" onclick="cambiarEstado('${id}', 'Finalizada')">Finalizar</button>`}
                `;
                lista.appendChild(card);
            });
            calendar.removeAllEvents();
            calendar.addEventSource(eventos);
        }

        window.cambiarEstado = (id, estado) => {
            get(ref(db, `citas/${id}`)).then((snap) => {
                const c = snap.val();
                if (c && estado === 'Aceptada') {
                    const msg = `¡Hola ${c.nombre}! 👋 Confirmamos tu cita para *${c.servicio}* el día *${new Date(c.fecha).toLocaleString()}*.`;
                    window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
                }
                update(ref(db, `citas/${id}`), { estado });
            });
        };
    </script>
</body>
</html>
