<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Admin | Elite Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --gold: #d4af37; --gold-l: #f1d592; --card: #111; --border: rgba(212, 175, 55, 0.2); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; text-align: center; }
        .stat-card i { color: var(--gold); font-size: 1.5rem; margin-bottom: 10px; }
        .stat-val { font-size: 1.4rem; font-weight: 600; display: block; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        /* Estructura */
        .admin-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 25px; margin-bottom: 25px; }
        h3 { color: var(--gold); font-size: 1rem; margin-top: 0; letter-spacing: 1px; text-transform: uppercase; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; color: var(--gold); margin-bottom: 5px; font-weight: 600; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 12px; color: #fff; outline: none; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-l)); color: #000; }
        
        /* Citas */
        .citas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .cita-card { background: #1a1a1a; border-left: 4px solid var(--gold); padding: 15px; border-radius: 15px; }
        .cita-info { font-size: 0.85rem; margin-bottom: 10px; line-height: 1.4; }
        .service-tag { background: rgba(212,175,55,0.1); color: var(--gold); padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; letter-spacing:4px; color:var(--gold);">INNOVATION ADMIN</h2>

    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-wallet"></i>
            <span class="stat-val" id="ingresos-total">Q0.00</span>
            <span class="stat-label">Ingresos del Mes</span>
        </div>
        <div class="stat-card">
            <i class="fas fa-calendar-check"></i>
            <span class="stat-val" id="citas-count">0</span>
            <span class="stat-label">Citas Hoy</span>
        </div>
    </div>

    <div class="admin-card">
        <h3><i class="fas fa-clock"></i> Horario Laboral</h3>
        <div style="display: flex; gap: 10px; margin-bottom:10px;">
            <div style="flex:1">
                <label>Apertura</label>
                <select id="apertura-admin"></select>
            </div>
            <div style="flex:1">
                <label>Cierre</label>
                <select id="cierre-admin"></select>
            </div>
        </div>
        <button class="btn btn-gold" onclick="guardarHorario()">Actualizar Horario</button>
    </div>

    <div class="admin-card">
        <h3><i class="fas fa-list"></i> Gestión de Citas</h3>
        <div id="grid-citas" class="citas-grid"></div>
    </div>

    <div class="admin-card">
        <h3><i class="fas fa-cut"></i> Catálogo de Servicios</h3>
        <div class="form-group">
            <input type="text" id="serv-nombre" placeholder="Nombre (Ej: Fade + Barba)">
            <input type="number" id="serv-precio" placeholder="Precio (Ej: 125)" style="margin-top:10px;">
            <textarea id="serv-detalle" placeholder="¿Qué incluye?" style="margin-top:10px;"></textarea>
            <button class="btn btn-gold" onclick="agregarServicio()">Añadir Servicio</button>
        </div>
        <div id="lista-servicios"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", 
        authDomain: "innovation-barber-studio.firebaseapp.com", 
        projectId: "innovation-barber-studio", 
        databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- 1. LLENAR HORAS ---
    const fillHours = () => {
        const ap = document.getElementById('apertura-admin');
        const ci = document.getElementById('cierre-admin');
        for(let h=0; h<=23; h++){
            let lbl = h === 0 ? "12 AM" : h === 12 ? "12 PM" : h > 12 ? `${h-12} PM` : `${h} AM`;
            let opt = `<option value="${h}">${lbl}</option>`;
            ap.innerHTML += opt; ci.innerHTML += opt;
        }
    }
    fillHours();

    // --- 2. FINANZAS (CALCULAR INGRESOS) ---
    onValue(ref(db, 'finanzas'), (snap) => {
        let total = 0;
        snap.forEach(f => { total += parseFloat(f.val().monto || 0); });
        document.getElementById('ingresos-total').innerText = `Q${total.toFixed(2)}`;
    });

    // --- 3. GESTIÓN DE CITAS (CON COBRO) ---
    onValue(ref(db, 'citas'), (snap) => {
        const grid = document.getElementById('grid-citas');
        grid.innerHTML = "";
        let count = 0;
        snap.forEach(child => {
            const c = child.val();
            count++;
            grid.innerHTML += `
                <div class="cita-card">
                    <div style="font-weight:600; font-size:1rem; margin-bottom:5px;">${c.nombre}</div>
                    <div class="cita-info">
                        <span class="service-tag">${c.servicio}</span><br>
                        <small><i class="fas fa-clock"></i> ${c.fecha}</small><br>
                        <small><i class="fab fa-whatsapp"></i> ${c.whatsapp}</small>
                    </div>
                    <button class="btn btn-gold" onclick="finalizarCobrar('${child.key}', ${c.precio})">
                        Finalizar (Q${c.precio})
                    </button>
                </div>`;
        });
        document.getElementById('citas-count').innerText = count;
    });

    window.finalizarCobrar = (id, monto) => {
        if(confirm(`¿Finalizar y registrar cobro de Q${monto}?`)){
            // Guardar en finanzas
            push(ref(db, 'finanzas'), { monto: monto, fecha: new Date().toISOString() });
            // Borrar de citas
            remove(ref(db, `citas/${id}`));
        }
    };

    // --- 4. CONFIGURACIONES (HORARIO Y SERVICIOS) ---
    onValue(ref(db, 'configuracion_horario'), s => {
        if(s.val()){
            document.getElementById('apertura-admin').value = s.val().apertura;
            document.getElementById('cierre-admin').value = s.val().cierre;
        }
    });

    window.guardarHorario = () => {
        set(ref(db, 'configuracion_horario'), {
            apertura: document.getElementById('apertura-admin').value,
            cierre: document.getElementById('cierre-admin').value
        }).then(() => alert("Horario actualizado"));
    };

    window.agregarServicio = () => {
        const n = document.getElementById('serv-nombre').value;
        const p = document.getElementById('serv-precio').value;
        const d = document.getElementById('serv-detalle').value;
        if(n && p) push(ref(db, 'servicios'), { nombre: n, precio: p, descripcion: d }).then(() => {
            document.getElementById('serv-nombre').value = "";
            document.getElementById('serv-precio').value = "";
            document.getElementById('serv-detalle').value = "";
        });
    };

    onValue(ref(db, 'servicios'), snap => {
        const list = document.getElementById('lista-servicios');
        list.innerHTML = "";
        snap.forEach(s => {
            const d = s.val();
            list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:0.8rem;"><b>${d.nombre}</b> (Q${d.precio})</span>
                <button onclick="eliminarServicio('${s.key}')" style="background:none; border:none; color:red; cursor:pointer;"><i class="fas fa-trash"></i></button>
            </div>`;
        });
    });

    window.eliminarServicio = id => { if(confirm("¿Eliminar?")) remove(ref(db, `servicios/${id}`)); };
</script>
</body>
</html>
