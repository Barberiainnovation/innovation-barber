<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Admin | Elite Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/es.global.min.js"></script>
    
    <style>
        :root { --bg: #000; --card: #0a0a0a; --gold: #d4af37; --gold-dark: #aa8c2c; --border: #1a1a1a; --green: #2ecc71; --red: #ff4d4d; --glass: rgba(10, 10, 10, 0.98); }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; overflow-x: hidden; }
        #admin-content { display: none; max-width: 1400px; margin: 0 auto; }
        .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 25px; margin-top: 10px; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

        #calendar-container { background: var(--card); padding: 20px; border-radius: 35px; border: 1px solid var(--border); }
        .sidebar-stats { background: var(--card); border: 1px solid var(--border); border-radius: 35px; padding: 30px; border-top: 5px solid var(--gold); position: sticky; top: 15px; height: fit-content; }
        
        .card { background: #060606; border: 1px solid var(--border); padding: 15px 20px; border-radius: 20px; border-left: 4px solid var(--gold); margin-bottom: 12px; }

        .modal { display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: var(--glass); padding: 30px; border: 1px solid var(--gold); width: 90%; max-width: 420px; border-radius: 40px; text-align: center; max-height: 90vh; overflow-y: auto; }
        
        input, select, textarea { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid #1a1a1a; padding: 12px; border-radius: 15px; width: 100%; margin-bottom: 10px; outline: none; font-size: 0.85rem; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border-radius: 18px; font-weight: 700; cursor: pointer; border: none; font-size: 0.75rem; text-transform: uppercase; transition: 0.3s; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; }
        .btn-red { background: rgba(255, 77, 77, 0.1); border: 1px solid var(--red); color: var(--red); }
        .btn-outline { background: transparent; border: 1px solid #333; color: #777; margin-top: 10px; }
        .btn-mini { padding: 8px 15px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; border: none; cursor: pointer; }

        .btn-config-float { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; z-index: 5000; border: none; cursor: pointer; }
        
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 700; z-index: 11000; transition: 0.6s; font-size: 0.85rem; }
        #toast.show { bottom: 30px; }
        .block-item-admin { display: flex; justify-content: space-between; background: rgba(255,77,77,0.1); padding: 10px; border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="toast">ACCIÓN EXITOSA</div>

    <div id="login-overlay">
        <div class="login-box" style="text-align:center; background:var(--card); padding:50px; border-radius:30px; border:1px solid var(--border); margin: 100px auto; max-width: 300px;">
            <img src="logo.png" style="width: 80px; margin-bottom: 20px;">
            <h2 style="color:var(--gold); font-size:1rem; letter-spacing:2px;">ADMIN PANEL</h2>
            <button class="btn btn-gold" onclick="loginGoogle()">ENTRAR CON GOOGLE</button>
        </div>
    </div>

    <div id="admin-content">
        <button class="btn-config-float" onclick="toggleConfig()"><i class="fas fa-sliders-h"></i></button>

        <div class="main-grid">
            <div id="calendar-container"><div id="calendar"></div></div>
            <aside class="sidebar-stats">
                <center><img src="logo.png" style="width:80px; margin-bottom:30px;"></center>
                <div style="margin-bottom:25px;">
                    <span style="font-size:0.65rem; color:#666;">FINALIZADOS MES</span><br>
                    <span id="citas-count" style="font-size:2.2rem; color:var(--gold); font-weight:600;">0</span>
                </div>
                <div style="background:rgba(212,175,55,0.05); padding:20px; border-radius:25px; margin-bottom:15px; border:1px solid rgba(212,175,55,0.1);">
                    <span style="font-size:0.65rem; color:#666;">PENDIENTES HOY</span><br>
                    <span id="count-pendientes" style="font-size:1.8rem; color:var(--gold);">0</span>
                </div>
                <div style="background:rgba(46,204,113,0.05); padding:20px; border-radius:25px;">
                    <span style="font-size:0.65rem; color:var(--green);">INGRESOS MES</span><br>
                    <span id="ingreso-total" style="font-size:1.8rem; color:var(--green); font-weight:600;">Q0.00</span>
                </div>
            </aside>
        </div>
        <div id="lista-citas" style="margin-top:30px; display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:15px; padding-bottom:100px;"></div>
    </div>

    <div id="modalAddCita" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="color:var(--gold);">AGENDAR CITA</h3>
            <p id="add-fecha-display" style="font-size:0.8rem; color:#666;"></p>
            <input type="text" id="add-nombre" placeholder="Nombre del Cliente">
            <input type="tel" id="add-whatsapp-input">
            <select id="add-servicio-select"></select>
            <textarea id="add-nota" placeholder="Notas o requerimientos..." rows="3"></textarea>
            <button class="btn btn-gold" id="btn-save-cita-calendar">CONFIRMAR</button>
            <button class="btn btn-outline" onclick="cerrarModalAdd()">CANCELAR</button>
        </div>
    </div>

    <div id="modalConfig" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold);">CONFIGURACIÓN</h3>
            <p style="font-size: 0.7rem; color: #555; text-align: left;">HORARIO LABORAL</p>
            <div style="display:flex; gap:10px;">
                <select id="config-apertura"></select>
                <select id="config-cierre"></select>
            </div>
            <p style="font-size: 0.7rem; color: #555; text-align: left;">HORARIO DE LUNCH</p>
            <div style="display:flex; gap:10px;">
                <select id="config-lunch-inicio"><option value="">Sin lunch</option></select>
                <select id="config-lunch-fin"><option value="">Sin lunch</option></select>
            </div>
            <button class="btn btn-gold" id="btn-save-hours">GUARDAR HORARIOS</button>
            <hr style="border:0; border-top:1px solid #1a1a1a; margin:20px 0;">
            <p style="font-size: 0.7rem; color: #555; text-align: left;">BLOQUEAR DÍA ENTERO</p>
            <div style="display:flex; gap:10px;">
                <input type="text" id="input-block-date" placeholder="Elegir fecha" readonly>
                <button class="btn btn-gold" id="btn-add-block" style="width:auto; background:var(--red); color:#fff;">OK</button>
            </div>
            <div id="lista-bloqueos-admin" style="margin-top:10px; text-align: left;"></div>
            <hr style="border:0; border-top:1px solid #1a1a1a; margin:20px 0;">
            <p style="font-size: 0.7rem; color: #555; text-align: left;">SERVICIOS</p>
            <input type="text" id="serv-n" placeholder="Nombre">
            <input type="number" id="serv-p" placeholder="Precio">
            <button class="btn btn-gold" id="btn-add-serv">AÑADIR SERVICIO</button>
            <div id="lista-servicios-admin" style="margin-top:15px; text-align: left;"></div>
            <button class="btn btn-outline" onclick="toggleConfig()">CERRAR</button>
        </div>
    </div>

    <div id="modalEvento" class="modal">
        <div class="modal-content">
            <h3 id="pop-nombre" style="color:var(--gold);">Detalle</h3>
            <p id="pop-fecha" style="font-size:0.8rem; color:#666;"></p>
            <div id="pop-detalle-corte" style="margin:20px 0; text-align:left; background:rgba(255,255,255,0.02); padding:15px; border-radius:15px;"></div>
            <button class="btn btn-gold" id="pop-whatsapp" style="background:#25d366; color:#fff; margin-bottom:10px;"><i class="fab fa-whatsapp"></i> WHATSAPP</button>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn btn-gold" id="btn-editar-desde-pop">EDITAR</button>
                <button class="btn btn-red" id="btn-eliminar-pop">ELIMINAR</button>
            </div>
            <button class="btn btn-outline" onclick="cerrarPop()">CERRAR</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let calendar, selectedDateTime, iti, currentEditingId = null, catalogoGlobal = {}, fechaVisualizada = new Date().toISOString().split('T')[0];

        // Init Components
        iti = window.intlTelInput(document.querySelector("#add-whatsapp-input"), { initialCountry: "gt", separateDialCode: true, utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js" });
        flatpickr("#input-block-date", { locale: "es", minDate: "today", dateFormat: "Y-m-d" });

        const apS = document.getElementById('config-apertura'), ciS = document.getElementById('config-cierre'), lIn = document.getElementById('config-lunch-inicio'), lFi = document.getElementById('config-lunch-fin');
        for(let h=0; h<=23; h++){ 
            const opt = `<option value="${h}">${h.toString().padStart(2, '0')}:00</option>`;
            apS.innerHTML += opt; ciS.innerHTML += opt; lIn.innerHTML += opt; lFi.innerHTML += opt;
        }

        window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };
        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.toggleConfig = () => { const m = document.getElementById('modalConfig'); m.style.display = (m.style.display==='flex')?'none':'flex'; };
        
        onAuthStateChanged(auth, (u) => { if(u){ document.getElementById('login-overlay').style.display='none'; document.getElementById('admin-content').style.display='block'; initDashboard(); } });

        function initDashboard() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridDay', locale: 'es', slotDuration: '00:30:00', nowIndicator: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                datesSet: (i) => { fechaVisualizada = i.view.currentStart.toISOString().split('T')[0]; },
                selectable: true,
                select: (i) => {
                    if(i.view.type !== 'dayGridMonth'){
                        currentEditingId = null;
                        selectedDateTime = i.startStr.split('T')[0] + 'T' + i.start.getHours().toString().padStart(2,'0') + ':' + i.start.getMinutes().toString().padStart(2,'0');
                        document.getElementById('modal-title').innerText = "NUEVA CITA";
                        document.getElementById('add-fecha-display').innerText = i.start.toLocaleString();
                        document.getElementById('add-nombre').value = ''; document.getElementById('add-nota').value = '';
                        document.getElementById('modalAddCita').style.display = 'flex';
                    }
                },
                eventClick: (i) => {
                    currentEditingId = i.event.id; const m = i.event.extendedProps;
                    document.getElementById('pop-nombre').innerText = m.nombre;
                    document.getElementById('pop-fecha').innerText = i.event.start.toLocaleString();
                    document.getElementById('pop-detalle-corte').innerHTML = `<b>${m.servicio}</b><br><span style="color:var(--green);">Q${m.precio}</span><br><p style="font-size:0.8rem; color:#aaa; margin-top:10px;">📝 ${m.nota || 'Sin notas'}</p>`;
                    document.getElementById('pop-whatsapp').onclick = () => window.open(`https://wa.me/${m.whatsapp.replace(/\D/g,'')}`);
                    document.getElementById('modalEvento').style.display = 'flex';
                    document.getElementById('btn-eliminar-pop').onclick = () => { if(confirm("¿Eliminar?")) remove(ref(db, `citas/${currentEditingId}`)).then(cerrarPop); };
                    document.getElementById('btn-editar-desde-pop').onclick = () => { cerrarPop(); window.editarCita(currentEditingId); };
                }
            });
            calendar.render();

            onValue(ref(db, 'configuracion_horario'), (s) => {
                const c = s.val();
                if(c){
                    calendar.setOption('slotMinTime', c.apertura.padStart(2,'0')+':00:00');
                    calendar.setOption('slotMaxTime', c.cierre.padStart(2,'0')+':00:00');
                    apS.value = c.apertura; ciS.value = c.cierre;
                    lIn.value = c.lunch_inicio || ""; lFi.value = c.lunch_fin || "";
                }
            });

            onValue(ref(db, 'citas'), (s) => renderAdmin(s.val()));
            onValue(ref(db, 'servicios'), (s) => renderServicios(s.val() || {}));
            onValue(ref(db, 'dias_bloqueados'), (s) => {
                const list = document.getElementById('lista-bloqueos-admin'), bl = s.val() || {};
                list.innerHTML = '';
                Object.keys(bl).forEach(f => {
                    list.innerHTML += `<div class="block-item-admin"><span>${f}</span><i class="fas fa-trash" style="cursor:pointer; color:var(--red);" onclick="window.eliminarBloqueo('${f}')"></i></div>`;
                });
            });
        }

        function renderAdmin(data) {
            const list = document.getElementById('lista-citas'); list.innerHTML = '';
            let finMes = 0, ingMes = 0, pendHoy = 0, events = [];
            const hoy = new Date();

            if(data){
                Object.keys(data).forEach(id => {
                    const c = data[id], f = new Date(c.fecha);
                    const esFin = c.estado === 'Finalizada';
                    if(esFin && f.getMonth() === hoy.getMonth() && f.getFullYear() === hoy.getFullYear()){ finMes++; ingMes += parseFloat(c.precio || 0); }
                    if(!esFin && c.fecha.startsWith(fechaVisualizada)){ 
                        pendHoy++;
                        list.innerHTML += `<div class="card"><div style="display:flex; justify-content:space-between;"><div><small style="color:var(--gold); font-weight:bold;">${c.fecha.split('T')[1]}</small><h4>${c.nombre}</h4><p style="font-size:0.75rem; color:#888; margin-top:5px;">📝 ${c.nota || 'Sin nota'}</p></div><div style="display:flex; gap:8px;"><button class="btn-mini" style="background:#444;" onclick="window.editarCita('${id}')"><i class="fas fa-edit"></i></button><button class="btn-mini" style="background:var(--green); color:#000;" onclick="window.cambiarEstado('${id}','Finalizada')">FIN</button></div></div></div>`;
                    }
                    events.push({ id, title: c.nombre, start: c.fecha, backgroundColor: esFin?'#111':'#d4af37', extendedProps: {...c} });
                });
            }
            document.getElementById('citas-count').innerText = finMes;
            document.getElementById('ingreso-total').innerText = 'Q' + ingMes.toFixed(2);
            document.getElementById('count-pendientes').innerText = pendHoy;
            calendar.removeAllEvents(); calendar.addEventSource(events);
        }

        function renderServicios(s){
            catalogoGlobal = s; const sel = document.getElementById('add-servicio-select'), adm = document.getElementById('lista-servicios-admin');
            sel.innerHTML = '<option value="">Elegir servicio...</option>'; adm.innerHTML = '';
            Object.keys(s).forEach(id => {
                sel.innerHTML += `<option value="${id}">${s[id].nombre}</option>`;
                adm.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #111;"><span>${s[id].nombre} (Q${s[id].precio})</span><i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="window.eliminarServicio('${id}')"></i></div>`;
            });
        }

        window.editarCita = (id) => {
            onValue(ref(db, `citas/${id}`), (snap) => {
                const c = snap.val();
                if(c) {
                    currentEditingId = id; selectedDateTime = c.fecha;
                    document.getElementById('modal-title').innerText = "EDITAR CITA";
                    document.getElementById('add-nombre').value = c.nombre;
                    document.getElementById('add-nota').value = c.nota || '';
                    iti.setNumber(c.whatsapp);
                    document.getElementById('modalAddCita').style.display = 'flex';
                }
            }, { onlyOnce: true });
        };

        window.cambiarEstado = (id, e) => update(ref(db, `citas/${id}`), {estado:e}).then(() => showToast("CITA ACTUALIZADA"));
        window.eliminarServicio = (id) => remove(ref(db, `servicios/${id}`));
        window.eliminarBloqueo = (f) => remove(ref(db, `dias_bloqueados/${f}`));
        window.cerrarPop = () => document.getElementById('modalEvento').style.display = 'none';
        window.cerrarModalAdd = () => { document.getElementById('modalAddCita').style.display = 'none'; currentEditingId = null; };

        document.getElementById('btn-save-hours').onclick = () => {
            set(ref(db, 'configuracion_horario'), { apertura: apS.value, cierre: ciS.value, lunch_inicio: lIn.value, lunch_fin: lFi.value }).then(() => showToast("CONFIGURACIÓN GUARDADA"));
        };

        document.getElementById('btn-add-serv').onclick = () => {
            const n = document.getElementById('serv-n').value, p = document.getElementById('serv-p').value;
            if(n && p) push(ref(db, 'servicios'), {nombre:n, precio:p}).then(() => { document.getElementById('serv-n').value=''; document.getElementById('serv-p').value=''; showToast("AÑADIDO"); });
        };

        document.getElementById('btn-add-block').onclick = () => {
            const f = document.getElementById('input-block-date').value;
            if(f) set(ref(db, `dias_bloqueados/${f}`), true).then(() => { document.getElementById('input-block-date').value = ''; showToast("BLOQUEADO"); });
        };

        document.getElementById('btn-save-cita-calendar').onclick = () => {
            const nom = document.getElementById('add-nombre').value, sk = document.getElementById('add-servicio-select').value;
            if(nom && sk) {
                const s = catalogoGlobal[sk];
                const data = { nombre: nom, whatsapp: iti.getNumber(), servicio: s.nombre, precio: s.precio, fecha: selectedDateTime, estado: "Pendiente", nota: document.getElementById('add-nota').value };
                if(currentEditingId) update(ref(db, `citas/${currentEditingId}`), data).then(cerrarModalAdd);
                else push(ref(db, 'citas'), data).then(cerrarModalAdd);
            }
        };
    </script>
</body>
</html>
