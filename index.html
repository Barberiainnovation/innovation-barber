<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Innovation Barber Studio | Reservas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; --green: #2ecc71; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; text-align: center; }
        
        .logo-main { width: 100px; margin-bottom: 20px; }
        h1 { color: var(--gold); font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 30px; }

        .container { max-width: 500px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--border); }
        
        input, select { background: #000; color: #fff; border: 1px solid #222; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 15px; outline: none; box-sizing: border-box; font-family: 'Poppins'; }
        
        label { display: block; text-align: left; font-size: 0.7rem; color: var(--gold); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }

        .grid-horas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .btn-hora { background: transparent; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .btn-hora:hover { border-color: var(--gold); color: var(--gold); }
        .btn-hora.selected { background: var(--gold); color: #000; border-color: var(--gold); }
        
        .btn-reserva { width: 100%; background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: bold; margin-top: 25px; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; }
        
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: 600; z-index: 10000; transition: 0.5s; }
        #toast.show { top: 30px; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <img src="logo.png" alt="Logo" class="logo-main">
    <h1>RESERVA TU CITA</h1>

    <div class="container">
        <label>1. Datos Personales</label>
        <input type="text" id="cliente-nombre" placeholder="Tu nombre completo">
        <input type="tel" id="cliente-whatsapp" placeholder="WhatsApp (ej. 50212345678)">

        <label>2. Elige el Servicio</label>
        <select id="servicio-select">
            <option value="">Cargando servicios...</option>
        </select>

        <label>3. Fecha de la Cita</label>
        <input type="date" id="fecha-cita" min="">

        <label>4. Horarios Disponibles</label>
        <div id="contenedor-horas" class="grid-horas">
            <p style="grid-column: span 3; font-size: 0.7rem; color: #666;">Selecciona una fecha primero</p>
        </div>

        <button class="btn-reserva" onclick="enviarReserva()">CONFIRMAR CITA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let horaSeleccionada = null;
        let catalogoServicios = {};
        let citasOcupadas = {};
        let configHorario = { apertura: 8, cierre: 20 };

        const inputFecha = document.getElementById('fecha-cita');
        // Bloquear fechas pasadas
        inputFecha.min = new Date().toISOString().split('T')[0];

        function showToast(msj) {
            const t = document.getElementById('toast');
            t.innerText = msj; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // 1. CARGAR CONFIGURACIÓN Y SERVICIOS
        onValue(ref(db, 'configuracion_horario'), snap => { if(snap.val()) configHorario = snap.val(); });
        
        onValue(ref(db, 'servicios'), snap => {
            const data = snap.val() || {};
            catalogoServicios = data;
            const select = document.getElementById('servicio-select');
            select.innerHTML = '<option value="">Selecciona un servicio</option>';
            Object.keys(data).forEach(id => {
                select.innerHTML += `<option value="${id}">${data[id].nombre} - Q${data[id].precio}</option>`;
            });
        });

        // 2. ESCUCHAR CITAS EN TIEMPO REAL (BLOQUEO AUTOMÁTICO)
        onValue(ref(db, 'citas'), snap => {
            citasOcupadas = snap.val() || {};
            if(inputFecha.value) generarHorarios(); // Refrescar si ya hay fecha puesta
        });

        // 3. GENERAR HORARIOS DISPONIBLES
        inputFecha.onchange = () => generarHorarios();

        function generarHorarios() {
            const contenedor = document.getElementById('contenedor-horas');
            const fecha = inputFecha.value;
            contenedor.innerHTML = '';
            horaSeleccionada = null;

            if(!fecha) return;

            // Extraer horas ya reservadas para este día (Sincronizado con Admin)
            const horasTomadas = Object.values(citasOcupadas)
                .filter(c => c.fecha.split('T')[0] === fecha && c.estado !== 'Cancelada')
                .map(c => c.fecha.split('T')[1].substring(0, 5));

            for(let h = parseInt(configHorario.apertura); h < parseInt(configHorario.cierre); h++) {
                ["00", "30"].forEach(min => {
                    const horaString = `${h.toString().padStart(2, '0')}:${min}`;
                    
                    // Solo mostrar si no está en la lista de horas tomadas
                    if(!horasTomadas.includes(horaString)) {
                        const btn = document.createElement('button');
                        btn.className = 'btn-hora';
                        btn.innerText = horaString;
                        btn.onclick = () => {
                            document.querySelectorAll('.btn-hora').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                            horaSeleccionada = horaString;
                        };
                        contenedor.appendChild(btn);
                    }
                });
            }
            
            if(contenedor.innerHTML === '') {
                contenedor.innerHTML = '<p style="grid-column: span 3; font-size: 0.7rem; color: var(--red);">No hay horarios libres para este día.</p>';
            }
        }

        // 4. ENVIAR RESERVA
        window.enviarReserva = () => {
            const nombre = document.getElementById('cliente-nombre').value;
            const whatsapp = document.getElementById('cliente-whatsapp').value;
            const servKey = document.getElementById('servicio-select').value;
            const fecha = inputFecha.value;

            if(!nombre || !whatsapp || !servKey || !fecha || !horaSeleccionada) {
                showToast("⚠️ Completa todos los campos");
                return;
            }

            const serv = catalogoServicios[servKey];
            const fullFechaISO = `${fecha}T${horaSeleccionada}`; // Formato exacto que usa el Admin

            const nuevaCita = {
                nombre: nombre,
                whatsapp: whatsapp,
                servicio: serv.nombre,
                precio: serv.precio,
                fecha: fullFechaISO,
                estado: "Pendiente",
                nota: "Reserva Web Cliente"
            };

            push(ref(db, 'citas'), nuevaCita).then(() => {
                showToast("✅ CITA RESERVADA");
                const msg = encodeURIComponent(`Hola! Acabo de reservar una cita en INNOVATION Barber Studio para el día ${fecha} a las ${horaSeleccionada}.`);
                window.open(`https://wa.me/${whatsapp.replace(/\D/g,'')}?text=${msg}`);
                location.reload(); // Recargar para limpiar
            });
        };
    </script>
</body>
</html>
