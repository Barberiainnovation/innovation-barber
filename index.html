<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Barber Studio | Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --accent: #d4af37; --bg-dark: #000000; --card-bg: #111111; --input-bg: #222222; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .booking-card { background: var(--card-bg); width: 100%; max-width: 420px; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .main-logo { width: 100%; max-width: 220px; margin-bottom: 25px; }
        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #333; border-radius: 10px; color: white; font-size: 1rem; box-sizing: border-box; }
        .btn-reserve { width: 100%; padding: 16px; background: white; color: black; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="booking-card">
        <img src="logo.png" alt="Innovation" class="main-logo">
        <form id="form-cliente">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre" required>
            </div>
            <div class="form-group">
                <label>WhatsApp (Ej: 50212345678)</label>
                <input type="tel" id="whatsapp" required>
            </div>
            <div class="form-group">
                <label>Servicio</label>
                <select id="servicio">
                    <option value="Corte Innovation">Corte Innovation</option>
                    <option value="Barba Studio">Perfilado de Barba</option>
                    <option value="Combo Completo">Corte + Barba</option>
                </select>
            </div>
            <div class="form-group">
                <label>Fecha y Hora</label>
                <input type="datetime-local" id="fecha" required>
            </div>
            <button type="submit" class="btn-reserve">Solicitar Turno</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            storageBucket: "innovation-barber-studio.firebasestorage.app",
            messagingSenderId: "589786876751",
            appId: "1:589786876751:web:31b40f11b3810470e9933a",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('form-cliente').addEventListener('submit', (e) => {
            e.preventDefault();
            const nuevaRef = push(ref(db, 'citas'));
            set(nuevaRef, {
                nombre: document.getElementById('nombre').value,
                whatsapp: document.getElementById('whatsapp').value,
                servicio: document.getElementById('servicio').value,
                fecha: document.getElementById('fecha').value,
                estado: 'Pendiente'
            }).then(() => {
                alert("✅ ¡Cita enviada!");
                document.getElementById('form-cliente').reset();
            });
        });
    </script>
</body>
</html>
