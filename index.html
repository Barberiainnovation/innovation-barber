<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva | Innovation Barber Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .logo { width: 110px; height: auto; margin-bottom: 15px; }
        h1 { color: var(--gold); margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; font-size: 1.3rem; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-size: 0.85rem; text-align: left; font-weight: 600; }
        
        .phone-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .area-code { width: 40%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Poppins'; }
        .phone-input { width: 60%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Poppins'; }

        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; font-family: 'Poppins'; }
        input:focus, select:focus { border-color: var(--gold); outline: none; }
        
        .btn-reserva { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-reserva:hover { background: #b8962d; transform: scale(1.02); }

        /* Estilo para que el calendario se vea bien en modo oscuro */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Innovation Logo" class="logo">
        <h1>Reserva tu Cita</h1>
        
        <label>Nombre Completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre">

        <label>WhatsApp</label>
        <div class="phone-group">
            <select id="area-code" class="area-code">
                <option value="502">🇬🇹 +502</option>
                <option value="1">🇺🇸 +1</option>
                <option value="52">🇲🇽 +52</option>
                <option value="503">🇸🇻 +503</option>
            </select>
            <input type="number" id="whatsapp" class="phone-input" placeholder="Número">
        </div>

        <label>Servicio</label>
        <select id="servicio">
            <option>Corte de Cabello</option>
            <option>Barba Premium</option>
            <option>Combo: Corte + Barba</option>
            <option>Limpieza Facial</option>
        </select>

        <label>Fecha y Hora (7am - 9pm)</label>
        <input type="datetime-local" id="fecha">

        <button class="btn-reserva" onclick="validarYEnviar()">Confirmar Reserva</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- SOLUCIÓN AL SELECTOR BLOQUEADO ---
        // Establecemos el mínimo como "Hoy a las 00:00" para evitar conflictos de segundos
        const ahora = new Date();
        const anio = ahora.getFullYear();
        const mes = String(ahora.getMonth() + 1).padStart(2, '0');
        const dia = String(ahora.getDate()).padStart(2, '0');
        document.getElementById('fecha').min = `${anio}-${mes}-${dia}T00:00`;

        window.validarYEnviar = () => {
            const nombre = document.getElementById('nombre').value;
            const codigoArea = document.getElementById('area-code').value;
            const telefono = document.getElementById('whatsapp').value;
            const servicio = document.getElementById('servicio').value;
            const fechaInput = document.getElementById('fecha').value;

            if (!nombre || !telefono || !fechaInput) {
                alert("⚠️ Por favor completa todos los campos.");
                return;
            }

            const whatsappCompleto = codigoArea + telefono;
            const fechaCliente = new Date(fechaInput);
            const tiempoClienteMS = fechaCliente.getTime();
            const hora = fechaCliente.getHours();

            // Validación Horario Barbería
            if (hora < 7 || hora >= 21) {
                alert("💈 Atendemos de 7:00 AM a 9:00 PM.");
                return;
            }

            // Validación de Disponibilidad
            const citasRef = ref(db, 'citas');
            onValue(citasRef, (snapshot) => {
                const data = snapshot.val();
                const margen45Min = 45 * 60 * 1000;
                let ocupado = false;
                let aceptadas = [];

                if (data) {
                    Object.values(data).forEach(c => {
                        if (c.estado === 'Aceptada') {
                            aceptadas.push(new Date(c.fecha).getTime());
                        }
                    });
                }

                aceptadas.forEach(f => {
                    if (Math.abs(tiempoClienteMS - f) < margen45Min) {
                        ocupado = true;
                    }
                });

                if (ocupado) {
                    alert("❌ Este horario ya está reservado o muy cerca de otra cita. Por favor elige otra hora.");
                } else {
                    push(ref(db, 'citas'), {
                        nombre, 
                        whatsapp: whatsappCompleto, 
                        servicio, 
                        fecha: fechaInput, 
                        estado: 'Pendiente'
                    }).then(() => {
                        alert("✅ ¡Cita enviada con éxito!");
                        location.reload();
                    }).catch(err => alert("Error al guardar: " + err));
                }
            }, { onlyOnce: true });
        };
    </script>
</body>
</html>
