<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Barber Studio | Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --gold: #d4af37; --border: #1a1a1a; --text: #fff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .container { max-width: 500px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .logo { width: 80px; margin-bottom: 10px; }
        
        h1 { font-size: 1.2rem; letter-spacing: 3px; color: var(--gold); margin: 0; }
        p.subtitle { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-top: 5px; }

        label { display: block; font-size: 0.7rem; color: var(--gold); margin: 15px 0 5px 5px; text-transform: uppercase; font-weight: 600; }
        input, select, textarea { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: #fff; font-family: inherit; box-sizing: border-box; }
        textarea { height: 80px; resize: none; }

        #calendar-container { background: var(--card); padding: 10px; border-radius: 20px; border: 1px solid var(--border); margin-top: 10px; }
        .fc { --fc-border-color: #1a1a1a; --fc-page-bg-color: #000; font-size: 0.8rem; }
        .fc-toolbar-title { font-size: 1rem !important; color: var(--gold); }
        .fc-button { background: transparent !important; border: 1px solid var(--border) !important; color: var(--gold) !important; text-transform: uppercase !important; font-size: 0.6rem !important; }
        .fc-daygrid-day-number { text-decoration: none !important; color: #fff !important; }

        .btn-reserva { background: var(--gold); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 0.9rem; cursor: pointer; margin-top: 30px; transition: 0.3s; text-transform: uppercase; }
        .btn-reserva:active { transform: scale(0.98); }

        /* Modal amigable */
        .modal { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background:var(--card); margin:20% auto; padding:30px; border: 1px solid var(--gold); width:85%; max-width:350px; border-radius:25px; text-align: center; }
        .modal-content i { font-size: 3rem; color: var(--gold); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.png" class="logo" alt="Innovation Logo">
            <h1>INNOVATION</h1>
            <p class="subtitle">Barber Studio</p>
        </header>

        <label>Tu Nombre</label>
        <input type="text" id="nombre" placeholder="Escribe tu nombre completo">

        <label>WhatsApp</label>
        <input type="tel" id="whatsapp" placeholder="Ej: 50212345678">

        <label>Servicio</label>
        <select id="servicio"></select>

        <label>Notas adicionales (Opcional)</label>
        <textarea id="nota" placeholder="¿Algún detalle especial para tu corte?"></textarea>

        <label>Selecciona Fecha y Hora</label>
        <div id="calendar-container">
            <div id="calendar"></div>
        </div>

        <button class="btn-reserva" onclick="enviarCita()">Reservar Espacio</button>
    </div>

    <div id="modalExito" class="modal">
        <div class="modal-content">
            <i class="fas fa-check-circle"></i>
            <h2 style="color:var(--gold); margin:0;">¡Recibido!</h2>
            <p style="font-size:0.85rem; color:#ccc;">Tu solicitud ha sido enviada. Te confirmaremos por WhatsApp en breve.</p>
            <button class="btn-reserva" onclick="cerrarModal()">Entendido</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let fechaSeleccionada = null;
        let calendar;

        // Cargar Servicios
        onValue(ref(db, 'servicios'), (snap) => {
            const select = document.getElementById('servicio');
            select.innerHTML = '<option value="" disabled selected>Selecciona un servicio</option>';
            const data = snap.val();
            if(data) {
                Object.values(data).forEach(s => {
                    select.innerHTML += `<option value="${s.nombre}" data-precio="${s.precio}">${s.nombre} - Q${s.precio}</option>`;
                });
            }
        });

        // Inicializar Calendario
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                locale: 'es',
                slotMinTime: '06:00:00',
                slotMaxTime: '22:00:00',
                allDaySlot: false,
                selectable: true,
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                select: function(info) {
                    fechaSeleccionada = info.startStr;
                    // Efecto visual de selección (opcional)
                }
            });
            calendar.render();
        });

        window.enviarCita = () => {
            const nom = document.getElementById('nombre').value;
            const wa = document.getElementById('whatsapp').value;
            const sel = document.getElementById('servicio');
            const nota = document.getElementById('nota').value;

            if(!nom || !wa || !sel.value || !fechaSeleccionada) {
                alert("Por favor, completa todos los campos y selecciona una hora en el calendario.");
                return;
            }

            const precio = sel.options[sel.selectedIndex].getAttribute('data-precio');

            push(ref(db, 'citas'), {
                nombre: nom,
                whatsapp: wa,
                servicio: sel.value,
                precio: precio,
                nota: nota,
                fecha: fechaSeleccionada,
                estado: 'Pendiente'
            }).then(() => {
                document.getElementById('modalExito').style.display = 'block';
                // Limpiar campos
                document.getElementById('nombre').value = '';
                document.getElementById('whatsapp').value = '';
                document.getElementById('nota').value = '';
            });
        };

        window.cerrarModal = () => {
            document.getElementById('modalExito').style.display = 'none';
            location.reload();
        };
    </script>
</body>
</html>
