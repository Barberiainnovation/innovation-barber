<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva | Innovation Barber Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); text-align: center; letter-spacing: 2px; text-transform: uppercase; font-size: 1.5rem; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }
        .btn-reserva { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-reserva:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Innovation</h1>
        <label>Nombre Completo</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez">

        <label>WhatsApp (Sin espacios)</label>
        <input type="number" id="whatsapp" placeholder="Ej: 50212345678">

        <label>Servicio</label>
        <select id="servicio">
            <option>Corte de Cabello</option>
            <option>Barba Premium</option>
            <option>Corte + Barba</option>
            <option>Limpieza Facial</option>
        </select>

        <label>Fecha y Hora</label>
        <input type="datetime-local" id="fecha">

        <button class="btn-reserva" onclick="validarYEnviar()">Reservar Cita</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Bloquear fechas pasadas en el calendario
        const hoy = new Date().toISOString().slice(0, 16);
        document.getElementById('fecha').min = hoy;

        window.validarYEnviar = () => {
            const nombre = document.getElementById('nombre').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const servicio = document.getElementById('servicio').value;
            const fechaInput = document.getElementById('fecha').value;

            if (!nombre || !whatsapp || !fechaInput) {
                alert("Por favor completa todos los datos.");
                return;
            }

            const fechaCliente = new Date(fechaInput);
            const tiempoClienteMS = fechaCliente.getTime();
            const hora = fechaCliente.getHours();

            // 1. Validar horario comercial
            if (hora < 7 || hora >= 21) {
                alert("💈 Atendemos de 7:00 AM a 9:00 PM.");
                return;
            }

            // 2. Validar disponibilidad y 45 min
            onValue(ref(db, 'citas'), (snapshot) => {
                const data = snapshot.val();
                const margen45Min = 45 * 60 * 1000;
                let ocupado = false;
                let aceptadas = [];

                if (data) {
                    Object.values(data).forEach(c => {
                        if (c.estado === 'Aceptada') aceptadas.push(new Date(c.fecha).getTime());
                    });
                }

                aceptadas.forEach(f => {
                    if (Math.abs(tiempoClienteMS - f) < margen45Min) ocupado = true;
                });

                if (ocupado) {
                    // Sugerir hora
                    aceptadas.sort((a,b) => a - b);
                    let sugerencia = tiempoClienteMS;
                    let encontrado = false;
                    while(!encontrado && sugerencia < new Date(fechaCliente).setHours(21,0,0,0)) {
                        sugerencia += 15 * 60 * 1000;
                        let choque = false;
                        aceptadas.forEach(f => { if (Math.abs(sugerencia - f) < margen45Min) choque = true; });
                        if (!choque) encontrado = true;
                    }
                    const hSug = new Date(sugerencia).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    alert(`⚠️ Horario ocupado. Sugerimos reservar a las: ${hSug}`);
                } else {
                    // Guardar cita
                    push(ref(db, 'citas'), {
                        nombre, whatsapp, servicio, fecha: fechaInput, estado: 'Pendiente'
                    }).then(() => {
                        alert("✅ Cita enviada. Te confirmaremos por WhatsApp.");
                        location.reload();
                    });
                }
            }, { onlyOnce: true });
        };
    </script>
</body>
</html>
