<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Barber Studio | Elite Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <style>
        :root { 
            --bg: #000; 
            --gold: #d4af37; 
            --gold-light: #f1d592;
            --glass: rgba(20, 20, 20, 0.8);
            --border: rgba(212, 175, 55, 0.3);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at top right, #1a1a1a, #000);
            color: #fff; margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { 
            max-width: 420px; margin: 0 auto; background: var(--glass);
            padding: 25px; border-radius: 30px; border: 1px solid var(--border);
            backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        header { text-align: center; margin-bottom: 20px; }
        .logo { width: 70px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
        h1 { font-size: 1.4rem; letter-spacing: 5px; color: var(--gold); margin: 5px 0; font-weight: 600; }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; color: var(--gold); margin-bottom: 5px; text-transform: uppercase; font-weight: 600; letter-spacing: 1.5px; }
        
        input, select, textarea { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            padding: 12px; border-radius: 12px; color: #fff; box-sizing: border-box; outline: none;
        }

        /* Estilos del Calendario Visual Inline */
        #calendar-container { margin-top: 10px; display: flex; justify-content: center; }
        .flatpickr-calendar.inline { 
            background: transparent !important; 
            box-shadow: none !important; 
            border: 1px solid var(--border) !important;
            width: 100% !important;
        }
        .flatpickr-day.disabled { color: rgba(255,255,255,0.1) !important; text-decoration: line-through; }
        .flatpickr-day.selected { background: var(--gold) !important; border-color: var(--gold) !important; color: #000 !important; }

        .btn-reserva { 
            background: linear-gradient(135deg, var(--gold), var(--gold-light)); 
            color: #000; border: none; width: 100%; padding: 18px; border-radius: 18px; 
            font-weight: 700; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px;
        }

        .modal { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 40px; border: 1px solid var(--gold); border-radius: 30px; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.png" class="logo">
            <h1>INNOVATION</h1>
        </header>

        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>

        <div class="form-group">
            <label>Servicio</label>
            <select id="servicio"></select>
        </div>

        <div class="form-group">
            <label>Selecciona tu espacio (Gris = Ocupado)</label>
            <div id="calendar-container">
                <input type="text" id="fecha-cita" style="display:none;">
            </div>
        </div>

        <button class="btn-reserva" onclick="enviarCita()">Reservar Ahora</button>
    </div>

    <div id="modalExito" class="modal">
        <div class="modal-content">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: var(--gold);"></i>
            <h2 style="color:var(--gold);">¡CONFIRMADO!</h2>
            <p>Tu espacio ha sido reservado en nuestro sistema.</p>
            <button class="btn-reserva" onclick="location.reload()">Finalizar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", 
            authDomain: "innovation-barber-studio.firebaseapp.com", 
            projectId: "innovation-barber-studio", 
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. Cargar servicios
        onValue(ref(db, 'servicios'), (snap) => {
            const select = document.getElementById('servicio');
            select.innerHTML = '<option value="" disabled selected>Elige servicio</option>';
            snap.forEach(s => {
                select.innerHTML += `<option value="${s.val().nombre}">${s.val().nombre}</option>`;
            });
        });

        // 2. Calendario Visual Continuo (Inline)
        onValue(ref(db, 'citas'), (snapshot) => {
            const ocupados = [];
            snapshot.forEach(child => { if(child.val().fecha) ocupados.push(child.val().fecha); });

            flatpickr("#fecha-cita", {
                inline: true, // ESTO HACE QUE EL CALENDARIO ESTÉ SIEMPRE ABIERTO
                enableTime: true,
                dateFormat: "Y-m-d H:i",
                minDate: "today",
                disable: ocupados, // BLOQUEA LOS HORARIOS YA AGENDADOS
                time_24hr: false,
                minuteIncrement: 30,
                locale: { firstDayOfWeek: 1 }
            });
        });

        window.enviarCita = () => {
            const nom = document.getElementById('nombre').value;
            const fec = document.getElementById('fecha-cita').value;
            if(!nom || !fec) return alert("Por favor elige nombre y horario.");

            push(ref(db, 'citas'), {
                nombre: nom,
                servicio: document.getElementById('servicio').value,
                fecha: fec,
                estado: 'Confirmado'
            }).then(() => {
                document.getElementById('modalExito').style.display = 'flex';
            });
        };
    </script>
</body>
</html>
