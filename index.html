<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Innovation Barber Studio | Elite Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <style>
        :root { --bg: #000; --gold: #d4af37; --gold-light: #f1d592; --glass: rgba(20, 20, 20, 0.8); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); background-image: radial-gradient(circle at top right, #1a1a1a, #000); color: #fff; margin: 0; padding: 15px; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 400px; margin: 0 auto; background: var(--glass); padding: 25px; border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 25px; }
        .logo { width: 70px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
        h1 { font-size: 1.4rem; letter-spacing: 5px; color: var(--gold); margin: 5px 0; font-weight: 600; }
        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.6rem; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; font-weight: 600; letter-spacing: 1.2px; }
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: #fff; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--gold); background: rgba(255,255,255,0.07); }
        .phone-container { display: flex; gap: 6px; }
        .flag-select { width: 115px; cursor: pointer; }
        .slots-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; max-height: 250px; overflow-y: auto; padding: 10px 5px; }
        .slot { padding: 12px 5px; border: 1px solid var(--border); border-radius: 12px; text-align: center; font-size: 0.75rem; cursor: pointer; transition: all 0.3s ease; background: rgba(255,255,255,0.02); color: #aaa; }
        .slot.selected { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; transform: scale(1.05); box-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .slot.occupied { opacity: 0.15; cursor: not-allowed; text-decoration: line-through; border-color: transparent; filter: grayscale(1); }
        #info-servicio { display:none; margin-top: 10px; padding: 12px; background: rgba(212, 175, 55, 0.05); border-left: 3px solid var(--gold); border-radius: 8px; font-size: 0.75rem; color: #ccc; line-height: 1.4; }
        .btn-reserva { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; border: none; width: 100%; padding: 18px; border-radius: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .modal { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #111; padding: 35px; border: 1px solid var(--gold); width: 80%; max-width: 300px; border-radius: 30px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <header><img src="logo.png" class="logo"><h1>INNOVATION</h1></header>

        <div class="form-group">
            <label><i class="fas fa-user"></i> Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>

        <div class="form-group">
            <label><i class="fab fa-whatsapp"></i> WhatsApp</label>
            <div class="phone-container">
                <select id="codigo-area" class="flag-select">
                    <option value="502">🇬🇹 +502</option><option value="52">🇲🇽 +52</option><option value="1">🇺🇸 +1</option>
                    <option value="503">🇸🇻 +503</option><option value="504">🇭🇳 +504</option><option value="505">🇳🇮 +505</option>
                    <option value="506">🇨🇷 +506</option><option value="507">🇵🇦 +507</option><option value="501">🇧🇿 +501</option>
                </select>
                <input type="tel" id="whatsapp" placeholder="Número">
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-cut"></i> Servicio Elite</label>
            <select id="servicio" onchange="actualizarInfoServicio()"></select>
            <div id="info-servicio"><strong>Incluye:</strong> <br> <span id="texto-descripcion"></span></div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-calendar-alt"></i> Fecha y Hora Disponible</label>
            <div id="calendar-inline"></div>
            <div id="slots-container" class="slots-container"></div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-pen"></i> Notas</label>
            <textarea id="nota" placeholder="Opcional..."></textarea>
        </div>

        <button class="btn-reserva" onclick="enviarCita()">Agendar Experiencia</button>
    </div>

    <div id="modalExito" class="modal">
        <div class="modal-content">
            <i class="fas fa-check-circle" style="font-size:4rem;color:var(--gold);margin-bottom:15px;"></i>
            <h2 style="color:var(--gold);margin:0;">¡HECHO!</h2>
            <p style="color:#888;font-size:0.9rem;">Cita reservada correctamente.</p>
            <button class="btn-reserva" onclick="location.reload()">Finalizar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let ocupados = [];
        let fechaSeleccionada = "";
        let horaSeleccionada = "";
        let horaApertura = 7; 
        let horaCierre = 21;

        // 1. Obtener Horario Dinámico del Admin
        onValue(ref(db, 'configuracion_horario'), (snapshot) => {
            const config = snapshot.val();
            if (config) {
                horaApertura = parseInt(config.apertura);
                horaCierre = parseInt(config.cierre);
                window.renderSlots(); 
            }
        });

        // 2. Obtener Citas Ocupadas
        onValue(ref(db, 'citas'), (snap) => {
            ocupados = [];
            snap.forEach(c => { if(c.val().fecha) ocupados.push(c.val().fecha); });
            window.renderSlots(); 
        });

        // 3. Cargar Servicios (Asegurado al final para no interrumpir)
        onValue(ref(db, 'servicios'), (snap) => {
            const sel = document.getElementById('servicio');
            sel.innerHTML = '<option value="" disabled selected>Elige un servicio...</option>';
            snap.forEach(s => {
                const d = s.val();
                sel.innerHTML += `<option value="${d.nombre}" data-precio="${d.precio}" data-desc="${d.descripcion || 'Servicio Elite'}">${d.nombre} - Q${d.precio}</option>`;
            });
        });

        const fp = flatpickr("#calendar-inline", {
            inline: true, minDate: "today", dateFormat: "Y-m-d", "locale": "es",
            onChange: (selectedDates, dateStr) => { fechaSeleccionada = dateStr; window.renderSlots(); }
        });

        // Función global para que Firebase pueda llamarla
        window.renderSlots = () => {
            const container = document.getElementById('slots-container');
            container.innerHTML = "";
            if (!fechaSeleccionada) return;

            for (let h = horaApertura; h <= horaCierre; h++) {
                const horaStr = `${h.toString().padStart(2, '0')}:00`;
                const fullDateTime = `${fechaSeleccionada} ${horaStr}`;
                const isOccupied = ocupados.includes(fullDateTime);

                const div = document.createElement('div');
                div.className = `slot ${isOccupied ? 'occupied' : ''}`;
                div.innerText = h > 12 ? `${h-12}:00 PM` : (h === 12 ? `12:00 PM` : `${h}:00 AM`);
                
                if (!isOccupied) {
                    div.onclick = () => {
                        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                        div.classList.add('selected');
                        horaSeleccionada = horaStr;
                    };
                }
                container.appendChild(div);
            }
        };

        window.actualizarInfoServicio = () => {
            const opt = document.getElementById('servicio').selectedOptions[0];
            document.getElementById('texto-descripcion').innerText = opt.getAttribute('data-desc');
            document.getElementById('info-servicio').style.display = 'block';
        };

        window.enviarCita = () => {
            const nom = document.getElementById('nombre').value;
            const num = document.getElementById('whatsapp').value;
            const sel = document.getElementById('servicio');
            if(!nom || !num || !sel.value || !horaSeleccionada) return alert("Faltan datos por completar.");

            push(ref(db, 'citas'), {
                nombre: nom,
                whatsapp: document.getElementById('codigo-area').value + num,
                servicio: sel.value,
                precio: sel.selectedOptions[0].getAttribute('data-precio'),
                nota: document.getElementById('nota').value || "Sin notas",
                fecha: `${fechaSeleccionada} ${horaSeleccionada}`,
                estado: 'Pendiente'
            }).then(() => document.getElementById('modalExito').style.display = 'flex');
        };
    </script>
</body>
</html>
