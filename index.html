<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Innovation Barber Studio | Elite Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <style>
        :root { --bg: #000; --gold: #d4af37; --gold-light: #f1d592; --glass: rgba(20, 20, 20, 0.8); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 400px; margin: 0 auto; background: var(--glass); padding: 25px; border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        
        header { text-align: center; margin-bottom: 25px; }
        .logo { width: 70px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
        h1 { font-size: 1.4rem; letter-spacing: 5px; color: var(--gold); margin: 5px 0; }
        
        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.6rem; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; font-weight: 600; letter-spacing: 1.2px; }
        
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
        .phone-container { display: flex; gap: 6px; }
        .flag-select { width: 110px; }
        
        /* Estilos del Calendario Inline */
        .flatpickr-calendar.inline { width: 100% !important; background: transparent !important; border: none !important; box-shadow: none !important; }
        
        /* Contenedor de Horarios (Slots) */
        .slots-container { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; 
            max-height: 200px; overflow-y: auto; padding: 5px;
        }
        .slot { 
            padding: 10px; border: 1px solid var(--border); border-radius: 10px; 
            text-align: center; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
        }
        .slot.selected { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }
        .slot.occupied { opacity: 0.2; cursor: not-allowed; text-decoration: line-through; border-color: transparent; }

        #info-servicio { display:none; margin-top: 10px; padding: 10px; background: rgba(212, 175, 55, 0.05); border-left: 3px solid var(--gold); border-radius: 8px; font-size: 0.75rem; color: #ccc; }
        .btn-reserva { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 15px; text-transform: uppercase; letter-spacing: 1.5px; }

        .modal { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border: 1px solid var(--gold); width: 80%; max-width: 300px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <header><img src="logo.png" class="logo"><h1>INNOVATION</h1></header>

        <div class="form-group">
            <label><i class="fas fa-user"></i> Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>

        <div class="form-group">
            <label><i class="fab fa-whatsapp"></i> WhatsApp</label>
            <div class="phone-container">
                <select id="codigo-area" class="flag-select">
                    <option value="502">🇬🇹 +502</option><option value="52">🇲🇽 +52</option><option value="1">🇺🇸 +1</option>
                    <option value="503">🇸🇻 +503</option><option value="504">🇭🇳 +504</option><option value="505">🇳🇮 +505</option>
                    <option value="506">🇨🇷 +506</option><option value="507">🇵🇦 +507</option>
                </select>
                <input type="tel" id="whatsapp" placeholder="Número">
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-cut"></i> Servicio Elite</label>
            <select id="servicio" onchange="actualizarInfoServicio()"></select>
            <div id="info-servicio"><strong>Incluye:</strong> <span id="texto-descripcion"></span></div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-calendar-alt"></i> Selecciona Día y Hora</label>
            <div id="calendar-inline"></div>
            <div id="slots-container" class="slots-container"></div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-pen"></i> Notas</label>
            <textarea id="nota" placeholder="Opcional..."></textarea>
        </div>

        <button class="btn-reserva" onclick="enviarCita()">Agendar ahora</button>
    </div>

    <div id="modalExito" class="modal"><div class="modal-content"><i class="fas fa-check-circle" style="font-size:3rem;color:var(--gold)"></i><h2>LISTO</h2><p>Cita agendada.</p><button class="btn-reserva" onclick="location.reload()">Cerrar</button></div></div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let ocupados = [];
        let fechaSeleccionada = "";
        let horaSeleccionada = "";

        // 1. Cargar Citas para bloquear slots
        onValue(ref(db, 'citas'), (snap) => {
            ocupados = [];
            snap.forEach(c => { if(c.val().fecha) ocupados.push(c.val().fecha); });
            renderSlots(); // Re-renderizar si cambian los datos
        });

        // 2. Configurar Calendario Inline
        const fp = flatpickr("#calendar-inline", {
            inline: true,
            minDate: "today",
            dateFormat: "Y-m-d",
            onChange: (selectedDates, dateStr) => {
                fechaSeleccionada = dateStr;
                renderSlots();
            }
        });

        // 3. Generar Horas (Slots) según el día seleccionado
        function renderSlots() {
            const container = document.getElementById('slots-container');
            container.innerHTML = "";
            if (!fechaSeleccionada) return;

            // Definimos horario (de 7:00 a 22:00)
            for (let h = 7; h <= 21; h++) {
                const horaStr = `${h.toString().padStart(2, '0')}:00`;
                const fullDateTime = `${fechaSeleccionada} ${horaStr}`;
                const isOccupied = ocupados.includes(fullDateTime);

                const div = document.createElement('div');
                div.className = `slot ${isOccupied ? 'occupied' : ''}`;
                div.innerText = h > 12 ? `${h-12}:00 PM` : `${h}:00 AM`;
                
                if (!isOccupied) {
                    div.onclick = () => {
                        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                        div.classList.add('selected');
                        horaSeleccionada = horaStr;
                    };
                }
                container.appendChild(div);
            }
        }

        // --- Resto de funciones (Servicios y Envío) ---
        onValue(ref(db, 'servicios'), (snap) => {
            const sel = document.getElementById('servicio');
            sel.innerHTML = '<option value="" disabled selected>Servicio...</option>';
            snap.forEach(s => {
                const d = s.val();
                sel.innerHTML += `<option value="${d.nombre}" data-precio="${d.precio}" data-desc="${d.descripcion || 'Elite'}">${d.nombre} - Q${d.precio}</option>`;
            });
        });

        window.actualizarInfoServicio = () => {
            const opt = document.getElementById('servicio').selectedOptions[0];
            document.getElementById('texto-descripcion').innerText = opt.getAttribute('data-desc');
            document.getElementById('info-servicio').style.display = 'block';
        };

        window.enviarCita = () => {
            const nom = document.getElementById('nombre').value;
            const num = document.getElementById('whatsapp').value;
            const sel = document.getElementById('servicio');
            if(!nom || !num || !sel.value || !horaSeleccionada) return alert("Faltan datos o elegir hora.");

            push(ref(db, 'citas'), {
                nombre: nom,
                whatsapp: document.getElementById('codigo-area').value + num,
                servicio: sel.value,
                precio: sel.selectedOptions[0].getAttribute('data-precio'),
                nota: document.getElementById('nota').value || "Sin notas",
                fecha: `${fechaSeleccionada} ${horaSeleccionada}`,
                estado: 'Pendiente'
            }).then(() => document.getElementById('modalExito').style.display = 'flex');
        };
    </script>
</body>
</html>
