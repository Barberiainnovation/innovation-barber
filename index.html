<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Barber Studio | Elite Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <style>
        :root { --bg: #000; --gold: #d4af37; --gold-light: #f1d592; --glass: rgba(20, 20, 20, 0.8); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); background-image: radial-gradient(circle at top right, #1a1a1a, #000); color: #fff; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 400px; margin: 0 auto; background: var(--glass); padding: 30px; border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 30px; }
        .logo { width: 80px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
        h1 { font-size: 1.6rem; letter-spacing: 6px; color: var(--gold); margin: 10px 0 0 0; font-weight: 600; }
        .subtitle { font-size: 0.7rem; color: #888; letter-spacing: 4px; text-transform: uppercase; }
        .form-group { text-align: left; margin-bottom: 22px; position: relative; }
        label { display: block; font-size: 0.65rem; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; letter-spacing: 1.5px; opacity: 0.9; }
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 14px 18px; border-radius: 15px; color: #fff; box-sizing: border-box; font-size: 0.9rem; outline: none; }
        .phone-container { display: flex; gap: 8px; }
        .flag-select { width: 110px; font-size: 1.1rem; }
        .btn-reserva { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; border: none; width: 100%; padding: 18px; border-radius: 18px; font-weight: 700; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .modal { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #111; padding: 40px; border: 1px solid var(--gold); width: 85%; max-width: 320px; border-radius: 30px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header><img src="logo.png" class="logo"><h1>INNOVATION</h1><div class="subtitle">Barber Studio</div></header>
        <div class="form-group"><label><i class="fas fa-user"></i> Nombre</label><input type="text" id="nombre" placeholder="Tu nombre"></div>
        <div class="form-group"><label><i class="fab fa-whatsapp"></i> WhatsApp</label>
            <div class="phone-container">
                <select id="codigo-area" class="flag-select"><option value="502">🇬🇹 +502</option><option value="503">🇸🇻 +503</option><option value="1">🇺🇸 +1</option></select>
                <input type="tel" id="whatsapp" placeholder="Número">
            </div>
        </div>
        <div class="form-group"><label><i class="fas fa-cut"></i> Servicio Elite</label><select id="servicio"></select></div>
        <div class="form-group"><label><i class="fas fa-calendar-alt"></i> Fecha y Hora</label><input type="text" id="fecha-cita" placeholder="Toca para elegir"></div>
        <button class="btn-reserva" onclick="enviarCita()">Agendar Experiencia</button>
    </div>

    <div id="modalExito" class="modal"><div class="modal-content"><h2 style="color:var(--gold);">CONFIRMADO</h2><p>Tu solicitud ha sido enviada con éxito.</p><button class="btn-reserva" onclick="location.reload()">Finalizar</button></div></div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I", authDomain: "innovation-barber-studio.firebaseapp.com", projectId: "innovation-barber-studio", databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let ocupados = [];
        onValue(ref(db, 'citas'), (snap) => {
            ocupados = []; snap.forEach(c => { if(c.val().fecha) ocupados.push(c.val().fecha); });
            flatpickr("#fecha-cita", { enableTime: true, dateFormat: "Y-m-d H:i", minDate: "today", minTime: "07:00", maxTime: "22:00", minuteIncrement: 60,
                onChange: (dates, str, inst) => { if(ocupados.includes(str)) { alert("Hora ocupada"); inst.clear(); } }
            });
        });

        onValue(ref(db, 'servicios'), (snap) => {
            const sel = document.getElementById('servicio');
            sel.innerHTML = '<option disabled selected>Selecciona servicio</option>';
            snap.forEach(s => { 
                const d = s.val(); 
                sel.innerHTML += `<option value="${d.nombre}" data-precio="${d.precio}">${d.nombre} - Q${d.precio}</option>`;
            });
        });

        window.enviarCita = () => {
            const nom = document.getElementById('nombre').value;
            const fec = document.getElementById('fecha-cita').value;
            const sel = document.getElementById('servicio');
            if(!nom || !fec || !sel.value) return alert("Completa los datos");

            push(ref(db, 'citas'), {
                nombre: nom,
                whatsapp: document.getElementById('codigo-area').value + document.getElementById('whatsapp').value,
                servicio: sel.value,
                precio: sel.options[sel.selectedIndex].getAttribute('data-precio'),
                fecha: fec,
                estado: 'Pendiente'
            }).then(() => { document.getElementById('modalExito').style.display = 'flex'; });
        };
    </script>
</body>
</html>
