<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva | Innovation Barber Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .logo { width: 110px; margin-bottom: 15px; }
        h1 { color: var(--gold); margin-bottom: 25px; text-transform: uppercase; font-size: 1.3rem; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-size: 0.85rem; text-align: left; font-weight: 600; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Poppins'; }
        .btn-reserva { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        /* DÍAS VISIBLES */
        .fc-col-header { background-color: #000 !important; }
        .fc-col-header-cell-cushion { color: #fff !important; text-decoration: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>Reserva tu Cita</h1>
        <label>Nombre</label><input type="text" id="nombre">
        <label>WhatsApp</label><input type="number" id="whatsapp" placeholder="Número">
        
        <label>Servicio</label>
        <select id="servicio">
            <option value="">Cargando servicios...</option>
        </select>

        <label>Fecha y Hora</label><input type="datetime-local" id="fecha">
        <button class="btn-reserva" onclick="validarYEnviar()">Confirmar Reserva</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKbopaMnZVA5Xy132EC1roRFihl9nXW4I",
            authDomain: "innovation-barber-studio.firebaseapp.com",
            projectId: "innovation-barber-studio",
            databaseURL: "https://innovation-barber-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // CARGAR SERVICIOS DINÁMICAMENTE
        onValue(ref(db, 'servicios'), (snapshot) => {
            const servicios = snapshot.val();
            const select = document.getElementById('servicio');
            select.innerHTML = ''; 
            if(servicios) {
                Object.values(servicios).forEach(s => {
                    let opt = document.createElement('option');
                    opt.value = s; opt.innerText = s;
                    select.appendChild(opt);
                });
            } else {
                select.innerHTML = '<option>Corte Clásico</option>'; // Default si no hay nada
            }
        });

        window.validarYEnviar = () => {
            const nombre = document.getElementById('nombre').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const servicio = document.getElementById('servicio').value;
            const fecha = document.getElementById('fecha').value;
            if(!nombre || !fecha) return alert("Completa los datos");
            push(ref(db, 'citas'), { nombre, whatsapp, servicio, fecha, estado: 'Pendiente' }).then(() => location.reload());
        };
    </script>
</body>
</html>
